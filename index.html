q("Tramvay qaysi turga kiradi?", ["Relsli transport","Avtomobil","Maxsus"], "Трамвай?", ["Рельсовый транспорт","Автомобиль","Специальный"],0,"classification"),
q("Trolleybus qaysi turga kiradi?", ["Elektr transporti","Dizel transporti","Benzinli"], "Троллейбус?", ["Электротранспорт","Дизельный","Бензиновый"],0,"classification"),
q("Yo‘nalishli taksi qanday transport vositasi?", ["Jamoat transporti","Yuk transporti","Maxsus"], "Маршрутное такси?", ["Общественный транспорт","Грузовой","Специальный"],0,"classification"),
q("Beton aralashtirgich qanday transport vositasi?", ["Maxsus yuk avtomobili","Yengil avtomobil","Avtobus"], "Бетономешалка?", ["Специальный грузовик","Легковой","Автобус"],0,"classification"),
q("Evakuator qanday transport vositasi?", ["Maxsus yuk avtomobili","Yengil avtomobil","Avtobus"], "Эвакуатор?", ["Специальный грузовик","Легковой","Автобус"],0,"classification"),
q("Qishloq xo‘jaligi texnikasi qanday transport vositasi?", ["O‘ziyurar mashinalar","Avtomobil","Mototsikl"], "Сельхозтехника?", ["Самоходные машины","Автомобиль","Мотоцикл"],0,"classification"),
q("Yo‘l qurilish texnikasi qanday transport vositasi?", ["O‘ziyurar mashinalar","Avtomobil","Mototsikl"], "Дорожно-строительная техника?", ["Самоходные машины","Автомобиль","Мотоцикл"],0,"classification"),
q("Harbiy transport vositalari qanday tasniflanadi?", ["Maxsus transport","Yengil avtomobil","Yuk avtomobili"], "Военный транспорт?", ["Специальный","Легковой","Грузовой"],0,"classification"),
q("Yong‘in mashinasi qanday transport vositasi?", ["Maxsus transport","Yengil avtomobil","Yuk avtomobili"], "Пожарная машина?", ["Специальный транспорт","Легковой","Грузовой"],0,"classification"),
q("Tez yordam mashinasi qanday transport vositasi?", ["Maxsus transport","Yengil avtomobil","Yuk avtomobili"], "Скорая помощь?", ["Специальный транспорт","Легковой","Грузовой"],0,"classification"),
];
    // KATEGORIYA NOMLARI
    const categoryNames = {
        uz: {
            terms: "📖 Terminlar", duties: "⚖️ Yo'l harakati qatnashchilarining majburiyatlari", traffic_lights: "🚦 Svetofor va tartibga soluvchi ishoralar", warning_signals: "⚠️ Ogohlantiruvchi va falokat ishoralari",
            warning_signs: "🚙 Ogohlantiruvchi belgilar", priority_signs: "🥇 Ustuvorlik belgilari", prohibitory: "🚫 Taqiqlovchi belgilar", mandatory: "⬆️ Buyruq beruvchi belgilar",
            info_service: "ℹ️ Axborot va xizmat ko‘rsatish belgilari", markings: "〰️ Yo'l chiziqlari", start_direction: "🔄 Harakatni boshlash va yo‘nalish o‘zgartirish", positioning: "🚗 Qatnov qismida joylashish",
            speed: "🏁 Harakatlanish tezligi", stop_park: "🅿️ To‘xtash va to‘xtab turish", overtaking: "🚗 Quvib o‘tish", equal_intersect: "⚖️ Teng ahamiyatli chorrahalar",
            uncontrolled_priority: "🛑 Ustuvorlik belgili chorrahalar", controlled: "🚦 Tartibga solinadigan chorrahalar", railway: "🚂 Temir yo‘l kesishmalari", motorway: "🛣️ Avtomagistralda harakatlanish",
            lights: "💡 Tashqi yorug‘lik asboblari", towing: "🔗 Bog‘lash", people: "👥 Odam tashish", cargo: "📦 Yuk tashish", safety: "🛡️ Avtomobilni boshqarish xavfsizligi",
            first_aid: "🩹 Birinchi tibbiy yordam", classification: "🚘 Transport vositalari klassifikatsiyasi"
        },
        ru: {
            terms: "📖 Термины", duties: "⚖️ Обязанности участников движения", traffic_lights: "🚦 Светофор и сигналы регулировщика", warning_signals: "⚠️ Предупредительные и аварийные сигналы",
            warning_signs: "🚙 Предупреждающие знаки", priority_signs: "🥇 Знаки приоритета", prohibitory: "🚫 Запрещающие знаки", mandatory: "⬆️ Предписывающие знаки",
            info_service: "ℹ️ Информация и сервис", markings: "〰️ Дорожная разметка", start_direction: "🔄 Начало движения и смена направления", positioning: "🚗 Расположение ТС на проезжей части",
            speed: "🏁 Скорость движения", stop_park: "🅿️ Остановка и стоянка", overtaking: "🚗 Обгон", equal_intersect: "⚖️ Равнозначные перекрёстки",
            uncontrolled_priority: "🛑 Перекрёстки с приоритетом", controlled: "🚦 Регулируемые перекрёстки", railway: "🚂 Движение через ж/д переезды", motorway: "🛣️ Движение по автомагистрали",
            lights: "💡 Внешние световые приборы", towing: "🔗 Буксировка", people: "👥 Перевозка людей", cargo: "📦 Перевозка грузов", safety: "🛡️ Безопасность управления ТС",
            first_aid: "🩹 Первая медицинская помощь", classification: "🚘 Классификация транспортных средств"
        }
    };

    // ---------- GLOBAL STATE ----------
    let currentCategory = "terms";
    let currentQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let quizFinished = false;

    // ---------- YORDAMCHI FUNKSIYALAR ----------
    function getQuestionsByCategory(cat) {
        return allQuestions.filter(q => q.category === cat);
    }
    function getUniqueCategories() {
        const s = new Set();
        allQuestions.forEach(q => s.add(q.category));
        return s;
    }
    function loadSavedState() {
        try {
            const saved = localStorage.getItem("avto_quiz_full29");
            if (saved) {
                const data = JSON.parse(saved);
                currentCategory = data.currentCategory || "terms";
                userAnswers = data.userAnswers || [];
                currentIndex = data.currentIndex || 0;
                quizFinished = data.quizFinished || false;
                return true;
            }
        } catch(e) {}
        return false;
    }
    function saveState() {
        if (quizFinished) return;
        try {
            localStorage.setItem("avto_quiz_full29", JSON.stringify({
                currentCategory, userAnswers, currentIndex, quizFinished
            }));
        } catch(e) {}
    }
    function showToast(msg) {
        const old = document.querySelector(".toast-msg");
        if (old) old.remove();
        const toast = document.createElement("div");
        toast.className = "toast-msg";
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    // ---------- ASOSIY UI ----------
    function showMainApp() {
        document.getElementById("appRoot").innerHTML = `
            <div class="main-container">
                <div class="brand-header">
                    <div class="logo"><span class="logo-icon">🚨🚗</span><span class="logo-text">AVTOTEST 911</span></div>
                    <div class="control-panel">
                        <button class="icon-btn" id="themeToggleBtn">🌓 Tema</button>
                        <button class="icon-btn" id="langToggleBtn">🇷🇺 Рус</button>
                        <button class="icon-btn exit-btn" id="exitBtn">✖ Chiqish</button>
                    </div>
                </div>
                <div id="categoryBar" class="category-tabs"></div>
                <div id="quizAppContainer"></div>
                <footer id="footerText">${t("footer")}</footer>
            </div>
        `;
    }

    function showAccessDenied() {
        document.getElementById("appRoot").innerHTML = `
            <div class="access-denied">
                <div class="lock-icon">🔒</div>
                <h2>${t("access_denied_title")}</h2>
                <p>${t("access_denied_text")}</p>
                <div class="user-id-box">${t("your_id")} <strong>${tg.initDataUnsafe?.user?.id || "Noma'lum"}</strong></div>
                <button class="contact-btn" onclick="window.open('https://t.me/sariyev_u','_blank')">${t("contact_btn")}</button>
            </div>
        `;
    }

    function buildCategoryTabs() {
        const cats = getUniqueCategories();
        const container = document.getElementById("categoryBar");
        if (!container) return;
        container.innerHTML = "";
        for (let cat of cats) {
            const btn = document.createElement("button");
            btn.className = `cat-btn ${currentCategory === cat ? "active" : ""}`;
            btn.setAttribute("data-cat", cat);
            btn.textContent = (categoryNames[currentLang] || categoryNames.uz)[cat] || cat;
            btn.onclick = () => {
                currentCategory = cat;
                currentQuestions = getQuestionsByCategory(cat);
                currentIndex = 0;
                userAnswers = new Array(currentQuestions.length).fill(null);
                quizFinished = false;
                saveState();
                renderCurrentQuestion();
                document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                showToast(t("saved_progress"));
            };
            container.appendChild(btn);
        }
    }

    function renderCurrentQuestion() {
        if (quizFinished || currentIndex >= currentQuestions.length) {
            renderResults();
            return;
        }
        const q = currentQuestions[currentIndex];
        const questionText = currentLang === "uz" ? q.q_uz : q.q_ru;
        const answers = currentLang === "uz" ? q.a_uz : q.a_ru;
        const saved = userAnswers[currentIndex];
        const container = document.getElementById("quizAppContainer");
        if (!container) return;
        container.innerHTML = `
            <div class="quiz-card">
                <div class="progress-area">
                    <div class="progress-stats">
                        <span>${t("question_word")} ${currentIndex+1}/${currentQuestions.length}</span>
                        <span>${Math.round((currentIndex/currentQuestions.length)*100)}%</span>
                    </div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width:${(currentIndex/currentQuestions.length)*100}%"></div></div>
                </div>
                ${q.img ? `<img class="question-img" src="${q.img}" alt="rasm">` : ""}
                <div class="question-text">${questionText}</div>
                <div class="answers-grid" id="answersGrid"></div>
                <button class="next-btn" id="nextBtn">${currentIndex === currentQuestions.length-1 ? t("finish_btn") : t("next_btn")}</button>
            </div>
        `;
        const grid = document.getElementById("answersGrid");
        answers.forEach((ans, idx) => {
            const btn = document.createElement("button");
            btn.className = `answer-btn ${saved ? (idx === q.correct ? "correct-answer" : (saved.selected === idx ? "wrong-answer" : "")) : ""}`;
            btn.innerHTML = `<span class="answer-marker">${String.fromCharCode(65+idx)}</span><span>${ans}</span>`;
            btn.onclick = () => {
                if (quizFinished || userAnswers[currentIndex]) return; // уже ответили
                const isCorrect = idx === q.correct;
                userAnswers[currentIndex] = { 
                    selected: idx, 
                    isCorrect,
                    questionText: questionText,
                    answers: answers,
                    correctIndex: q.correct
                };
                saveState();
                renderCurrentQuestion();
            };
            grid.appendChild(btn);
        });
        document.getElementById("nextBtn").onclick = () => {
            if (!userAnswers[currentIndex]) {
                showToast(t("select_answer"));
                return;
            }
            if (currentIndex + 1 < currentQuestions.length) {
                currentIndex++;
                saveState();
                renderCurrentQuestion();
            } else {
                quizFinished = true;
                renderResults();
            }
        };
    }

    function renderResults() {
        const total = currentQuestions.length;
        let correct = 0;
        const mistakes = [];
        userAnswers.forEach((a, idx) => { 
            if (a && a.isCorrect) correct++; 
            else if (a) {
                mistakes.push({
                    index: idx,
                    question: a.questionText,
                    yourAnswer: a.answers[a.selected],
                    correctAnswer: a.answers[a.correctIndex]
                });
            }
        });
        const percent = Math.round((correct/total)*100);
        const msg = percent >= 90 ? t("perfect") : percent >= 70 ? t("great") : percent >= 50 ? t("good") : t("bad");
        const container = document.getElementById("quizAppContainer");
        if (!container) return;
        
        let mistakesHtml = "";
        if (mistakes.length === 0) {
            mistakesHtml = `<p>🎉 ${t("no_mistakes")}</p>`;
        } else {
            mistakesHtml = `<h4 style="margin-bottom:10px;">${t("mistakes_title")} (${mistakes.length})</h4>`;
            mistakes.forEach(m => {
                mistakesHtml += `
                    <div class="mistake-item">
                        <div class="mistake-question">${m.index+1}. ${m.question}</div>
                        <div class="mistake-answer">${t("your_answer")}: <span style="color: var(--wrong-border);">${m.yourAnswer}</span></div>
                        <div class="mistake-answer">${t("correct_answer")}: <span class="mistake-correct">${m.correctAnswer}</span></div>
                    </div>
                `;
            });
        }

        container.innerHTML = `
            <div class="quiz-card result-card">
                <div class="score-circle"><div class="score-number">${percent}%</div></div>
                <h3>${msg}</h3>
                <div class="result-detail">
                    <p>${t("correct_count")}: ${correct}</p>
                    <p>${t("wrong_count")}: ${total-correct}</p>
                    <p>${t("percent_text")}: ${percent}%</p>
                </div>
                <div class="mistakes-list">
                    ${mistakesHtml}
                </div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px;">
                    <button class="next-btn restart-btn" id="restartBtn">${t("restart_btn")}</button>
                    <button class="next-btn" id="sendBtn">${t("send_btn")}</button>
                </div>
            </div>
        `;
        document.getElementById("restartBtn").onclick = () => {
            currentQuestions = getQuestionsByCategory(currentCategory);
            currentIndex = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            quizFinished = false;
            saveState();
            renderCurrentQuestion();
        };
        document.getElementById("sendBtn").onclick = () => {
            const text = `📊 AVTOTEST 911:\n✅ ${correct}/${total}\n📈 ${percent}%\n🏷 ${currentCategory}`;
            try { tg.sendData(JSON.stringify({score:percent, correct, total, category:currentCategory})); } catch(e) { alert(text); }
        };
    }

    function initTheme() {
        if (localStorage.getItem("avto_theme") === "dark") document.body.classList.add("dark");
    }
    function toggleTheme() {
        document.body.classList.toggle("dark");
        localStorage.setItem("avto_theme", document.body.classList.contains("dark") ? "dark" : "light");
    }
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem("avto_lang", lang);
        const langBtn = document.getElementById("langToggleBtn");
        if (langBtn) langBtn.innerHTML = lang === "uz" ? "🇷🇺 Рус" : "🇺🇿 O'zbek";
        const footer = document.getElementById("footerText");
        if (footer) footer.innerText = t("footer");
        document.querySelectorAll(".cat-btn").forEach(btn => {
            const cat = btn.getAttribute("data-cat");
            if (cat) btn.textContent = (categoryNames[currentLang] || categoryNames.uz)[cat] || cat;
        });
        if (!quizFinished && currentQuestions.length) renderCurrentQuestion();
        else if (quizFinished) renderResults();
        else renderCurrentQuestion();
    }

    // ---------- BOSH IKKI ----------
    function init() {
        initTheme();
        if (!checkAccess()) {
            showAccessDenied();
            return;
        }
        showMainApp();
        loadSavedState();
        currentQuestions = getQuestionsByCategory(currentCategory);
        if (userAnswers.length !== currentQuestions.length) {
            userAnswers = new Array(currentQuestions.length).fill(null);
            currentIndex = 0;
            quizFinished = false;
        }
        buildCategoryTabs();
        renderCurrentQuestion();

        document.getElementById("themeToggleBtn").onclick = toggleTheme;
        document.getElementById("langToggleBtn").onclick = () => setLanguage(currentLang === "uz" ? "ru" : "uz");
        document.getElementById("exitBtn").onclick = () => {
            tg.showPopup({
                title: t("exit_title"),
                message: t("exit_confirm"),
                buttons: [
                    { id: "continue", type: "default", text: t("continue_text") },
                    { id: "exit", type: "destructive", text: t("exit_text") }
                ]
            }, (btnId) => { if (btnId === "exit") tg.close(); });
        };
        setLanguage(currentLang);
    }

    init();
})();
</script>
