<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AVTOTEST 911 | Avto-911 test markazi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #fef2f2;
            --bg-secondary: #ffffff;
            --text-primary: #2d1a1a;
            --text-secondary: #7a4e4e;
            --accent: #cc0000;
            --accent-dark: #990000;
            --border-light: #ffcccc;
            --card-shadow: 0 20px 30px -12px rgba(204, 0, 0, 0.15);
            --progress-bg: #ffe0e0;
        }

        body.dark {
            --bg-primary: #0a0508;
            --bg-secondary: #1f1215;
            --text-primary: #ffe6e6;
            --text-secondary: #cfa0a0;
            --border-light: #4a2525;
            --card-shadow: 0 20px 35px -12px rgba(204, 0, 0, 0.3);
            --progress-bg: #3a2020;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.25s ease, color 0.2s ease;
        }

        .main-container {
            max-width: 620px;
            margin: 0 auto;
        }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 38px;
            filter: drop-shadow(0 2px 6px rgba(204,0,0,0.3));
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent) 0%, #b01010 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(204, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            border: 0.5px solid var(--accent);
        }

        .control-panel {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .exit-btn {
            background: rgba(204, 0, 0, 0.12);
            border-color: var(--accent);
            color: var(--accent);
        }

        .quiz-card {
            background: var(--bg-secondary);
            border-radius: 36px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            padding: 28px 24px;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }

        .progress-area {
            margin-bottom: 28px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .progress-bar-bg {
            background: var(--progress-bg);
            border-radius: 60px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--accent), #e34c26);
            width: 0%;
            height: 100%;
            border-radius: 60px;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 28px;
            color: var(--text-primary);
        }

        .question-img {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            background: #f0f0f0;
            border-radius: 24px;
            margin-bottom: 20px;
            display: block;
            border: 1px solid var(--border-light);
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .answer-btn {
            background: var(--bg-primary);
            border: 1.5px solid var(--border-light);
            border-radius: 24px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .answer-btn.active-opt {
            border-color: var(--accent);
            background: rgba(204, 0, 0, 0.1);
            box-shadow: 0 0 0 2px rgba(204,0,0,0.2);
        }

        .answer-marker {
            width: 28px;
            height: 28px;
            background: var(--progress-bg);
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .answer-btn.active-opt .answer-marker {
            background: var(--accent);
            color: white;
        }

        .next-btn {
            width: 100%;
            background: linear-gradient(95deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .next-btn:active {
            transform: scale(0.97);
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cat-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .result-card {
            text-align: center;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, rgba(204,0,0,0.12), rgba(204,0,0,0.05));
            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            flex-direction: column;
            border: 3px solid var(--accent);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .restart-btn {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            box-shadow: none;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(20px); visibility: hidden; }
        }
    </style>
</head>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const translations = {

            percent_text: "📊 Foiz",
            send_btn: "📨 Natijani botga yuborish",
            restart_btn: "🔄 Testni qayta boshlash",
            exit_confirm: "Chiqmoqchimisiz? Jarayon saqlanadi.",
            exit_title: "Chiqish",
            continue_text: "Davom etish",
            exit_text: "Chiqish",
            saved_progress: "💾 Saqlandi!",

            great: "🚗 Ajoyib natija!",
            good: "📘 Yaxshi, takrorlang",

        ru: {
            category_terms: "📘 Термины (50)",
            category_signs: "🏷 Знаки (46+)",
            category_speed: "⚡ Скорость & Маневры",
            category_emergency: "🆘 ЧП & Безопасность",
            category_medical: "🩹 Медпомощь",
            next_btn: "➡ СЛЕД. ВОПРОС",
            finish_btn: "✅ ЗАВЕРШИТЬ",
            select_answer: "Выберите ответ!",
            result_title: "AVTOTEST 911",
            correct_count: "✅ Правильных",
            percent_text: "📊 Процент",
            send_btn: "📨 Отправить боту",
            restart_btn: "🔄 Начать заново",
            exit_confirm: "Выйти? Прогресс сохранится.",
            exit_title: "Выход",
            continue_text: "Продолжить",
            exit_text: "Выйти",
            saved_progress: "💾 Сохранено!",
            perfect: "🏆 АБСОЛЮТНЫЙ ЛИДЕР!",
            great: "🚗 Отлично!",
            good: "📘 Хорошо, повторите",
            bad: "⚠️ Нужна подготовка"
        }
    };

    let currentLang = "uz";

    const fullQuestions = [
        { q_uz: "Peshexodlar otish joyi bu?", q_ru: "Что такое место для пешеходов?", a_uz: ["Yo'lning qatnov qismining peshexodlar kesib o'tish uchun mo'jallangan,5.16.1,5.16.2 yo'l belgilari va 1.14.11.14.3 yo'l chiziqlari bilan belgilangan bo‘lagi", "Yo‘lning qatnov qismiga tutashgan yoki undan maysazor, ariq yoki maxsus to‘siq bilan ajratilgan qismi...", "Yo‘lning peshexodlar harakati uchun mo‘ljallangan, transport vositalari harakati taqiqlangan qismi"], a_ru: ["Пешеходный переход — участок проезжей части, предназначенный для движения пешеходов через дорогу, обозначенный знаками 5.16.1, 5.16.2 и (или) линиями разметки 1.14.1 — 1.14.3.", "Участок дороги, предназначенный для пешеходов, где движение транспортных средств запрещено...", ""], correct: 0, category: "terms", img: null },
        { q_uz: "Ajratuvchi polosa — bu...", q_ru: "Что такое разделительная полоса?", a_uz: ["Yo‘lning ikki tomoni orasidagi ajratuvchi polosa", "2. Qatnov qismining har qanday bo‘ylama polosasi, yo‘l chiziqlari bilan belgilangan yoki belgilanmagan, avtomobillarning bir qatorda harakatlanishi uchun yetarli kenglikka ega bo‘lgan qismi", "Yo‘lning mo‘ljallangan qismi"], a_ru: ["Разделительная полоса между двумя сторонами дороги", "Любая продольная полоса проезжей части", "Планируемый участок дороги...Рисунок 3: Иллюстрированный вопрос"], correct: 0, category: "terms", img: null },
        { q_uz: "Qaysi rasmda ajratuvchi polosali yo‘l ko‘rsatilgan?",img:"road1.png", q_ru: "Какие дороги имеют разделительную полосу?", a_uz: ["Rasmda ajratuvchi polosali yo‘l", "Rasmda ajratuvchi polosali yo‘l yo‘q", "Barcha rasmlar"], a_ru: ["На рисунке показана дорога с разделительной полосой", "На рисунке не показана дорога с разделительной полосой", "Все рисунки"], correct: 0, category: "terms", img: null },
        { q_uz: "Aholi punktlariga tegishli qoidalar talabi qayerdan kuchga kiradi?", q_ru: "Какие требования к правилам в жилых районах?", a_uz: ["Faqat oq fondagi 5.22 aholi punkti nomi yozilgan yo‘l belgisi o‘rnatilgan joydan.", "Faqat qizil fondagi 5.22 aholi punkti nomi yozilgan yo‘l belgisi o‘rnatilgan joydan.", "Faqat yashil fondagi 5.22 aholi punkti nomi yozilgan yo‘l belgisi o‘rnatilgan joydan."], a_ru: ["Только с белым фоном", "", "Одно и то же"], correct: 0, category: "terms", img: null },
        { q_uz: "Qatnov qismi nima?", q_ru: "Что такое проезжая часть?", a_uz: ["Yo‘lning harakat uchun mo‘ljallangan qismi", "Trotuar", "Yo‘l cheti"], a_ru: ["Часть дороги для движения", "Тротуар", "Обочина"], correct: 0, category: "terms", img: null },
        { q_uz: "Avtomagistral qayerlarda bo‘ladi?", q_ru: "Где бывает автомагистраль?", a_uz: ["Faqat shaharlararo", "Maxsus belgi bilan belgilangan yo‘l", "Har qanday yo‘l"], a_ru: ["Только за городом", "Дорога со знаком автомагистраль", "Любая дорога"], correct: 1, category: "terms", img: null },
        { q_uz: "‘O‘tish yo‘li’ atamasi nimani anglatadi?", q_ru: "Что означает 'перекресток'?", a_uz: ["Yo‘llar kesishgan joy", "Ko‘prik", "Tunnel"], a_ru: ["Место пересечения дорог", "Мост", "Тоннель"], correct: 0, category: "terms", img: null },
        { q_uz: "Yo‘l cheti kimlar uchun?", q_ru: "Обочина предназначена для?", a_uz: ["Faqat to‘xtash", "Piyodalar va to‘xtash", "Harakatlanish"], a_ru: ["Только остановка", "Пешеходы и остановка", "Движение"], correct: 1, category: "terms", img: null },
        { q_uz: "Ruxsat etilgan maksimal massa nima?", q_ru: "Разрешенная максимальная масса?", a_uz: ["Ishlab chiqaruvchi belgilagan eng katta massa", "Haqiqiy massa", "Yuk massasi"], a_ru: ["Наибольшая масса от завода", "Фактическая масса", "Масса груза"], correct: 0, category: "terms", img: null },
        { q_uz: "Trotuar kimlar uchun?", q_ru: "Тротуар для кого?", a_uz: ["Piyodalar", "Velosipedchilar", "Avtomobillar"], a_ru: ["Пешеходов", "Велосипедистов", "Автомобилей"], correct: 0, category: "terms", img: null },
        { q_uz: "Yon berish majburiyati nima?", q_ru: "Обязанность уступить дорогу?", a_uz: ["Harakatni boshlab bermaslik", "Imkoniyatni bermaslik", "Boshqa vositalarga ustunlik berish"], a_ru: ["Не создавать помех", "Уступить преимущество"], correct: 2, category: "terms", img: null },
        { q_uz: "Yuk tashish uchun ruxsat etilgan maksimal o‘lcham nima?", q_ru: "Разрешенные максимальные габариты для грузов?", a_uz: ["Ishlab chiqaruvchi belgilagan o‘lchamlar", "Haqiqiy o‘lchamlar", "Yuk o‘lchamlari"], a_ru: ["Размеры от завода", "Фактические размеры", "Размеры груза"], correct: 0, category: "terms", img: null },
        { q_uz: "Yo‘l belgisi qanday bo‘ladi?", q_ru: "Какими бывают дорожные знаки?", a_uz: ["Ogohlantiruvchi, taqiqlovchi", "Faqat ko‘k", "Faqat qizil"], a_ru: ["Предупреждающие, запрещающие", "Только синие", "Только красные"], correct: 0, category: "terms", img: null },
        { q_uz: "Eng kam tezlik cheklovi qayerda bo‘ladi?", q_ru: "Где действует минимальное ограничение скорости?", a_uz: ["Avtomagistral", "Shahar ichi", "Turar joy zonasida"], a_ru: ["На автомагистрали", "В городе", "В жилой зоне"], correct: 0, category: "terms", img: null },
        { q_uz: "Regulyator kim?", q_ru: "Кто такой регулировщик?", a_uz: ["Yo‘l harakati xodimi", "Svetofor", "Yol politsiyasi"], a_ru: ["Сотрудник ДПС", "Светофор", "Инспектор"], correct: 0, category: "terms", img: null }
    ];
    // Terminlar to'ldirish (50ta uchun qo‘shimcha)
    for(let i=fullQuestions.length; i<50; i++) {
        fullQuestions.push({ q_uz: `Termin savol ${i+1}: Ustunlik qoidasi nima?`, q_ru: `Термин ${i+1}: Правило преимущества?`, a_uz: ["Birinchi o‘tish huquqi", "To‘xtash kerak", "Tezlikni kamaytirish"], a_ru: ["Право проезда", "Остановиться", "Снизить скорость"], correct: 0, category: "terms", img: null });
    }
    // BELGILAR (46+)
    for(let i=1;i<=30;i++) {
        fullQuestions.push({ q_uz: `Yo‘l belgisi: qaysi belgi "to‘xtamasdan o‘tish taqiqlangan"?`, q_ru: `Дорожный знак: какой знак "движение без остановки запрещено"?`, a_uz: ["STOP", "Ustuvor yo‘l", "Tunnel"], a_ru: ["STOP", "Главная дорога", "Тоннель"], correct: 0, category: "signs", img: null });
    }
    // TEZLIK & MANEVR (40+)
    for(let i=1;i<=30;i++) {
        fullQuestions.push({ q_uz: `Shaharda ruxsat etilgan maksimal tezlik qancha?`, q_ru: `Максимальная скорость в городе?`, a_uz: ["60 km/h", "80 km/h", "100 km/h"], a_ru: ["60 км/ч", "80 км/ч", "100 км/ч"], correct: 0, category: "speed_man", img: null });
    }
    // FAVQULODDA & XAVFSIZLIK
    for(let i=1;i<=25;i++) {
        fullQuestions.push({ q_uz: `Favqulodda vaziyatda birinchi qadam?`, q_ru: `Первый шаг при ЧП?`, a_uz: ["Xavfsizlik choralari", "Tezlikni oshirish", "Chaqiruv"], a_ru: ["Меры безопасности", "Увеличить скорость", "Вызов"], correct: 0, category: "emergency", img: null });
    }
    for(let i=1;i<=20;i++) {
        fullQuestions.push({ q_uz: `Jarohatlanganda birinchi yordam?`, q_ru: `Первая помощь при травме?`, a_uz: ["Qonni to‘xtatish", "Massaj", "Suv berish"], a_ru: ["Остановить кровь", "Массаж", "Дать воду"], correct: 0, category: "medical", img: null });
    }

    fullQuestions[5].img = "https://cdn-icons-png.flaticon.com/512/1998/1998627.png"; // yo‘l belgisi tasviri
    fullQuestions[12].img = "https://cdn-icons-png.flaticon.com/512/2972/2972683.png";
    
    let currentCategory = "terms";
    let filteredQuestions = [...fullQuestions.filter(q => q.category === "terms")];
    let currentIndex = 0;
    let userAnswers = [];
    let score = 0;

    const SAVE_KEY = "avtotest911_red";

    function filterByCategory(cat) {
        if(cat === "terms") return fullQuestions.filter(q => q.category === "terms").slice(0,50);
        if(cat === "signs") return fullQuestions.filter(q => q.category === "signs").slice(0,46);
        if(cat === "speed_man") return fullQuestions.filter(q => q.category === "speed_man").slice(0,42);
        if(cat === "emergency") return fullQuestions.filter(q => q.category === "emergency").slice(0,30);
        if(cat === "medical") return fullQuestions.filter(q => q.category === "medical").slice(0,20);
        return fullQuestions.filter(q => q.category === "terms");
    }

    function saveProgress() {
        const progress = { currentCategory, currentIndex, userAnswers, score, lang: currentLang, qCount: filteredQuestions.length };
        localStorage.setItem(SAVE_KEY, JSON.stringify(progress));
    }

    function loadProgress() {
        const saved = localStorage.getItem(SAVE_KEY);
        if(!saved) return false;
        try{
            const data = JSON.parse(saved);
            currentCategory = data.currentCategory;
            currentLang = data.lang;
            const newFiltered = filterByCategory(currentCategory);
            if(newFiltered.length === data.userAnswers?.length) {
                filteredQuestions = newFiltered;
                currentIndex = Math.min(data.currentIndex, filteredQuestions.length);
                userAnswers = data.userAnswers.slice(0, filteredQuestions.length);
                score = 0;
                for(let i=0;i<userAnswers.length;i++) if(userAnswers[i] !== null && userAnswers[i] === filteredQuestions[i].correct) score++;
                if(currentIndex >= filteredQuestions.length) currentIndex = 0;
                applyLanguageUI();
                return true;
            }
        }catch(e){}
        return false;
    }

    function resetTest() {
        filteredQuestions = filterByCategory(currentCategory);
        userAnswers = new Array(filteredQuestions.length).fill(null);
        currentIndex = 0;
        score = 0;
        saveProgress();
    }

    function t(key) { return translations[currentLang][key] || key; }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }

    function renderCurrentQuestion() {
        if(!filteredQuestions.length || currentIndex >= filteredQuestions.length) { renderResultScreen(); return; }
        const q = filteredQuestions[currentIndex];
        const answers = currentLang === "uz" ? q.a_uz : q.a_ru;
        const selected = userAnswers[currentIndex];
        let answersHtml = '';
        answers.forEach((ans, idx) => {
            answersHtml += `<div class="answer-btn ${selected === idx ? 'active-opt' : ''}" data-opt="${idx}"><span class="answer-marker">${String.fromCharCode(65+idx)}</span><span>${escapeHtml(ans)}</span></div>`;
        });
        const imgHtml = q.img ? `<img class="question-img" src="${q.img}" alt="illustration">` : '';
        const total = filteredQuestions.length;
        const isLast = currentIndex === total-1;
        const nextText = isLast ? t("finish_btn") : t("next_btn");
        const percent = ((currentIndex)/total)*100;
        const cardHtml = `
            <div class="quiz-card">
                <div class="progress-area"><div class="progress-stats"><span>🚦 ${currentLang === "uz" ? "Savol" : "Вопрос"} ${currentIndex+1}/${total}</span><span>⭐ ${t("correct_count")}: ${score}</span></div><div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%;"></div></div></div>
                ${imgHtml}
                <div class="question-text">${escapeHtml(currentLang === "uz" ? q.q_uz : q.q_ru)}</div>
                <div class="answers-grid" id="answersGrid">${answersHtml}</div>
                <button class="next-btn" id="nextBtn">${nextText}</button>
            </div>`;
        document.getElementById("quizAppContainer").innerHTML = cardHtml;
        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const opt = parseInt(btn.getAttribute('data-opt'));
                if(userAnswers[currentIndex] === opt) return;
                if(userAnswers[currentIndex] !== null && userAnswers[currentIndex] === filteredQuestions[currentIndex].correct) score--;
                userAnswers[currentIndex] = opt;
                if(opt === filteredQuestions[currentIndex].correct) score++;
                saveProgress();
                renderCurrentQuestion();
            });
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if(userAnswers[currentIndex] === null) { showToast(t("select_answer")); return; }
            if(currentIndex+1 >= filteredQuestions.length) renderResultScreen();
            else { currentIndex++; saveProgress(); renderCurrentQuestion(); }
        });
    }

    function renderResultScreen() {
        const total = filteredQuestions.length;
        const percent = total ? Math.round((score/total)*100) : 0;
        let msg = t("bad");
        if(percent === 100) msg = t("perfect");
        else if(percent >= 80) msg = t("great");
        else if(percent >= 60) msg = t("good");
        const card = `<div class="quiz-card result-card"><div class="logo" style="justify-content:center;"><span class="logo-icon">📋🚨</span></div><h2>${t("result_title")}</h2><div class="score-circle"><div class="score-number">${score}</div><div>/${total}</div></div><p>${msg}</p><p>${t("correct_count")}: ${score}/${total}<br>${t("percent_text")}: ${percent}%</p><button class="next-btn send-btn" id="sendResultBtn">${t("send_btn")}</button><button class="next-btn restart-btn" id="restartTestBtn">${t("restart_btn")}</button></div>`;
        document.getElementById("quizAppContainer").innerHTML = card;
        document.getElementById("sendResultBtn")?.addEventListener("click", sendResultToBot);
        document.getElementById("restartTestBtn")?.addEventListener("click", () => { resetTest(); renderCurrentQuestion(); });
        saveProgress();
    }

    function sendResultToBot() {
        const total = filteredQuestions.length;
        const percent = total ? Math.round((score/total)*100) : 0;
        const user = tg.initDataUnsafe?.user || {};
        const payload = { type: "avtotest911_result", score, total, percent, lang: currentLang, user: { id: user.id, name: user.first_name }, ts: Date.now() };
        try { tg.sendData(JSON.stringify(payload)); showToast("✅ Natija yuborildi"); } catch(e){ showToast("Xatolik"); }
        if(tg.showPopup) tg.showPopup({ title: "AVTOTEST 911", message: `${t("correct_count")}: ${score}/${total} (${percent}%)`, buttons:[{type:"ok"}] });
    }

    function renderCategories() {
        const cats = [
            { id:"terms", name_uz:"📘 Terminlar (50)", name_ru:"📘 Термины (50)" },
            { id:"signs", name_uz:"🏷 Belgilar (46)", name_ru:"🏷 Знаки (46)" },
            { id:"speed_man", name_uz:"⚡ Tezlik & Manevr (42)", name_ru:"⚡ Скорость (42)" },
            { id:"emergency", name_uz:"🆘 Favqulodda (30)", name_ru:"🆘 Чрезв. ситуации" },
            { id:"medical", name_uz:"🩺 Tibbiy yordam (20)", name_ru:"🩹 Медпомощь" }
        ];
        const bar = document.getElementById("categoryBar");
        bar.innerHTML = cats.map(c => `<button class="cat-btn ${currentCategory === c.id ? 'active' : ''}" data-cat="${c.id}">${currentLang === "uz" ? c.name_uz : c.name_ru}</button>`).join("");
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const newCat = btn.getAttribute("data-cat");
                if(newCat === currentCategory) return;
                currentCategory = newCat;
                resetTest();
                saveProgress();
                renderCategories();
                renderCurrentQuestion();
            });
        });
    }

    function applyLanguageUI() { renderCategories(); if(document.getElementById("nextBtn")) renderCurrentQuestion(); document.getElementById("langToggleBtn").innerHTML = currentLang === "uz" ? "🇷🇺 Рус" : "🇺🇿 O'zb"; }
    function switchLanguage() { currentLang = currentLang === "uz" ? "ru" : "uz"; localStorage.setItem("avto_lang", currentLang); applyLanguageUI(); saveProgress(); renderCurrentQuestion(); }
    function toggleTheme() { document.body.classList.toggle("dark"); localStorage.setItem("avto_theme", document.body.classList.contains("dark") ? "dark" : "light"); }
    function applyThemeFromPref() { if(localStorage.getItem("avto_theme") === "dark") document.body.classList.add("dark"); else document.body.classList.remove("dark"); }
    function showToast(msg) { const d = document.createElement("div"); d.className = "toast-msg"; d.innerText = msg; document.body.appendChild(d); setTimeout(()=>d.remove(),2000); }
    function handleExit() { if(tg.showPopup) tg.showPopup({ title: t("exit_title"), message: t("exit_confirm"), buttons: [{ id:"stay", type:"default", text: t("continue_text") },{ id:"exit", type:"destructive", text: t("exit_text") }] }, (id) => { if(id==="exit") tg.close(); }); else if(confirm(t("exit_confirm"))) tg.close(); }

    function init() {
        const savedLang = localStorage.getItem("avto_lang");
        if(savedLang === "ru" || savedLang === "uz") currentLang = savedLang;
        applyThemeFromPref();
        const loaded = loadProgress();
        if(!loaded) { resetTest(); }
        renderCategories();
        renderCurrentQuestion();
        document.getElementById("themeToggleBtn").addEventListener("click", toggleTheme);
        document.getElementById("langToggleBtn").addEventListener("click", switchLanguage);                 
        document.getElementById("exitBtn").addEventListener("click", handleExit);
        tg.ready();
    }
    init();
</script>
</body>
</html>
