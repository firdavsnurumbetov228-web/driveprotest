q("Qattiq charchoq boshlanishining asosiy tashqi alomatlari qanday?", ["Yuz rangi to'q qizil tusga kiradi, qo'l-oyoqlar soviydi, ongi xiralashadi.", "Ko'z sanchib og'riydi, yuz terisi oqaradi, uyqu bosadi.", "Mushaklarda xorg'inlik seziladi, quloqlarda shovqin g'uvillaydi, bosh aylanadi, muzdek yopishqoq ter chiqadi."], "Каковы основные внешние признаки начала сильного утомления?", ["Лицо приобретает темно-красный оттенок, конечности холодеют, сознание мутнеет.", "Резь в глазах, бледность кожи лица, сонливость.", "Чувствуется усталость в мышцах, шум в ушах, головокружение, выступает холодный липкий пот."], 1, "first_aid", [""]),
q("Boldir suyagi o'rtasidan singanda transportda olib yurish uchun taxtakach yoki uning o'rniga o'tuvchi narsa qanday qo'yiladi?", ["Shinani ikki tomondan butun boldir uzunligida tovondan to tizza bo'g'inigacha qo'yish kerak.", "Tovon tagidan to son o'rtasigacha oyoqning ichki va tashqi tomonidan ikkita shina qo'yish kerak. Singan joyini, tizza va boldir-oyoq kafti bo'g'inlarini qimirlatmaslik lozim.", "Singan joyga qo'yiladigan shina yoki uning o'rnini bosuvchi narsani siqib bog'lash kerak."], "Как накладывается шина или ее заменитель при переломе голени в средней трети для транспортировки?", ["Шину следует наложить с двух сторон по всей длине голени от пятки до коленного сустава.", "Две шины должны быть наложены с внутренней и наружной стороны ноги от пятки до середины бедра. Место перелома, коленный и голеностопный суставы должны быть иммобилизованы.", "Шина или заменяющий ее предмет накладывается непосредственно на место перелома и туго прибинтовывается."], 1, "first_aid", [""]),
q("Tos suyaklari singanda birinchi yordam qanday ko'rsatiladi?", ["Zararlangan joyni qattiq bog'lash, shikastlanganni yarim o'tirgan holatga keltirish.", "Shikastlanganni qattiq tekis yuzaga yotqizish, bukilgan va ikki tomonga kerilgan tizzalarining bo'g'inlari ostiga g'o'la shaklida o'ram qo'yish.", "Shikastlanganni qattiq yuzaga orqasi bilan yotqizish, zararlangan joylarga qaynoq isitgich qo'yish."], "Как оказывается первая помощь при переломе костей таза?", ["Туго забинтовать поврежденное место, придать пострадавшему полусидячее положение.", "Уложить пострадавшего на твердую ровную поверхность, под согнутые и разведенные в стороны колени положить валик.", "Уложить пострадавшего на спину на твердую поверхность, приложить к поврежденным местам горячую грелку."], 1, "first_aid", [""]),
q("Muskul va paylarning ezilishi va cho'zilishi alomatlari qanday?", ["Jarohatlangan joyda og'riq seziladi.", "Jarohatlangan joyda shish paydo bo'ladi, og'riq seziladi, ba'zan shu joyda mayda kapilyar qon tomirlar yorilib, qon quyilish natijasida ko'karish paydo bo'ladi."], "Каковы признаки ушиба и растяжения мышц и связок?", ["Ощущается боль в поврежденном месте.", "В поврежденном месте появляется отек, ощущается боль, иногда в этом месте лопаются мелкие капиллярные кровеносные сосуды, и в результате кровоизлияния появляется синяк."], 1, "first_aid", [""]),
q("Qo'l jarohatlanganda kiyim qanday tartibda kiydiriladi?", ["Kiyim avval sog' qo'liga, so'ngra jarohatlangan qo'lga kiydiriladi.", "Kiyim avval jarohatlangan qo'lga, so'ngra sog'iga kiydiriladi.", "Kiyim ikkala qo'lga baravar kiydiriladi."], "В каком порядке надевается одежда при травме руки?", ["Одежда сначала надевается на здоровую руку, затем на поврежденную.", "Одежда сначала надевается на поврежденную руку, затем на здоровую.", "Одежда надевается на обе руки одновременно."], 1, "first_aid", [""]),
q("Qorin bo'shlig'i jarohatlangan odamga ovqat, suv, dori-darmon berish mumkinmi?", ["Ha.", "Yo'q."], "Можно ли давать еду, воду, лекарства пострадавшему с травмой брюшной полости?", ["Да.", "Нет."], 1, "first_aid", [""]),
q("Ko'krak qafasining ko'p qismi jarohatlanganda uni qayerdan boshlab bint bilan bog'lash kerak?", ["Ko'krak qafasining o'rtasidan.", "Qo'ltiq ostidan.", "Ko'krak qafasining quyi qismidan."], "Откуда следует начинать бинтование при обширном ранении грудной клетки?", ["С середины грудной клетки.", "Из-под мышек.", "С нижней части грудной клетки."], 2, "first_aid", [""]),
q("Qishda boldirga qon to'xtatadigan jgutni qancha muddatga qo'yish mumkin?", ["3 soatdan ko'p bo'lmagan.", "2 soatdan ko'p bo'lmagan.", "1 soatdan ko'p bo'lmagan."], "На какое время можно накладывать кровоостанавливающий жгут на голень зимой?", ["Не более чем на 3 часа.", "Не более чем на 2 часа.", "Не более чем на 1 час."], 2, "first_aid", [""]),
q("Tos suyaklari singanda birinchi yordam qanday ko'rsatiladi?", ["Shikastlanganni qattiq yuzaga orqasi bilan yotqizish, zararlangan joylarga qaynoq isitgich qo'yish.", "Zararlangan joyni qattiq bog'lash, shikastlanganni yarim o'tirgan holatga keltirish.", "Shikastlanganni qattiq tekis yuzaga yotqizish, bukilgan va ikki tomonga kerilgan tizzalarining bo'g'inlari ostiga g'o'la shaklida o'ram qo'yish."], "Как оказывается первая помощь при переломе костей таза?", ["Уложить пострадавшего на спину на твердую поверхность, приложить к поврежденным местам горячую грелку.", "Туго забинтовать поврежденное место, придать пострадавшему полусидячее положение.", "Уложить пострадавшего на твердую ровную поверхность, под согнутые и разведенные в стороны колени положить валик."], 2, "first_aid", [""]),
q("Qornidan yopiq jarohat olgan jabrlanuvchi transportda qanday tashiladi?", ["Yarim o'tqazilgan holatda, tizzalari tanaga yaqinlashtiriladi.", "Yonboshi yoki orqasiga yotqizilgan holatda, lat yegan joyga issiq grelka qo'yiladi.", "Yotqizilgan holatda, lat yegan joyga sovuq narsa (muz, malham) qo'yiladi."], "Как транспортируется пострадавший с закрытой травмой живота?", ["В полусидячем положении, колени подтянуты к туловищу.", "Лежа на боку или на спине, на ушибленное место кладется теплая грелка.", "В положении лежа, на ушибленное место кладется холод (лед, компресс)."], 2, "first_aid", [""]),
q("Boldir suyagi o'rtasidan singanda transportda olib yurish uchun taxtakach yoki uning o'rniga o'tuvchi narsa qanday qo'yiladi?", ["Tovon tagidan to son o'rtasigacha oyoqning ichki va tashqi tomonidan ikkita shina qo'yish kerak. Singan joyini, tizza va boldir-oyoq kafti bo'g'inlarini qimirlatmaslik lozim.", "Singan joyga qo'yiladigan shina yoki uning o'rnini bosuvchi narsani siqib bog'lash kerak.", "Shinani ikki tomondan butun boldir uzunligida tovondan to tizza bo'g'inigacha qo'yish kerak."], "Как накладывается шина или заменяющий ее предмет при переломе костей голени в средней трети для транспортировки пострадавшего?", ["Две шины накладываются с внутренней и наружной сторон ноги от стопы до середины бедра. Необходимо обездвижить место перелома, коленный и голеностопный суставы.", "Шину или заменяющий ее предмет необходимо туго прибинтовать к месту перелома.", "Шина накладывается с двух сторон на всю длину голени от стопы до коленного сустава."], 0, "first_aid", [""]),
q("Son suyagining pastki uchdan bir qismi singanda jarohatlangan odamni transportda tashish uchun taxtakach qanday qo'yiladi?", ["Ikkita taxtakach oyoqning ichki va tashqi tomonidan qo'yiladi. Bittasini oyoq to'pig'idan qo'ltiq-osti chuqurigacha, ikkinchisini to'piqdan chovgacha.", "Ikkita taxtakach oyoqning ikki tomonidan to'piqdan sonning yuqorigi uchdan bir qismigacha (singan joydan 15-20 sm yuqorigacha) qo'yiladi.", "Taxtakachni sonning butun uzunligicha tos-son tizza bo'g'inigacha qo'yib, singan joy bint bilan qattiq bog'lab qo'yiladi."], "Как накладывается шина для транспортировки пострадавшего при переломе нижней трети бедренной кости?", ["Две шины накладываются с внутренней и наружной сторон ноги. Одну от стопы до подмышечной впадины, вторую от стопы до паха.", "Две шины накладываются с двух сторон ноги от стопы до верхней трети бедра (на 15-20 см выше места перелома).", "Шина накладывается на всю длину бедра до тазобедренного сустава, место перелома туго бинтуется."], 0, "first_aid", [""]),
q("O'rtacha xolatda bosh miya va kalla suyagi jarohatlangan jabrlanuvchini transportning qaysi turida tashish kerak?", ["Faqat tez tibbiy yordami mashinasida.", "Yo'lovchi yengil avtomobilida.", "Yo'lovchi yuk avtomobilida."], "На каком виде транспорта необходимо транспортировать пострадавшего с черепно-мозговой травмой средней тяжести?", ["Только в машине скорой медицинской помощи.", "В легковом автомобиле.", "В грузовом автомобиле."], 0, "first_aid", [""]),
q("Jarohatdan bexushlanganda (shok xolatida) birinchi tibbiy yordamni qanday ko'rsatish kerak?", ["Mutloq tinch qo'yish. Boshni tushirish, oyoqlarni ko'tarish, badanni isitish. Qaynoq ichimlik (choy va shu kabilar) berish. Bog'langan jgutni yechmaslik va bo'shatmaslik.", "Kiyim-boshni yechish yoki bo'shatish, toza xavo kelishini ta'minlash. Nashatir spirti xidlatish. Yuzga sovuq suv sepish. Peshonaga va gardanga ilik malxamlar qo'yish."], "Как оказать первую медицинскую помощь при травматическом шоке?", ["Обеспечить полный покой. Опустить голову, приподнять ноги, согреть тело. Дать горячее питье (чай и т.п.). Не снимать и не ослаблять наложенный жгут.", "Снять или расстегнуть одежду, обеспечить приток свежего воздуха. Дать понюхать нашатырный спирт. Побрызгать на лицо холодной водой. Положить на лоб и шею теплые компрессы."], 0, "first_aid", [""]),
q("Sonning yumshoq to'qimalari lat yeganda birinchi tibbiy yordam qanday ko'rsatiladi?", ["Lat yegan joyni qattiq bog'lash, 15-20 daqiqaga muz solingan xalta qo'yish. Oyoqni yuqori ko'tarish, tinch qo'yish.", "Butun oyoqni tarang qilib (pastdan yuqoriga) bog'lash. singandagi kabi shina qo'yish. Bir stakanga yarim choy qoshig'ida ichimlik soda solib ichirish, kasalxonaga jo'natish.", "Oyoqni yumshoq predmetga qo'yish."], "Как оказывается первая медицинская помощь при ушибе мягких тканей бедра?", ["Туго забинтовать место ушиба, приложить пузырь со льдом на 15-20 минут. Приподнять ногу, обеспечить покой.", "Туго забинтовать всю ногу (снизу вверх). Наложить шину как при переломе. Дать выпить пол чайной ложки питьевой соды на стакан воды, отправить в больницу.", "Положить ногу на мягкий предмет."], 0, "first_aid", [""]),
q("Qattiq charchoq boshlanishining asosiy tashqi alomatlari qanday?", ["Ko'z sanchib og'riydi, yuz terisi oqaradi, uyqu bosadi.", "Yuz rangi to'q qizil tusga kiradi, qo'l-oyoqlar soviydi, ongi xiralashadi.", "Mushaklarda xorg'inlik seziladi, quloqlarda shovqin guvillaydi, bosh aylanadi, muzdek yopishqoq ter chiqadi."], "Каковы основные внешние признаки начала сильного утомления?", ["Резь в глазах, бледность кожных покровов лица, сонливость.", "Лицо приобретает темно-красный оттенок, конечности холодеют, сознание мутнеет.", "В мышцах чувствуется усталость, в ушах звенит, кружится голова, выступает холодный липкий пот."], 0, "first_aid", [""]),
q("Agar tiriltirishni (reanimatsiyani) 2 kishi bir vaqtda olib borganda yurakni bilvosita massaj qilish va sun'iy nafas oldirish qanday bajariladi?", ["Ikki marta havo puflanadi, so'ng yurak sohasi 30 marta bosiladi va sh.k.", "Bir marta ko'krak qafasi bosiladi, bir marta havo puflanadi va sh.k.", "2-3 marta havo puflangandan so'ng 15 marta ko'krak qafasi bosiladi."], "Если реанимацию проводят 2 человека одновременно, как выполняется непрямой массаж сердца и искусственное дыхание?", ["Дважды вдувается воздух, затем 30 раз надавливается на область сердца и т.д.", "Один раз надавливается грудная клетка, один раз вдувается воздух и т.д.", "После 2-3 вдуваний воздуха 15 раз надавливается грудная клетка."], 0, "first_aid", [""]),
q("Qon oqishini to'xtatuvchi jgut qo'l-oyoqlarga qanday bog'lanadi?", ["Yaradan 10-15 sm yuqoriga.", "Yaradan 10 -15 sm pastga.", "Bevosita yaraning o'ziga."], "Как накладывается кровоостанавливающий жгут на конечности?", ["На 10-15 см выше раны.", "На 10-15 см ниже раны.", "Непосредственно на саму рану."], 0, "first_aid", [""]),
q("Boshdan jarohatlanishni asosiy alomatlari.", ["Barcha sanab o'tilgan xollar.", "Olingan jarohat oqibatida amneziya-esni yo'qotish va hayotiy omillarni unutishga olib kelishi mumkin.", "Bir necha sekunddan bir necha soatgacha xushsiz bo'lish.", "Bir ikki marotaba qusish yoki og'ir xollarda undan ko'proq marotaba, doimiy ko'ngil aynishi."], "Основные симптомы травмы головы.", ["Все перечисленные случаи.", "В результате полученной травмы возможна амнезия - потеря памяти и забывание жизненно важных факторов.", "Потеря сознания от нескольких секунд до нескольких часов.", "Однократная или двукратная рвота, а в тяжелых случаях и более, постоянная тошнота."], 0, "first_aid", [""]),
q("Qo'l jarohatlanganda jabrlanuvchining ko'ylagi, kiyimi qanday yechilsa to'g'ri bo'ladi?", ["Kiyim-boshni yechishni, sog' qo'ldan boshlash, so'ng kasal qo'lni bo'shatish.", "Kiyim-boshni yechishni kasal qo'ldan boshlash, so'ng sog' qo'lni bo'shatish.", "Kiyim-boshni ikkala qo'ldan bir vaqtda yechish."], "Как правильно снять рубашку, одежду с пострадавшего при травме руки?", ["Начать снимать одежду со здоровой руки, затем освободить больную.", "Начать снимать одежду с больной руки, затем освободить здоровую.", "Снимать одежду с обеих рук одновременно."], 0, "first_aid", [""]),
q("Qaysi xolatlarda jabrlanuvchiga yurak-o'pka reanimatsiyasini boshlash kerak?", ["Xushidan ketishda, nafas olish faoliyati va qon aylanishi to'xtaganda.", "Yurak sohasida og'riq sezilganda va nafas olish qiyinlashganda.", "Xushidan ketishda, nafas olish faoliyatidan qat'iy nazar."], "В каких случаях пострадавшему необходимо начинать сердечно-легочную реанимацию?", ["При потере сознания, остановке дыхания и кровообращения.", "При болях в области сердца и затрудненном дыхании.", "При потере сознания, независимо от дыхательной деятельности."], 0, "first_aid", [""]),
q("Umurtqasining ko'krak qismi shikastlangan kishi transportda qanday tashiladi?", ["Qattiq taxtada orqasi bilan yotgan holda.", "Yumshoq to'shamada orqasi bilan yotgan holda.", "Qattiq taxtada yoni bilan yotgan holda."], "Как транспортируется пострадавший с повреждением грудного отдела позвоночника?", ["Лежа на спине на жестком щите.", "Лежа на спине на мягкой подстилке.", "Лежа на боку на жестком щите."], 0, "first_aid", [""]),
q("Venoz qon tomiridan qon ketish alomatlari qanday?", ["Qon tomirlardan to'q qizil qon sizib oqib chiqadi.", "Pushti rang qon ketishi, tomirda kuchli puls urishi.", "Mayda qon tomirlardan ichki qon ketishi."], "Каковы признаки венозного кровотечения?", ["Из кровеносных сосудов непрерывно вытекает темно-красная кровь.", "Кровотечение розового цвета, сильная пульсация в сосуде.", "Внутреннее кровотечение из мелких кровеносных сосудов."], 0, "first_aid", [""]),
q("Suyak singanda qaysi matodan qotirib bog'lash uchun shina sifatida foydalanish eng qulay?", ["Taxta bo'lagi.", "Bint.", "Gazmol."], "Какой материал наиболее удобен для использования в качестве шины для иммобилизации при переломе кости?", ["Кусок доски.", "Бинт.", "Ткань."], 0, "first_aid", [""]),
q("Benzin bug'idan zaxarlanishning alomatlari qanday?", ["Mastga o'xshab xarakatlanadi, bosh aylanadi, og'riydi, ko'ngil ayniydi, qayt qiladi, mushaklari tortishadi. Nafas olish sekinlashadi.", "Ko'z o'ngi qorong'ilashadi, bosh aylanadi, muvozanat yo'qoladi, yiqiladi. Tomir urishi sekinlashadi. Oyoq-qo'l soviydi."], "Каковы симптомы отравления парами бензина?", ["Ведет себя как пьяный, головокружение, головная боль, тошнота, рвота, мышечные судороги. Дыхание замедляется.", "Потемнение в глазах, головокружение, потеря равновесия, падение. Пульс замедляется. Конечности холодеют."], 0, "first_aid", [""]),
q("Qanday alomatlar charchash belgilari xisoblanadi?", ["Uyquchanlik, bo'shashish, diqqatning susayishi.", "Zo'riqish, asabiylashish.", "Bosh aylanishi, ko'zlarga qum kirgan kabi achishish, terlash alomati."], "Какие симптомы являются признаками утомления?", ["Сонливость, вялость, притупление внимания.", "Напряжение, нервозность.", "Головокружение, резь в глазах как от песка, потливость."], 0, "first_aid", [""]),
q("Agar tiriltirishni (reanimatsiyani) 2 kishi bir vaqtda olib borganda yurakni bilvosita massaj qilish va sun'iy nafas oldirish qanday bajariladi?", ["Ikki marta havo puflanadi, so'ng yurak sohasi 30 marta bosiladi va sh.k.", "2-3 marta havo puflangandan so'ng 15 marta ko'krak qafasi bosiladi.", "Bir marta ko'krak qafasi bosiladi, bir marta havo puflanadi va sh.k."], "Если реанимацию проводят 2 человека одновременно, как выполняется непрямой массаж сердца и искусственное дыхание?", ["Дважды вдувается воздух, затем 30 раз надавливается на область сердца и т.д.", "После 2-3 вдуваний воздуха 15 раз надавливается грудная клетка.", "Один раз надавливается грудная клетка, один раз вдувается воздух и т.д."], 0, "first_aid", [""]),
q("Jabrlanuvchiga uning yurak faoliyati yoki nafas olishi to'xtaganda qanday izchillikda birinchi yordam ko'rsatish zarur?", ["Nafas yo'llarini bo'shatish, sun'iy nafas oldirish va yurakning ustidan massaj qilish.", "Yurakni massaj qilish, nafas yo'llarini bo'shatish, sun'iy nafas oldirish.", "Sun'iy nafas oldirish, yurakni ustidan massaj qilish, nafas yo'llarini bo'shatish."], "В какой последовательности необходимо оказывать первую помощь пострадавшему при остановке сердечной деятельности или дыхания?", ["Освободить дыхательные пути, провести искусственное дыхание и непрямой массаж сердца.", "Массаж сердца, освобождение дыхательных путей, искусственное дыхание.", "Искусственное дыхание, массаж сердца, освобождение дыхательных путей."], 0, "first_aid", [""]),
q("Shok xolati alomatlari:", ["Barcha sanab o'tilgan xollar.", "Teri va shilliq qavatlar oqarishi, kuchli ter ajrashi, og'iz qurishi, chanqoqlik, nafas olishi tezlashuvi.", "Es xushning noaniqligi, bexush xolat."], "Симптомы шокового состояния:", ["Все перечисленные случаи.", "Бледность кожи и слизистых оболочек, сильное потоотделение, сухость во рту, жажда, учащенное дыхание.", "Спутанность сознания, бессознательное состояние."], 0, "first_aid", [""]),
q("Arterial qon ketishi alomatlari.", ["Qon tomirlardan pushti rangli qon kuchli pulsatsiya bilan otilib chiqadi.", "Qon tomirlardan to'q qizil rangli qon otilib chiqadi.", "Mayda qon tomirlardan ichki a'zolarga qon oqib chiqishi."], "Симптомы артериального кровотечения.", ["Из кровеносных сосудов с сильной пульсацией бьет струей кровь алого (светло-красного/розового) цвета.", "Из кровеносных сосудов вытекает темно-красная кровь.", "Кровотечение из мелких кровеносных сосудов во внутренние органы."], 0, "first_aid", [""]),
q("Avtotransport vositasida bo'lgan tibbiyot qutichasida joylashtirilgan 5% li yod eritmasi (yod nastoykasi) nima uchun qo'llaniladi?", ["Yara atrofidagi terini ishlash uchun.", "Yara qattiq chirk olganda yaraning butun yuzasiga surtish uchun.", "Kuchli ishqor keltirib chiqaruvchi birinchi darajali kimyoviy kuyishda teriga surtish uchun."], "Для чего применяется 5% раствор йода (настойка йода), находящийся в автомобильной аптечке?", ["Для обработки кожи вокруг раны.", "Для нанесения на всю поверхность раны при сильном нагноении.", "Для нанесения на кожу при химическом ожоге первой степени, вызванном сильной щелочью."], 0, "first_aid", [""]),
q("Bosh va bo'yindan jarohatlanishda va qattiq chayqalishida birinchi tibbiy yordam qanday ko'rsatiladi?", ["Jarohat olgan shaxsni qattiq va tekkis zambilga solib, bo'yin qismiga qattiq yostiqcha qo'yib, qo'zg'atmasdan, maxkam bog'lab shifoxonaga yuboriladi.", "Jarohatlangan shaxsni bo'yin qismiga qattiq yostiq qo'yib, yon boshlatib yotqizib, qattiq bog'lab va shifoxonaga yuboriladi.", "Og'riqni va ichki qon ketishini kamaytirishda jarohat qismiga sovuq kompress qo'yib, jabrlanuvchini tinchlantirish."], "Как оказывается первая медицинская помощь при травмах головы и шеи и сильном сотрясении?", ["Пострадавшего укладывают на жесткие и ровные носилки, под шею кладут жесткий валик, фиксируют, не двигая, и отправляют в больницу.", "Пострадавшему под шею кладут жесткую подушку, укладывают на бок, туго бинтуют и отправляют в больницу.", "Для уменьшения боли и внутреннего кровотечения на место травмы кладут холодный компресс, успокаивают пострадавшего."], 0, "first_aid", [""]),
q("Shikastlangan kishining o'mrov suyagi singanda nima qilish zarur?", ["Paxta yoki bint o'ramasini qo'ltiq sohasiga qo'yib tirsagidan bukilgan qo'lini gavdasiga qo'shib bint bilan bog'lash.", "Singan joyga sovuq kompress qo'yish, bint bilan tarangroq bog'lash.", "Qo'ltiq sohasiga taxtakach qo'yish va to'g'rilab qo'yilgan qo'lini gavdasiga qo'shib bint bilan bog'lash."], "Что необходимо сделать при переломе ключицы у пострадавшего?", ["Положить валик из ваты или бинта в подмышечную впадину и прибинтовать согнутую в локте руку к туловищу.", "Наложить холодный компресс на место перелома, туго забинтовать.", "В подмышечную впадину положить шину и прибинтовать выпрямленную руку к туловищу."], 0, "first_aid", [""]),
q("Qo'l oyoq uchlari (tirsakdan past qismi, boldir) sinishida transport shinalari yoki ularni qo'lda yasash uchun vositalar bo'lmasa birinchi tibbiy yordam qanday ko'rsatiladi?", ["Qo'llarni tirsakdan bukib, ro'molga osgan xolda tanaga bog'lash, oyoqlarni orasiga albatta yumshoq mato qo'yib bir-biriga bog'lash.", "Qo'llarni tana bo'ylab cho'zgan xolda tanaga bog'lash, oyoqlarni orasiga yumshoq mato qo'yib bir-biriga bog'lash.", "Qo'llarni tirsakdan bukib, ro'molga osgan xolda tanaga bog'lash, oyoqlarni bir-biriga yaxshilab jipslab tekkazib bog'lash."], "Как оказывается первая медицинская помощь при переломах конечностей (ниже локтя, голени), если нет транспортных шин или подручных средств для их изготовления?", ["Согнуть руки в локтях, подвесить на косынке и прибинтовать к туловищу, между ногами обязательно проложить мягкую ткань и связать их вместе.", "Вытянуть руки вдоль тела и прибинтовать к туловищу, между ногами положить мягкую ткань и связать их вместе.", "Согнуть руки в локтях, подвесить на косынке и прибинтовать к туловищу, плотно прижать ноги друг к другу и связать."], 0, "first_aid", [""]),

    const SAVE_KEY = "avto911_progress_v2";
    function saveProgress(){
        try{
            const data={cat:currentCategory,idx:currentIndex,answers:userAnswers,finished:quizFinished,lang:currentLang};
            localStorage.setItem(SAVE_KEY,JSON.stringify(data));
        }catch(e){}
    }
    function loadProgress(){
        try{
            const raw=localStorage.getItem(SAVE_KEY);
            if(!raw) return null;
            return JSON.parse(raw);
        }catch(e){ return null; }
    }
    function clearProgress(){
        localStorage.removeItem(SAVE_KEY);
    }

    let currentCategory = "terms";
    let currentQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let quizFinished = false;
    let shuffleCache = [];
    let resumedFromSave = false;

    function getShuffled(idx){
        if(!shuffleCache[idx]){
            const qq=currentQuestions[idx];
            const n=qq.a_uz.length;
            const indices=Array.from({length:n},(_,i)=>i);
            for(let i=n-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
            shuffleCache[idx]={a_uz:indices.map(i=>qq.a_uz[i]),a_ru:indices.map(i=>qq.a_ru[i]),correct:indices.indexOf(qq.correct)};
        }
        return shuffleCache[idx];
    }
    function resetShuffle(){ shuffleCache=[]; }
    function getByCategory(cat){ return allQuestions.filter(q=>q.category===cat); }
    function getCategories(){ const s=new Set(); allQuestions.forEach(q=>s.add(q.category)); return Array.from(s); }
    function showToast(msg){
        const old=document.querySelector(".toast-msg"); if(old) old.remove();
        const d=document.createElement("div"); d.className="toast-msg"; d.textContent=msg;
        document.body.appendChild(d); setTimeout(()=>d.remove(),2300);
    }

    function showApp(){
        document.getElementById("appRoot").innerHTML=`
            <div class="main-container">

                        <div><div class="logo-text">Drive Pro</div><div class="logo-sub">drive-pro.uz</div></div>
                    </div>
                    <div class="control-panel">
                        <button class="icon-btn" id="themeBtn">☀️ Kunduz</button>
                        <button class="icon-btn exit-btn" id="exitBtn">✕ Chiqish</button>
                    </div>
                </div>
                <div id="catBar" class="category-tabs"></div>
                <div id="quizWrap"></div>
                <footer>${t("footer")}</footer>
            </div>
        `;
    }

    function buildCats(){
        const bar=document.getElementById("catBar"); if(!bar) return;
        bar.innerHTML="";
        const cats=getCategories();
        cats.forEach(cat=>{
            const b=document.createElement("button");
            b.className=`cat-btn${cat===currentCategory?" active":""}`;
            b.setAttribute("data-cat",cat);
            b.textContent=(categoryNames[currentLang]||categoryNames.uz)[cat]||cat;
            b.onclick=()=>{
                if(cat===currentCategory) return;
                clearProgress();
                currentCategory=cat;
                currentQuestions=getByCategory(cat);
                currentIndex=0;
                userAnswers=new Array(currentQuestions.length).fill(null);
                quizFinished=false;
                resetShuffle();
                resumedFromSave=false;
                renderQ();
                document.querySelectorAll(".cat-btn").forEach(x=>x.classList.remove("active"));
                b.classList.add("active");
            };
            bar.appendChild(b);
        });
    }

    function renderImages(imgs){
        if(!imgs||!imgs.length) return '';
        return `<div class="images-gallery">${imgs.map(s=>`<img class="gallery-img" src="${s}" alt="" loading="lazy" onclick="openImgModal(this.src)" onerror="this.style.display='none'">`).join('')}</div>`;
    }

    function renderQ(){
        if(quizFinished||currentIndex>=currentQuestions.length){ renderResults(); return; }
        saveProgress();
        const qq=currentQuestions[currentIndex];
        const sh=getShuffled(currentIndex);
        const qTxt=currentLang==="uz"?qq.q_uz:qq.q_ru;
        const answers=currentLang==="uz"?sh.a_uz:sh.a_ru;
        const saved=userAnswers[currentIndex];
        const wrap=document.getElementById("quizWrap"); if(!wrap) return;
        const pct=Math.round((currentIndex/currentQuestions.length)*100);
        const resumeBadge=resumedFromSave&&currentIndex===0?`<div class="saved-badge">📌 ${t("progress_saved")}</div>`:'';
        wrap.innerHTML=`
            <div class="quiz-card">
                ${resumeBadge}
                <div class="progress-area">
                    <div class="progress-stats">
                        <span>${t("question_word")} ${currentIndex+1} / ${currentQuestions.length}</span>
                        <span>${pct}%</span>
                    </div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
                </div>
                ${renderImages(qq.images)}
                <div class="question-text">${qTxt}</div>
                <div class="answers-grid" id="aGrid"></div>
                <button class="next-btn" id="nextBtn">${currentIndex===currentQuestions.length-1?t("finish_btn"):t("next_btn")}</button>
            </div>
        `;
        const grid=document.getElementById("aGrid");
        answers.forEach((ans,idx)=>{
            const b=document.createElement("button");
            const isAnswered=!!saved;
            const isSel=saved&&saved.selected===idx;
            const isCorr=idx===sh.correct;
            let cls="answer-btn";
            if(isAnswered){ if(isCorr) cls+=" correct-answer"; else if(isSel) cls+=" wrong-answer"; }
            b.className=cls;
            b.innerHTML=`<span class="answer-marker">${String.fromCharCode(65+idx)}</span><span>${ans}</span>`;
            b.onclick=()=>{
                if(quizFinished||userAnswers[currentIndex]) return;
                userAnswers[currentIndex]={selected:idx,isCorrect:idx===sh.correct};
                saveProgress();
                renderQ();
            };
            grid.appendChild(b);
        });
        document.getElementById("nextBtn").onclick=()=>{
            if(!userAnswers[currentIndex]){ showToast(t("select_answer")); return; }
            if(currentIndex+1<currentQuestions.length){ currentIndex++; renderQ(); }
            else{ quizFinished=true; saveProgress(); renderResults(); }
        };
        resumedFromSave=false;
    }

    function renderResults(){
        const total=currentQuestions.length;
        let correct=0; const mistakes=[];
        for(let i=0;i<total;i++){
            const a=userAnswers[i]; if(!a) continue;
            if(a.isCorrect) correct++;
            else{
                const sh=getShuffled(i);
                const qq=currentQuestions[i];
                const qTxt=currentLang==="uz"?qq.q_uz:qq.q_ru;
                const answers=currentLang==="uz"?sh.a_uz:sh.a_ru;
                mistakes.push({n:i,q:qTxt,your:answers[a.selected]||"?",corr:answers[sh.correct]||"?"});
            }
        }
        const pct=total>0?Math.round((correct/total)*100):0;
        const msg=pct>=90?t("perfect"):pct>=70?t("great"):pct>=50?t("good"):t("bad");
        const wrap=document.getElementById("quizWrap"); if(!wrap) return;
        const mHtml=mistakes.length===0?`<p style="color:var(--correct-border);font-weight:600;">🎉 ${t("no_mistakes")}</p>`:
            `<p style="font-weight:700;margin-bottom:10px;font-family:'Oswald',sans-serif;letter-spacing:1px;">${t("mistakes_title")} (${mistakes.length})</p>`+
            mistakes.map(m=>`<div class="mistake-item"><div class="mistake-q">${m.n+1}. ${m.q}</div><div class="mistake-a">${t("your_answer")}: <span style="color:var(--wrong-border)">${m.your}</span></div><div class="mistake-a">${t("correct_answer")}: <span class="mistake-correct">${m.corr}</span></div></div>`).join('');
        wrap.innerHTML=`
            <div class="quiz-card result-card">
                <div class="score-circle"><div class="score-number">${pct}%</div><div class="score-label">NATIJA</div></div>
                <div class="result-msg">${msg}</div>
                <div class="result-detail">
                    <div class="result-stat"><div class="result-stat-val" style="color:var(--correct-border)">${correct}</div><div class="result-stat-lbl">${t("correct_count")}</div></div>
                    <div class="result-stat"><div class="result-stat-val" style="color:var(--wrong-border)">${total-correct}</div><div class="result-stat-lbl">${t("wrong_count")}</div></div>
                    <div class="result-stat"><div class="result-stat-val">${pct}%</div><div class="result-stat-lbl">${t("percent_text")}</div></div>
                </div>
                <div class="mistakes-list">${mHtml}</div>
                <div class="result-btns">
                    <button class="next-btn restart-btn" id="restartBtn">${t("restart_btn")}</button>
                    <button class="next-btn" id="sendBtn">${t("send_btn")}</button>
                </div>
            </div>
        `;
        document.getElementById("restartBtn").onclick=()=>{
            clearProgress();
            currentQuestions=getByCategory(currentCategory);
            currentIndex=0;
            userAnswers=new Array(currentQuestions.length).fill(null);
            quizFinished=false; resetShuffle();
            renderQ();
        };
        document.getElementById("sendBtn").onclick=()=>{
            const catName=(categoryNames[currentLang]||categoryNames.uz)[currentCategory]||currentCategory;
            const txt=`📊 Drive Pro Test:\n✅ ${correct}/${total}\n📈 ${pct}%\n🏷 ${catName}`;
            try{ tg.sendData(JSON.stringify({score:pct,correct,total,category:catName})); }
            catch(e){ alert(txt); }
        };
    }

    function setLang(lang){
        currentLang=lang;
        localStorage.setItem("avto_lang",lang);

            if(cat) b.textContent=(categoryNames[currentLang]||categoryNames.uz)[cat]||cat;
        });
        if(quizFinished) renderResults(); else if(currentQuestions.length>0) renderQ();
    }

    function toggleTheme(){
        const isLight=document.body.classList.toggle("light");
        localStorage.setItem("avto_theme",isLight?"light":"dark");
        const tb=document.getElementById("themeBtn");
        if(tb) tb.innerHTML=isLight?"🌙 Tungi":"☀️ Kunduz";
    }

    function init(){
        // Tema
        const savedTheme=localStorage.getItem("avto_theme");
        if(savedTheme==="light") document.body.classList.add("light");
        showApp();

        // Saqlangan progressni tekshir
        const saved=loadProgress();
        if(saved && saved.cat){
            currentCategory=saved.cat;
            currentQuestions=getByCategory(currentCategory);
            if(saved.idx>0 && saved.idx<currentQuestions.length && !saved.finished){
                currentIndex=saved.idx;
                userAnswers=saved.answers||new Array(currentQuestions.length).fill(null);
                quizFinished=false;
                resumedFromSave=true;
            } else if(saved.finished){
                currentIndex=currentQuestions.length-1;
                userAnswers=saved.answers||[];
                quizFinished=true;
            } else {
                currentIndex=0;
                userAnswers=new Array(currentQuestions.length).fill(null);
            }
            // URL dagi lang parametri har doim progress saveddan USTUN
            const _urlP = new URLSearchParams(window.location.search);
            const _urlL = _urlP.get("lang");
            if (_urlL === "uz" || _urlL === "ru") {
                currentLang = _urlL;
                localStorage.setItem("avto_lang", _urlL);
            } else if(saved.lang) {
                currentLang = saved.lang;
            }
        } else {
            currentCategory="terms";
            currentQuestions=getByCategory(currentCategory);
            userAnswers=new Array(currentQuestions.length).fill(null);
            // Yangi user — URL dagi lang parametrini ishlatish
            const _urlP2 = new URLSearchParams(window.location.search);
            const _urlL2 = _urlP2.get("lang");
            if (_urlL2 === "uz" || _urlL2 === "ru") {
                currentLang = _urlL2;
                localStorage.setItem("avto_lang", _urlL2);
            }
        }

        buildCats();

        const isLight=document.body.classList.contains("light");
        document.getElementById("themeBtn").innerHTML=isLight?"🌙 Tungi":"☀️ Kunduz";
        const lbElement = document.getElementById("langBtn");
        if(lbElement) {
            lbElement.innerHTML=currentLang==="uz"?"🇷🇺 Рус":"🇺🇿 O'zbek";
            lbElement.onclick=()=>setLang(currentLang==="uz"?"ru":"uz");
        }

        document.getElementById("themeBtn").onclick=toggleTheme;
        document.getElementById("exitBtn").onclick=()=>{
            tg.showPopup({title:t("exit_title"),message:t("exit_confirm"),buttons:[{id:"c",type:"default",text:t("continue_text")},{id:"x",type:"destructive",text:t("exit_text")}]},(id)=>{ if(id==="x") tg.close(); });
        };

        if(quizFinished) renderResults(); else renderQ();
        setLang(currentLang);
    }

    init();
})();
</script>
<div id="imgModal" class="img-modal">
  <span class="img-modal-close" onclick="closeImgModal()">&times;</span>
  <img class="img-modal-content" id="imgModalContent">
</div>
<script>
  function openImgModal(src) {
    document.getElementById('imgModalContent').src = src;
    document.getElementById('imgModal').classList.add('show');
  }
  function closeImgModal() {
    document.getElementById('imgModal').classList.remove('show');
  }
  document.getElementById('imgModal').addEventListener('click', function(e) {
    if(e.target === this) closeImgModal();
  });
</script>
</body>
