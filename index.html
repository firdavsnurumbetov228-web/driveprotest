// ---------- QUIZ LOGIC ----------
let currentCategory = "terms"; // boshlang'ich qiymat, keyin initda o'zgaradi
let currentQuestions = [];
let currentIndex = 0;
let userAnswers = [];
let quizFinished = false;

function loadSavedState() {
    const saved = localStorage.getItem("avto_quiz_state");
    if (saved) {
        try {
            const data = JSON.parse(saved);
            // "all" bo'lsa, birinchi kategoriyaga o'zgartirish
            if (data.currentCategory === "all") {
                const firstCat = Object.keys(getUniqueCategories())[0] || "terms";
                currentCategory = firstCat;
            } else {
                currentCategory = data.currentCategory || "terms";
            }
            userAnswers = data.userAnswers || [];
            currentIndex = data.currentIndex || 0;
            quizFinished = data.quizFinished || false;
            return true;
        } catch(e) {}
    }
    return false;
}

function saveState() {
    if (quizFinished) return;
    const state = { currentCategory, userAnswers, currentIndex, quizFinished };
    localStorage.setItem("avto_quiz_state", JSON.stringify(state));
}

function getQuestionsByCategory(cat) {
    return allQuestions.filter(q => q.category === cat);
}

function getUniqueCategories() {
    const cats = new Set();
    allQuestions.forEach(q => cats.add(q.category));
    return cats;
}

function buildCategoryTabs() {
    const cats = getUniqueCategories();
    const categoryNames = {
         terms: "📖 Terminlar", duties: "⚖️ Majburiyatlar", traffic_lights: "🚦 Svetofor", warning_signals: "⚠️ Signal", identification: "🔖 Ajratib ko'rsatish", warning_signs: "⚠️ Ogohlantiruvchi belgilar", priority_signs: "🥇 Ustuvorlik", prohibitory: "🚫 Taqiqlovchi", mandatory: "⬆️ Buyruq beruvchi", info_service: "ℹ️ Axborot & Servis", markings: "〰️ Yo'l chiziqlari", start_direction: "🔄 Harakat boshlash", positioning: "🚗 Joylashish", speed: "🏁 Tezlik", stop_park: "🅿️ To'xtash"
    };
    const container = document.getElementById("categoryBar");
    container.innerHTML = "";
    for (let cat of cats) {
        const btn = document.createElement("button");
        btn.className = `cat-btn ${currentCategory === cat ? "active" : ""}`;
        btn.textContent = categoryNames[cat] || cat;
        btn.onclick = () => {
            if (quizFinished) restartQuiz();
            currentCategory = cat;
            currentQuestions = getQuestionsByCategory(cat);
            currentIndex = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            quizFinished = false;
            saveState();
            renderCurrentQuestion();
            highlightActiveTab();
            showToast(t("saved_progress"));
        };
        container.appendChild(btn);
    }
}

function highlightActiveTab() {
    document.querySelectorAll(".cat-btn").forEach(btn => {
        const catMap = { "📖 Terminlar":"terms", "⚖️ Majburiyatlar":"duties", "🚦 Svetofor":"traffic_lights", "⚠️ Signal":"warning_signals", "🔖 Ajratib ko'rsatish":"identification", "⚠️ Ogohlantiruvchi belgilar":"warning_signs", "🥇 Ustuvorlik":"priority_signs", "🚫 Taqiqlovchi":"prohibitory", "⬆️ Buyruq beruvchi":"mandatory", "ℹ️ Axborot & Servis":"info_service", "〰️ Yo'l chiziqlari":"markings", "🔄 Harakat boshlash":"start_direction", "🚗 Joylashish":"positioning", "🏁 Tezlik":"speed", "🅿️ To'xtash":"stop_park" };
        const btnCat = catMap[btn.textContent];
        if (btnCat === currentCategory) btn.classList.add("active");
        else btn.classList.remove("active");
    });
}

function showToast(msg) {
    const existing = document.querySelector(".toast-msg");
    if(existing) existing.remove();
    const toast = document.createElement("div");
    toast.className = "toast-msg";
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function renderCurrentQuestion() {
    if (quizFinished || currentIndex >= currentQuestions.length) {
        renderResults();
        return;
    }
    const qItem = currentQuestions[currentIndex];
    const lang = currentLang;
    const questionText = lang === "uz" ? qItem.q_uz : qItem.q_ru;
    const answers = lang === "uz" ? qItem.a_uz : qItem.a_ru;
    const savedAnswer = userAnswers[currentIndex] ? userAnswers[currentIndex].selected : null;
    
    const container = document.getElementById("quizAppContainer");
    container.innerHTML = `
        <div class="quiz-card">
            <div class="progress-area">
                <div class="progress-stats"><span>${t("question_word")} ${currentIndex+1}/${currentQuestions.length}</span><span>${Math.round((currentIndex/currentQuestions.length)*100)}%</span></div>
                <div class="progress-bar-bg"><div class="progress-fill" style="width: ${(currentIndex/currentQuestions.length)*100}%"></div></div>
            </div>
            ${qItem.img ? `<img class="question-img" src="${qItem.img}" alt="illustration">` : ""}
            <div class="question-text">${questionText}</div>
            <div class="answers-grid" id="answersGrid"></div>
            <button class="next-btn" id="nextBtn">${currentIndex === currentQuestions.length-1 ? t("finish_btn") : t("next_btn")}</button>
        </div>
    `;
    const grid = document.getElementById("answersGrid");
    answers.forEach((ans, idx) => {
        const btn = document.createElement("button");
        btn.className = `answer-btn ${savedAnswer === idx ? "active-opt" : ""}`;
        btn.innerHTML = `<span class="answer-marker">${String.fromCharCode(65+idx)}</span><span>${ans}</span>`;
        btn.onclick = () => {
            if (quizFinished) return;
            const isCorrect = (idx === qItem.correct);
            userAnswers[currentIndex] = { selected: idx, isCorrect };
            saveState();
            renderCurrentQuestion();
        };
        grid.appendChild(btn);
    });
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.onclick = () => {
        if (userAnswers[currentIndex] === undefined || userAnswers[currentIndex] === null) {
            showToast(t("select_answer"));
            return;
        }
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++;
            saveState();
            renderCurrentQuestion();
        } else {
            quizFinished = true;
            saveState();
            renderResults();
        }
    };
}

function renderResults() {
    const total = currentQuestions.length;
    let correct = 0;
    userAnswers.forEach(ans => { if(ans && ans.isCorrect) correct++; });
    const percent = Math.round((correct/total)*100);
    let message = "";
    if (percent >= 90) message = t("perfect");
    else if (percent >= 70) message = t("great");
    else if (percent >= 50) message = t("good");
    else message = t("bad");
    
    const container = document.getElementById("quizAppContainer");
    container.innerHTML = `
        <div class="quiz-card result-card">
            <div class="score-circle"><div class="score-number">${percent}%</div></div>
            <h3>${message}</h3>
            <div class="result-detail">
                <p>${t("correct_count")}: ${correct}</p>
                <p>${t("wrong_count")}: ${total-correct}</p>
                <p>${t("percent_text")}: ${percent}%</p>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                <button class="next-btn restart-btn" id="restartBtn">${t("restart_btn")}</button>
                <button class="next-btn" id="sendResultBtn">${t("send_btn")}</button>
            </div>
        </div>
    `;
    document.getElementById("restartBtn").onclick = () => restartQuiz();
    document.getElementById("sendResultBtn").onclick = () => sendResultToBot(correct, total, percent);
}

function restartQuiz() {
    currentQuestions = getQuestionsByCategory(currentCategory);
    currentIndex = 0;
    userAnswers = new Array(currentQuestions.length).fill(null);
    quizFinished = false;
    saveState();
    renderCurrentQuestion();
    showToast(t("saved_progress"));
}

function sendResultToBot(correct, total, percent) {
    const text = `📊 AVTOTEST 911 natijalari:\n✅ To‘g‘ri: ${correct}/${total}\n📈 Foiz: ${percent}%\n🏷 Kategoriya: ${currentCategory}`;
    try {
        tg.sendData(JSON.stringify({ result: text, score: percent }));
        tg.showPopup({ title: "Natija", message: "Natija botga yuborildi!", buttons: [{type:"ok"}] });
    } catch(e) {
        alert(text);
    }
}

// ---------- THEME ----------
function initTheme() {
    const savedTheme = localStorage.getItem("avto_theme");
    if (savedTheme === "dark") document.body.classList.add("dark");
    else document.body.classList.remove("dark");
}
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("avto_theme", document.body.classList.contains("dark") ? "dark" : "light");
}

// ---------- LANGUAGE ----------
function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem("avto_lang", lang);
    document.getElementById("langToggleBtn").innerHTML = lang === "uz" ? "🇷🇺 Рус" : "🇺🇿 O'zbek";
    document.getElementById("footerText").innerText = t("footer");
    if (!quizFinished && currentQuestions.length) renderCurrentQuestion();
    else if (quizFinished) renderResults();
    else renderCurrentQuestion();
}

// ---------- EXIT ----------
function exitApp() {
    tg.showPopup({
        title: t("exit_title"),
        message: t("exit_confirm"),
        buttons: [{id:"continue", type:"default", text: t("continue_text")},{id:"exit", type:"destructive", text: t("exit_text")}]
    }, (btnId) => {
        if (btnId === "exit") {
            tg.close();
        }
    });
}

// ---------- INITIALIZE ----------
function init() {
    initTheme();
    // Agar saqlangan holat bo'lmasa yoki "all" bo'lsa, birinchi kategoriyani olamiz
    const saved = loadSavedState();
    if (!saved) {
        // birinchi kategoriyani topish
        const firstCat = Object.keys(getUniqueCategories())[0] || "terms";
        currentCategory = firstCat;
    }
    currentQuestions = getQuestionsByCategory(currentCategory);
    // userAnswers mosligini tekshirish
    if (userAnswers.length !== currentQuestions.length) {
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentIndex = 0;
        quizFinished = false;
        saveState();
    }
    buildCategoryTabs();
    renderCurrentQuestion();
    document.getElementById("themeToggleBtn").onclick = toggleTheme;
    document.getElementById("langToggleBtn").onclick = () => setLanguage(currentLang === "uz" ? "ru" : "uz");
    document.getElementById("exitBtn").onclick = exitApp;
    setLanguage(currentLang);
}

init();
</script>
