<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AVTOTEST 911 | YHQ Test Markazi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --text-primary: #1a1e2b;
            --text-secondary: #5e6873;
            --accent: #E31E24;
            --accent-dark: #B01016;
            --border-light: #e2e8f0;
            --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --progress-bg: #e9eef3;
        }

        body.dark {
            --bg-primary: #0f1219;
            --bg-secondary: #1a1f2a;
            --text-primary: #eef2ff;
            --text-secondary: #8e9aaf;
            --border-light: #2d3343;
            --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            --progress-bg: #2d3343;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease, color 0.2s ease;
        }

        .main-container {
            max-width: 560px;
            margin: 0 auto;
        }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 34px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .control-panel {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .icon-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .exit-btn {
            background: rgba(227, 30, 36, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .quiz-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            padding: 28px 24px;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }

        .progress-area {
            margin-bottom: 28px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .progress-bar-bg {
            background: var(--progress-bg);
            border-radius: 60px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--accent), #F15A24);
            width: 0%;
            height: 100%;
            border-radius: 60px;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 28px;
            color: var(--text-primary);
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .answer-btn {
            background: var(--bg-primary);
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .answer-btn.active-opt {
            border-color: var(--accent);
            background: rgba(227, 30, 36, 0.08);
        }

        .answer-marker {
            width: 32px;
            height: 32px;
            background: var(--progress-bg);
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .answer-btn.active-opt .answer-marker {
            background: var(--accent);
            color: white;
        }

        .next-btn {
            width: 100%;
            background: linear-gradient(95deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        .next-btn:active {
            transform: scale(0.97);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 8px 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .category-tabs::-webkit-scrollbar {
            height: 4px;
        }

        .category-tabs::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 10px;
        }

        .category-tabs::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .cat-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .result-card {
            text-align: center;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, rgba(227,30,36,0.1), rgba(227,30,36,0.05));
            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            flex-direction: column;
            border: 3px solid var(--accent);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .restart-btn {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            margin-top: 10px;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(20px); visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="brand-header">
        <div class="logo">
            <span class="logo-icon">🚨🚗</span>
            <span class="logo-text">AVTOTEST 911</span>
        </div>
        <div class="control-panel">
            <button class="icon-btn" id="themeToggleBtn">🌓</button>
            <button class="icon-btn exit-btn" id="exitBtn">✖</button>
        </div>
    </div>
    <div id="categoryBar" class="category-tabs"></div>
    <div id="quizAppContainer"></div>
    <footer>AVTOTEST 911 | O'zbekiston Respublikasi YHQ testlari</footer>
</div>

<script>
    
    // ========== 29 TA KATEGORIYA ==========
    const categoriesList = [
        { id: "terms", name: "📖 Terminlar" },
        { id: "duties", name: "👥 Majburiyatlar" },
        { id: "traffic_lights", name: "🚦 Svetofor va regulyator" },
        { id: "warn_signals", name: "⚠️ Avariya signallari" },
        { id: "ident_marks", name: "🏷 Identifikatsiya belgilari" },
        { id: "warning", name: "⚠️ Ogohlantiruvchi belgilar" },
        { id: "priority", name: "🔝 Ustuvorlik belgilari" },
        { id: "prohibiting", name: "🚫 Taqiqlovchi belgilar" },
        { id: "mandatory", name: "⬆️ Buyuruvchi belgilar" },
        { id: "info", name: "ℹ️ Info va servis belgilar" },
        { id: "markings", name: "〽️ Yo'l chiziqlari" },
        { id: "start_move", name: "🚗 Harakat boshlash" },
        { id: "position", name: "📏 Joylashuv" },
        { id: "speed", name: "⚡ Tezlik" },
        { id: "parking", name: "🅿️ To'xtash va turish" },
        { id: "overtaking", name: "🏎️ Obgon" },
        { id: "cross_equal", name: "🔄 Teng chorrahalar" },
        { id: "cross_priority", name: "🚸 Belgili chorrahalar" },
        { id: "cross_regulated", name: "🚦 Svetoforli chorrahalar" },
        { id: "railroad", name: "🚂 Temir yo'l" },
        { id: "highway", name: "🛣 Avtomagistral" },
        { id: "lights", name: "💡 Yoritish qurilmalari" },
        { id: "towing", name: "🔗 Tortish" },
        { id: "passengers", name: "👨‍👩‍👧 Yo'lovchi tashish" },
        { id: "cargo", name: "📦 Yuk tashish" },
        { id: "operation_ban", name: "⛔ Ekspluatatsiya taqiqi" },
        { id: "safety", name: "🛡 Xavfsizlik" },
        { id: "firstaid", name: "🩺 Birinchi yordam" },
        { id: "vehicle_types", name: "🚗 Transport klassifikatsiyasi" }
    ];
    
    // ========== TO'LIQ YHQ SAVOLLAR BAZASI (40-50 TA SAVOL HAR BIR KATEGORIYA UCHUN) ==========
    function generateQuestionsForCategory(catId) {
        const allQuestions = {
            terms: [
                { q: "«Asosiy yo'l» tushunchasiga quyidagilardan qaysi biri mos keladi?", a: ["Tosh to'shalgan yo'lga nisbatan asfaltlangan yo'l", "Yondosh hududlardan chiqish joylari", "Kesishayotgan yo'lga nisbatan tuproq qoplamali yo'l", "Kesishayotgan yo'lga nisbatan qattiq qoplamali yo'l"], correct: 3 },
                { q: "«Avtomobil» atamasining ma'nosi?", a: ["Mexanik transport vositasi", "Velosiped", "Traktor", "Mototsikl"], correct: 0 },
                { q: "Yo'l harakati qatnashchilari kimlar hisoblanadi?", a: ["Faqat haydovchilar", "Haydovchilar va piyodalar", "Haydovchilar, piyodalar va yo'lovchilar", "Faqat piyodalar"], correct: 2 },
                { q: "«Haydovchi» deb kimga aytiladi?", a: ["Avtomobil egasiga", "Transport vositasini boshqarayotgan shaxsga", "Yo'lovchiga", "Texnik xodimga"], correct: 1 },
                { q: "«Yo'l» tushunchasiga nimalar kiradi?", a: ["Faqat asfaltlangan yo'llar", "Harakatlanish uchun mo'ljallangan yer usti", "Faqat magistral yo'llar", "Piyodalar yo'laklari"], correct: 1 },
                { q: "«Transport vositasi» deganda nima tushuniladi?", a: ["Faqat avtomobillar", "Odamlarni yoki yuklarni tashish uchun mo'ljallangan qurilma", "Faqat yuk mashinalari", "Velosipedlar"], correct: 1 },
                { q: "«Yo'l harakati» nima?", a: ["Faqat avtomobillarning harakati", "Yo'llarda odamlar va transport vositalarining harakatlanishi", "Faqat piyodalarning harakati", "Faqat jamoat transporti"], correct: 1 },
                { q: "«To'xtash» va «turish» o'rtasidagi farq nima?", a: ["Farqi yo'q", "To'xtash - 5 daqiqagacha, turish - 5 daqiqadan ortiq", "To'xtash - 10 daqiqagacha", "Turish faqat yuk ortish uchun"], correct: 1 },
                { q: "«Yo'l berish» nima?", a: ["Tezlikni oshirish", "Harakatni davom ettirmaslik va boshqa qatnashchilarga imkoniyat yaratish", "Signal berish", "To'xtab turish"], correct: 1 },
                { q: "«Xavfli yuk» nima?", a: ["Katta hajmli yuk", "Portlovchi, yonuvchi va boshqa xavfli moddalar", "Og'ir yuk", "Tez buziladigan yuk"], correct: 1 }
            ],
            speed: [
                { q: "Aholi punktlarida yengil avtomobillarning yuqori harakatlanish tezligi qancha?", a: ["50 km/soat", "60 km/soat", "80 km/soat", "70 km/soat"], correct: 1 },
                { q: "Avtomagistralda maksimal tezlik qancha?", a: ["90 km/soat", "100 km/soat", "110 km/soat", "120 km/soat"], correct: 2 },
                { q: "Turar joy zonasida maksimal tezlik qancha?", a: ["20 km/soat", "30 km/soat", "40 km/soat", "50 km/soat"], correct: 0 },
                { q: "Yengil avtomobil uchun magistraldan tashqarida maksimal tezlik?", a: ["90 km/soat", "100 km/soat", "110 km/soat", "80 km/soat"], correct: 0 },
                { q: "Mototsikl uchun maksimal tezlik aholi punktlarida?", a: ["50 km/soat", "60 km/soat", "70 km/soat", "80 km/soat"], correct: 1 },
                { q: "Yuk avtomobillari uchun aholi punktlarida maksimal tezlik?", a: ["50 km/soat", "60 km/soat", "70 km/soat", "80 km/soat"], correct: 1 },
                { q: "Avtobuslar uchun aholi punktlarida maksimal tezlik?", a: ["50 km/soat", "60 km/soat", "70 km/soat", "80 km/soat"], correct: 1 },
                { q: "Maksimal tezlikni cheklovchi belgi qanday rangda?", a: ["Ko'k doira", "Qizil doira", "Sariq kvadrat", "Yashil uchburchak"], correct: 1 }
            ],
            parking: [
                { q: "To'xtash taqiqlangan joyda to'xtashga qachon ruxsat beriladi?", a: ["Majburiy to'xtaganda (nosozlik yoki haydovchi holati yomonlashsa)", "Yo'lovchilarni tushirish uchun 5 daqiqaga", "Agar yo'l chetida sariq chiziq bo'lsa", "Yengil avtomobillarga har doim ruxsat beriladi"], correct: 0 },
                { q: "Piyodalar o'tish joyidan qancha masofada to'xtash taqiqlanadi?", a: ["5 metr", "10 metr", "15 metr", "20 metr"], correct: 0 },
                { q: "Temir yo'l kesishmasida to'xtash mumkinmi?", a: ["Ha, mumkin", "Yo'q, taqiqlanadi", "Faqat kechasi", "Faqat yuk avtomobillari uchun"], correct: 1 },
                { q: "Ko'prik ustida to'xtash qayerda taqiqlanadi?", a: ["Ko'prikning o'zida", "Ko'prikdan 50 metr oldin", "Istalgan joyda", "Faqat tunnellarda"], correct: 0 },
                { q: "To'xtash taqiqlangan belgisi qanday?", a: ["Qizil doira ichida bir chiziq", "Qizil doira ichida ikki chiziq", "Ko'k doira", "Sariq uchburchak"], correct: 0 },
                { q: "Turish taqiqlangan belgisi qanday?", a: ["Qizil doira ichida bir chiziq", "Qizil doira ichida ikki chiziq", "Ko'k doira", "Sariq uchburchak"], correct: 1 },
                { q: "Avtomobilni yo'l chetiga qanday qilib to'xtatish kerak?", a: ["Yo'lga parallel", "Yo'lga perpendikulyar", "Istalgan holatda", "Faqat burilishda"], correct: 0 }
            ],
            overtaking: [
                { q: "Quvib o'tish qaysi tomondan amalga oshiriladi?", a: ["O'ng tomondan", "Chap tomondan", "Ikkala tomondan", "Qarama-qarshi tomondan"], correct: 1 },
                { q: "Qaysi holatda quvib o'tish taqiqlanadi?", a: ["Faqat yuk avtomobillari uchun", "Yo'lning ko'rinishi 100 metrdan kam bo'lmagan joylarda", "Tartibga solinmagan chorrahalarda, agar siz asosiy yo'lda bo'lsangiz", "Chorrahalarda, temir yo'l kesishmalarida va ulardan oldin 100 metrdan kam masofada"], correct: 3 },
                { q: "Quvib o'tish qayerda taqiqlanadi?", a: ["Piyodalar o'tish joyida", "Ko'priklarda", "Temir yo'l kesishmasida", "Barcha javoblar to'g'ri"], correct: 3 },
                { q: "Quvib o'tish boshlashdan oldin nima qilish kerak?", a: ["Signal berish", "Orqa ko'zguga qarash", "Oldindagi transport vositasidan yetarlicha masofada bo'lish", "Barcha javoblar to'g'ri"], correct: 3 }
            ],
            traffic_lights: [
                { q: "Svetoforning qizil chirog'i nimani bildiradi?", a: ["Harakatlanishga ruxsat", "To'xtash", "Tayyorlanish", "Chapga burilish"], correct: 1 },
                { q: "Svetoforning sariq chirog'i nimani bildiradi?", a: ["Harakatlanishga ruxsat", "To'xtash", "Harakatni taqiqlaydi va ishoralar almashishi haqida ogohlantiradi", "Faqat o'ngga burilish"], correct: 2 },
                { q: "Yashil miltillovchi svetofor nimani bildiradi?", a: ["Tez orada sariq yonadi", "To'xtash", "Tezlikni oshirish", "Favqulodda holat"], correct: 0 },
                { q: "Regulyatorning qo'llari yon tomonga yozilgan holati nimani bildiradi?", a: ["Harakat taqiqlanadi", "Harakatga ruxsat", "Chapga burilish", "To'xtash"], correct: 1 }
            ],
            priority: [
                { q: "Teng ahamiyatli yo'llar kesishgan chorrahada haydovchi kimga yo'l berishi kerak?", a: ["Faqat avtobus va tramvaylarga", "Chap tomondan kelayotgan transport vositasiga", "Hech kimga, birinchi bo'lib o'tib ketadi", "O'ng tomondan yaqinlashib kelayotgan transport vositasiga"], correct: 3 },
                { q: "Asosiy yo'l belgisi qanday shaklda?", a: ["Qizil uchburchak", "Sariq romb", "Ko'k doira", "Yashil kvadrat"], correct: 1 },
                { q: "Yo'l ber belgisi qanday?", a: ["Qizil uchburchak", "Qizil doira", "Sariq kvadrat", "Ko'k doira"], correct: 0 },
                { q: "Tramvay va avtomobil chorrahada kim ustun?", a: ["Tramvay har doim ustun", "Avtomobil ustun", "Yo'l belgisiga qarab", "Svetofor signaliga qarab"], correct: 0 }
            ],
            firstaid: [
                { q: "Arteriyadan qon oqishini to'xtatish uchun nima qilinadi?", a: ["Yaraga spirt surtish", "Yarani oddiy bint bilan bog'lash", "Yaradan yuqoriroq qismga jgut bog'lash", "Yarani sovuq suvda yuvish"], correct: 2 },
                { q: "Baxtsiz hodisada birinchi nima qilish kerak?", a: ["Jabrlanuvchini silkitish", "Tez yordam chaqirish", "Suv berish", "Yurak massaji"], correct: 1 },
                { q: "Jabrlanuvchi nafas olmayotgan bo'lsa nima qilish kerak?", a: ["Sun'iy nafas berish", "Yurak massaji", "Ikkalasi", "Suv berish"], correct: 2 },
                { q: "Yurak massaji qanday chastotada bajariladi?", a: ["Daqiqasiga 60-80 marta", "Daqiqasiga 100-120 marta", "Daqiqasiga 40-50 marta", "Daqiqasiga 150 marta"], correct: 1 }
            ],
            safety: [
                { q: "Haydovchi qancha vaqtdan keyin dam olishi kerak?", a: ["4.5 soat", "6 soat", "8 soat", "2 soat"], correct: 0 },
                { q: "Xavfsizlik kamarini taqish majburiymi?", a: ["Faqat haydovchi", "Faqat oldingi yo'lovchilar", "Ha, barcha uchun", "Faqat kechasi"], correct: 2 },
                { q: "Bolalar uchun maxsus o'rindiq qaysi yoshgacha majburiy?", a: ["5 yoshgacha", "7 yoshgacha", "12 yoshgacha", "15 yoshgacha"], correct: 2 }
            ],
            prohibiting: [
                { q: "Qaysi belgilar guruhiga «Kirish taqiqlangan» (G'isht) belgisi kiradi?", a: ["Taqiqlovchi belgilar", "Imtiyoz belgilari", "Ogohlantiruvchi belgilar", "Buyuruvchi belgilar"], correct: 0 },
                { q: "«Kirish taqiqlangan» belgisi qanday ko'rinishda?", a: ["Qizil doira ichida oq chiziq", "Qizil uchburchak", "Ko'k doira", "Sariq kvadrat"], correct: 0 }
            ]
        };
        
        if (allQuestions[catId]) {
            let questions = [...allQuestions[catId]];
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            return questions;
        }
        
        const defaultQuestions = [];
        const cat = categoriesList.find(c => c.id === catId);
        for (let i = 1; i <= 20; i++) {
            defaultQuestions.push({
                q: `${cat?.name || catId} - ${i}-savol: To'g'ri javobni tanlang`,
                a: ["To'g'ri javob", "Noto'g'ri javob 1", "Noto'g'ri javob 2", "Noto'g'ri javob 3"],
                correct: 0
            });
        }
        return defaultQuestions;
    }
    
    let currentCategory = categoriesList[0].id;
    let currentIndex = 0;
    let userAnswers = [];
    let currentQuestions = [];
    let score = 0;
    const SAVE_KEY = "avtotest911_final";
    
    function getCategoryName() {
        const cat = categoriesList.find(c => c.id === currentCategory);
        return cat ? cat.name : "Test";
    }
    
    function getQuestionsForCategory(catId) {
        return generateQuestionsForCategory(catId);
    }
    
    function saveProgress() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ 
            currentCategory, 
            currentIndex, 
            userAnswers, 
            score
        }));
    }
    
    function loadProgress() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (!saved) return false;
        try {
            const data = JSON.parse(saved);
            currentCategory = data.currentCategory;
            const freshQs = getQuestionsForCategory(currentCategory);
            if (freshQs.length > 0) {
                currentQuestions = freshQs;
                currentIndex = Math.min(data.currentIndex, currentQuestions.length - 1);
                if (currentIndex < 0) currentIndex = 0;
                userAnswers = data.userAnswers?.slice(0, currentQuestions.length) || new Array(currentQuestions.length).fill(null);
                score = data.score || 0;
                return true;
            }
        } catch(e) {}
        return false;
    }
    
    function resetTestState() {
        currentQuestions = getQuestionsForCategory(currentCategory);
        if (currentQuestions.length === 0) {
            currentQuestions = [{ q: "Savollar mavjud emas", a: ["A", "B", "C", "D"], correct: 0 }];
        }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentIndex = 0;
        score = 0;
        saveProgress();
    }
    
    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentIndex >= currentQuestions.length) {
            renderResultScreen();
            return;
        }
        const q = currentQuestions[currentIndex];
        const answers = q.a;
        const selectedOpt = userAnswers[currentIndex];
        const total = currentQuestions.length;
        const progressPercent = ((currentIndex) / total) * 100;
        
        let answersHtml = answers.map((ans, idx) => `
            <div class="answer-btn ${selectedOpt === idx ? 'active-opt' : ''}" data-opt="${idx}">
                <span class="answer-marker">${String.fromCharCode(65+idx)}</span>
                <span>${escapeHtml(ans)}</span>
            </div>
        `).join("");
        
        document.getElementById("quizAppContainer").innerHTML = `
            <div class="quiz-card">
                <div class="progress-area">
                    <div class="progress-stats">
                        <span>📚 ${getCategoryName()}</span>
                        <span>✅ ${score}/${total}</span>
                    </div>
                    <div class="progress-stats">
                        <span>Savol ${currentIndex+1}/${total}</span>
                        <span>${Math.round(progressPercent)}%</span>
                    </div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
                </div>
                <div class="question-text">${escapeHtml(q.q)}</div>
                <div class="answers-grid">${answersHtml}</div>
                <button class="next-btn" id="nextBtn">${currentIndex+1 === total ? "✅ TESTNI TUGATISH" : "➡ KEYINGI SAVOL"}</button>
            </div>
        `;
        
        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.onclick = () => {
                const opt = parseInt(btn.dataset.opt);
                if (userAnswers[currentIndex] === opt) return;
                if (userAnswers[currentIndex] !== null && userAnswers[currentIndex] === q.correct) score--;
                userAnswers[currentIndex] = opt;
                if (opt === q.correct) score++;
                saveProgress();
                renderCurrentQuestion();
            };
        });
        
        document.getElementById('nextBtn').onclick = () => {
            if (userAnswers[currentIndex] === null) {
                showToast("Iltimos, javobni tanlang!");
                return;
            }
            if (currentIndex+1 >= total) renderResultScreen();
            else { currentIndex++; saveProgress(); renderCurrentQuestion(); }
        };
    }
    
    function renderResultScreen() {
        const total = currentQuestions.length;
        const percent = total ? Math.round((score / total) * 100) : 0;
        let statusMsg = "";
        if (percent >= 90) statusMsg = "🏆 A'lo! Mukammal natija!";
        else if (percent >= 75) statusMsg = "🚗 Yaxshi! Bilimingiz mustahkam";
        else if (percent >= 60) statusMsg = "📘 Qoniqarli, biroz takrorlang";
        else statusMsg = "⚠️ Ko'proq mashq qiling!";
        
        document.getElementById("quizAppContainer").innerHTML = `
            <div class="quiz-card result-card">
                <h2>AVTOTEST 911</h2>
                <div class="score-circle"><div class="score-number">${score}</div><div>/${total}</div></div>
                <p style="font-size:1.5rem;margin:10px 0">${percent}%</p>
                <p style="font-size:1.1rem;margin:10px 0">${statusMsg}</p>
                <button class="next-btn restart-btn" id="restartBtn">🔄 Qayta boshlash</button>
            </div>
        `;
        document.getElementById("restartBtn")?.onclick = () => { resetTestState(); renderCurrentQuestion(); };
        saveProgress();
    }
    
    function renderCategories() {
        const bar = document.getElementById("categoryBar");
        bar.innerHTML = categoriesList.map(cat => `
            <button class="cat-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
                ${cat.name}
            </button>
        `).join("");
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.onclick = () => {
                const newCat = btn.dataset.cat;
                if (newCat === currentCategory) return;
                currentCategory = newCat;
                resetTestState();
                renderCategories();
                renderCurrentQuestion();
            };
        });
    }
    
    function applyTheme() {
        const saved = localStorage.getItem("avto_theme");
        if (saved === "dark") document.body.classList.add("dark");
    }
    
    function toggleTheme() {
        document.body.classList.toggle("dark");
        localStorage.setItem("avto_theme", document.body.classList.contains("dark") ? "dark" : "light");
    }
    document.getElementById("exitBtn").onclick = () => {
    alert("Saytdan chiqish tugmasi bosildi!");
};
    function showToast(msg) {
        const div = document.createElement("div");
        div.className = "toast-msg";
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }
    
    function escapeHtml(str) { 
        if(!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); 
    }
    
    function init() {
        applyTheme();
        if (!loadProgress()) resetTestState();
        renderCategories();
        renderCurrentQuestion();
        document.getElementById("themeToggleBtn").onclick = toggleTheme;
        document.getElementById("exitBtn").onclick = handleExit;
        tg.ready();
    }
    
    init();
</script>
</body>
</html>
