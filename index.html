<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AVTOTEST 911 | YHQ Test Markazi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --text-primary: #1a1e2b;
            --text-secondary: #5e6873;
            --accent: #E31E24;
            --accent-dark: #B01016;
            --border-light: #e2e8f0;
            --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            --progress-bg: #e9eef3;
        }

        body.dark {
            --bg-primary: #0f1219;
            --bg-secondary: #1a1f2a;
            --text-primary: #eef2ff;
            --text-secondary: #8e9aaf;
            --border-light: #2d3343;
            --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            --progress-bg: #2d3343;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease, color 0.2s ease;
        }

        .main-container {
            max-width: 560px;
            margin: 0 auto;
        }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 34px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .control-panel {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .icon-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .exit-btn {
            background: rgba(227, 30, 36, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .quiz-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            padding: 28px 24px;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }

        .progress-area {
            margin-bottom: 28px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .progress-bar-bg {
            background: var(--progress-bg);
            border-radius: 60px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--accent), #F15A24);
            width: 0%;
            height: 100%;
            border-radius: 60px;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 28px;
            color: var(--text-primary);
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .answer-btn {
            background: var(--bg-primary);
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .answer-btn.active-opt {
            border-color: var(--accent);
            background: rgba(227, 30, 36, 0.08);
        }

        .answer-marker {
            width: 32px;
            height: 32px;
            background: var(--progress-bg);
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .answer-btn.active-opt .answer-marker {
            background: var(--accent);
            color: white;
        }

        .next-btn {
            width: 100%;
            background: linear-gradient(95deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        .next-btn:active {
            transform: scale(0.97);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 8px 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .category-tabs::-webkit-scrollbar {
            height: 4px;
        }

        .category-tabs::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 10px;
        }

        .category-tabs::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .cat-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .result-card {
            text-align: center;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, rgba(227,30,36,0.1), rgba(227,30,36,0.05));
            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            flex-direction: column;
            border: 3px solid var(--accent);
        }

        .score-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .restart-btn {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            margin-top: 10px;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateY(20px); visibility: hidden; }
        }

        .lang-active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="brand-header">
        <div class="logo">
            <span class="logo-icon">🚨🚗</span>
            <span class="logo-text">AVTOTEST 911</span>
        </div>
        <div class="control-panel">
            <button class="icon-btn" id="themeToggleBtn">🌓</button>
            <button class="icon-btn" id="langToggleBtn">🇺🇿 O'Z</button>
            <button class="icon-btn exit-btn" id="exitBtn">✖</button>

    <div id="categoryBar" class="category-tabs"></div>

</div>

<script>

    tg.expand();
    
    // ========== TIL ==========

    // ========== 29 TA KATEGORIYA ==========
    const categoriesList = [

        { id: "ident_marks", name_uz: "🏷 Identifikatsiya", name_ru: "🏷 Идентификация" },
        { id: "warning", name_uz: "⚠️ Ogohlantiruvchi", name_ru: "⚠️ Предупреждающие" },

        { id: "parking", name_uz: "🅿️ To'xtash", name_ru: "🅿️ Стоянка" },
        { id: "overtaking", name_uz: "🏎️ Obgon", name_ru: "🏎️ Обгон" },

        { id: "cross_priority", name_uz: "🚸 Belgili chorraha", name_ru: "🚸 Знаковый перекресток" },
        { id: "cross_regulated", name_uz: "🚦 Svetoforli", name_ru: "🚦 Регулируемый" },
        { id: "railroad", name_uz: "🚂 Temir yo'l", name_ru: "🚂 ЖД переезд" },
        { id: "highway", name_uz: "🛣 Avtomagistral", name_ru: "🛣 Автомагистраль" },
        { id: "lights", name_uz: "💡 Yoritish", name_ru: "💡 Освещение" },
        { id: "towing", name_uz: "🔗 Tortish", name_ru: "🔗 Буксировка" },
        { id: "passengers", name_uz: "👨‍👩‍👧 Yo'lovchi", name_ru: "👨‍👩‍👧 Пассажиры" },
        { id: "cargo", name_uz: "📦 Yuk", name_ru: "📦 Груз" },

        { id: "firstaid", name_uz: "🩺 Birinchi yordam", name_ru: "🩺 Первая помощь" },
        { id: "vehicle_types", name_uz: "🚗 Klassifikatsiya", name_ru: "🚗 Классификация" }
    ];
    
    // ========== SAVOLLAR BANKI ==========
    const questionsBank = {
        terms: [
            { q_uz: "«Asosiy yo'l» tushunchasiga quyidagilardan qaysi biri mos keladi?", q_ru: "Что понимается под «Главная дорога»?", a_uz: ["Tosh to'shalgan yo'lga nisbatan asfaltlangan yo'l", "Yondosh hududlardan chiqish joylari", "Kesishayotgan yo'lga nisbatan tuproq qoplamali yo'l", "Kesishayotgan yo'lga nisbatan qattiq qoplamali yo'l"], a_ru: ["Асфальтированная дорога по отношению к гравийной", "Выезды с прилегающих территорий", "Грунтовая дорога по отношению к пересекаемой", "Дорога с твердым покрытием по отношению к пересекаемой"], correct: 3 },
            { q_uz: "«Avtomobil» atamasining ma'nosi?", q_ru: "Что означает термин «Автомобиль»?", a_uz: ["Mexanik transport vositasi", "Velosiped", "Traktor", "Mototsikl"], a_ru: ["Механическое транспортное средство", "Велосипед", "Трактор", "Мотоцикл"], correct: 0 },
            { q_uz: "Yo'l harakati qatnashchilari kimlar hisoblanadi?", q_ru: "Кто считается участником дорожного движения?", a_uz: ["Faqat haydovchilar", "Haydovchilar va piyodalar", "Haydovchilar, piyodalar va yo'lovchilar", "Faqat piyodalar"], a_ru: ["Только водители", "Водители и пешеходы", "Водители, пешеходы и пассажиры", "Только пешеходы"], correct: 2 },
            { q_uz: "«Haydovchi» deb kimga aytiladi?", q_ru: "Кто называется «Водитель»?", a_uz: ["Avtomobil egasiga", "Transport vositasini boshqarayotgan shaxsga", "Yo'lovchiga", "Texnik xodimga"], a_ru: ["Владельцу автомобиля", "Лицу, управляющему транспортным средством", "Пассажиру", "Техническому работнику"], correct: 1 }
        ],
        speed: [
            { q_uz: "Aholi punktlarida yengil avtomobillarning yuqori harakatlanish tezligi qancha?", q_ru: "Максимальная скорость легковых автомобилей в населенных пунктах?", a_uz: ["50 km/soat", "60 km/soat", "80 km/soat", "70 km/soat"], a_ru: ["50 км/ч", "60 км/ч", "80 км/ч", "70 км/ч"], correct: 1 },
            { q_uz: "Avtomagistralda maksimal tezlik qancha?", q_ru: "Максимальная скорость на автомагистрали?", a_uz: ["90 km/soat", "100 km/soat", "110 km/soat", "120 km/soat"], a_ru: ["90 км/ч", "100 км/ч", "110 км/ч", "120 км/ч"], correct: 2 },
            { q_uz: "Turar joy zonasida maksimal tezlik qancha?", q_ru: "Максимальная скорость в жилой зоне?", a_uz: ["20 km/soat", "30 km/soat", "40 km/soat", "50 km/soat"], a_ru: ["20 км/ч", "30 км/ч", "40 км/ч", "50 км/ч"], correct: 0 }
        ],
        priority: [
            { q_uz: "Teng ahamiyatli yo'llar kesishgan chorrahada haydovchi kimga yo'l berishi kerak?", q_ru: "На перекрестке равнозначных дорог водитель должен уступить дорогу?", a_uz: ["Faqat avtobus va tramvaylarga", "Chap tomondan kelayotgan transport vositasiga", "Hech kimga, birinchi bo'lib o'tib ketadi", "O'ng tomondan yaqinlashib kelayotgan transport vositasiga"], a_ru: ["Только автобусам и трамваям", "Транспортному средству, приближающемуся слева", "Никому, проезжает первым", "Транспортному средству, приближающемуся справа"], correct: 3 }
        ],
        safety: [
            { q_uz: "Haydovchi qancha vaqtdan keyin dam olishi kerak?", q_ru: "Через какое время водитель должен отдыхать?", a_uz: ["4.5 soat", "6 soat", "8 soat", "2 soat"], a_ru: ["4.5 часа", "6 часов", "8 часов", "2 часа"], correct: 0 },
            { q_uz: "Xavfsizlik kamarini taqish majburiymi?", q_ru: "Обязательно ли пристегиваться ремнем безопасности?", a_uz: ["Faqat haydovchi", "Faqat oldingi yo'lovchilar", "Ha, barcha uchun", "Faqat kechasi"], a_ru: ["Только водителю", "Только передним пассажирам", "Да, всем", "Только ночью"], correct: 2 }
        ],
        parking: [
            { q_uz: "Piyodalar o'tish joyidan qancha masofada to'xtash taqiqlanadi?", q_ru: "На каком расстоянии запрещена остановка перед пешеходным переходом?", a_uz: ["5 metr", "10 metr", "15 metr", "20 metr"], a_ru: ["5 метров", "10 метров", "15 метров", "20 метров"], correct: 0 }
        ],
        firstaid: [
            { q_uz: "Arteriyadan qon oqishini to'xtatish uchun nima qilinadi?", q_ru: "Что делают для остановки артериального кровотечения?", a_uz: ["Yaraga spirt surtish", "Yarani oddiy bint bilan bog'lash", "Yaradan yuqoriroq qismga jgut bog'lash", "Yarani sovuq suvda yuvish"], a_ru: ["Протирают спиртом", "Перевязывают бинтом", "Накладывают жгут выше раны", "Промывают холодной водой"], correct: 2 }
        ],
        overtaking: [
            { q_uz: "Quvib o'tish qayerda taqiqlanadi?", q_ru: "Где запрещен обгон?", a_uz: ["Piyodalar o'tish joyida", "Ko'priklarda", "Temir yo'l kesishmasida", "Barcha javoblar to'g'ri"], a_ru: ["На пешеходном переходе", "На мостах", "На ЖД переезде", "Все ответы верны"], correct: 3 }
        ],
        warning: [
            { q_uz: "Ogohlantiruvchi belgilar qanday shaklda bo'ladi?", q_ru: "Какую форму имеют предупреждающие знаки?", a_uz: ["Qizil uchburchak", "Sariq romb", "Ko'k doira", "Yashil kvadrat"], a_ru: ["Красный треугольник", "Желтый ромб", "Синий круг", "Зеленый квадрат"], correct: 0 }
        ],
        traffic_lights: [
            { q_uz: "Svetoforning qizil chirog'i nimani bildiradi?", q_ru: "Что означает красный сигнал светофора?", a_uz: ["Harakatlanishga ruxsat", "To'xtash", "Tayyorlanish", "Chapga burilish"], a_ru: ["Разрешает движение", "Стоп", "Приготовиться", "Поворот налево"], correct: 1 }
        ]
    };
    
    function getCategoryName() {
        const cat = categoriesList.find(c => c.id === currentCategory);
        if (!cat) return "Test";
        return currentLang === "uz" ? cat.name_uz : cat.name_ru;
    }
    
    function getQuestionsForCategory(catId) {
        if (questionsBank[catId] && questionsBank[catId].length > 0) {
            let questions = [...questionsBank[catId]];
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            return questions.slice(0, Math.min(12, questions.length));
        }
        const defaultQ = {
            q_uz: `${getCategoryName()} - test savoli`,
            q_ru: `${getCategoryName()} - тестовый вопрос`,
            a_uz: ["To'g'ri javob", "Noto'g'ri 1", "Noto'g'ri 2", "Noto'g'ri 3"],
            a_ru: ["Правильный ответ", "Неправильный 1", "Неправильный 2", "Неправильный 3"],
            correct: 0
        };
        return [defaultQ, defaultQ, defaultQ];
    }
    
    let currentCategory = categoriesList[0].id;
    let currentIndex = 0;
    let userAnswers = [];
    let currentQuestions = [];
    let score = 0;
    const SAVE_KEY = "avtotest911_v5";
    
    function saveProgress() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ 
            currentCategory, 
            currentIndex, 
            userAnswers, 
            score,
            currentLang
        }));
    }
    
    function loadProgress() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (!saved) return false;
        try {
            const data = JSON.parse(saved);
            currentCategory = data.currentCategory;
            currentLang = data.currentLang || "uz";
            const freshQs = getQuestionsForCategory(currentCategory);
            if (freshQs.length > 0) {
                currentQuestions = freshQs;
                currentIndex = Math.min(data.currentIndex, currentQuestions.length - 1);
                if (currentIndex < 0) currentIndex = 0;
                userAnswers = data.userAnswers?.slice(0, currentQuestions.length) || new Array(currentQuestions.length).fill(null);
                score = data.score || 0;
                return true;
            }
        } catch(e) {}
        return false;
    }
    
    function resetTestState() {
        currentQuestions = getQuestionsForCategory(currentCategory);
        if (currentQuestions.length === 0) {
            currentQuestions = [{ q_uz: "Savollar mavjud emas", q_ru: "Вопросы отсутствуют", a_uz: ["A", "B", "C", "D"], a_ru: ["A", "B", "C", "D"], correct: 0 }];
        }
        userAnswers = new Array(currentQuestions.length).fill(null);
        currentIndex = 0;
        score = 0;
        saveProgress();
    }
    
    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentIndex >= currentQuestions.length) {
            renderResultScreen();
            return;
        }
        const q = currentQuestions[currentIndex];
        const questionText = currentLang === "uz" ? q.q_uz : q.q_ru;
        const answers = currentLang === "uz" ? q.a_uz : q.a_ru;
        const selectedOpt = userAnswers[currentIndex];
        const total = currentQuestions.length;
        const progressPercent = ((currentIndex) / total) * 100;
        
        let answersHtml = answers.map((ans, idx) => `
            <div class="answer-btn ${selectedOpt === idx ? 'active-opt' : ''}" data-opt="${idx}">
                <span class="answer-marker">${String.fromCharCode(65+idx)}</span>
                <span>${escapeHtml(ans)}</span>
            </div>
        `).join("");
        
        const nextBtnText = (currentIndex+1 === total) ? (currentLang === "uz" ? "✅ TESTNI TUGATISH" : "✅ ЗАВЕРШИТЬ") : (currentLang === "uz" ? "➡ KEYINGI SAVOL" : "➡ СЛЕДУЮЩИЙ");
        
        document.getElementById("quizAppContainer").innerHTML = `
            <div class="quiz-card">
                <div class="progress-area">
                    <div class="progress-stats">
                        <span>📚 ${getCategoryName()}</span>
                        <span>✅ ${score}/${total}</span>
                    </div>
                    <div class="progress-stats">
                        <span>${currentLang === "uz" ? "Savol" : "Вопрос"} ${currentIndex+1}/${total}</span>
                        <span>${Math.round(progressPercent)}%</span>
                    </div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
                </div>
                <div class="question-text">${escapeHtml(questionText)}</div>
                <div class="answers-grid">${answersHtml}</div>
                <button class="next-btn" id="nextBtn">${nextBtnText}</button>
            </div>
        `;
        
        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.onclick = () => {
                const opt = parseInt(btn.dataset.opt);
                if (userAnswers[currentIndex] === opt) return;
                if (userAnswers[currentIndex] !== null && userAnswers[currentIndex] === q.correct) score--;
                userAnswers[currentIndex] = opt;
                if (opt === q.correct) score++;
                saveProgress();
                renderCurrentQuestion();
            };
        });
        
        document.getElementById('nextBtn').onclick = () => {
            if (userAnswers[currentIndex] === null) {
                showToast(currentLang === "uz" ? "Iltimos, javobni tanlang!" : "Пожалуйста, выберите ответ!");
                return;
            }
            if (currentIndex+1 >= total) renderResultScreen();
            else { currentIndex++; saveProgress(); renderCurrentQuestion(); }
        };
    }
    
    function renderResultScreen() {
        const total = currentQuestions.length;
        const percent = total ? Math.round((score / total) * 100) : 0;
        let statusMsg = "";
        if (percent >= 90) statusMsg = currentLang === "uz" ? "🏆 A'lo! Mukammal natija!" : "🏆 Отлично! Превосходный результат!";
        else if (percent >= 75) statusMsg = currentLang === "uz" ? "🚗 Yaxshi! Bilimingiz mustahkam" : "🚗 Хорошо! Знания прочные";
        else if (percent >= 60) statusMsg = currentLang === "uz" ? "📘 Qoniqarli, biroz takrorlang" : "📘 Удовлетворительно, повторите";
        else statusMsg = currentLang === "uz" ? "⚠️ Ko'proq mashq qiling!" : "⚠️ Больше практикуйтесь!";
        
        document.getElementById("quizAppContainer").innerHTML = `
            <div class="quiz-card result-card">
                <h2>AVTOTEST 911</h2>
                <div class="score-circle"><div class="score-number">${score}</div><div>/${total}</div></div>
                <p style="font-size:1.5rem;margin:10px 0">${percent}%</p>
                <p style="font-size:1.1rem;margin:10px 0">${statusMsg}</p>
                <button class="next-btn" id="sendBtn">📨 ${currentLang === "uz" ? "Natijani yuborish" : "Отправить результат"}</button>
                <button class="next-btn restart-btn" id="restartBtn">🔄 ${currentLang === "uz" ? "Qayta boshlash" : "Начать заново"}</button>
            </div>
        `;
        document.getElementById("sendBtn")?.onclick = () => { 
            const result = { score, total, percent, category: currentCategory, lang: currentLang };
            tg.sendData(JSON.stringify(result)); 
            showToast(currentLang === "uz" ? "✅ Natija yuborildi!" : "✅ Результат отправлен!"); 
        };
        document.getElementById("restartBtn")?.onclick = () => { resetTestState(); renderCurrentQuestion(); };
        saveProgress();
    }
    
    function renderCategories() {
        const bar = document.getElementById("categoryBar");
        bar.innerHTML = categoriesList.map(cat => `
            <button class="cat-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
                ${currentLang === "uz" ? cat.name_uz : cat.name_ru}
            </button>
        `).join("");
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.onclick = () => {
                const newCat = btn.dataset.cat;
                if (newCat === currentCategory) return;
                currentCategory = newCat;
                resetTestState();
                renderCategories();
                renderCurrentQuestion();
            };
        });
    }
    
    function applyTheme() {
        const saved = localStorage.getItem("avto_theme");
        if (saved === "dark") document.body.classList.add("dark");
    }
    
    function toggleTheme() {
        document.body.classList.toggle("dark");
        localStorage.setItem("avto_theme", document.body.classList.contains("dark") ? "dark" : "light");
    }
    
    function switchLanguage() {
        currentLang = currentLang === "uz" ? "ru" : "uz";
        localStorage.setItem("avto_lang", currentLang);
        const langBtn = document.getElementById("langToggleBtn");
        langBtn.innerHTML = currentLang === "uz" ? "🇷🇺 RU" : "🇺🇿 O'Z";
        renderCategories();
        saveProgress();
        if (currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
            renderCurrentQuestion();
        } else {
            renderResultScreen();
        }
    }
    
    function handleExit() { tg.close(); }
    
    function showToast(msg) {
        const div = document.createElement("div");
        div.className = "toast-msg";
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }
    
    function escapeHtml(str) { 
        if(!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); 
    }
    
    function init() {
        const savedLang = localStorage.getItem("avto_lang");
        if (savedLang === "ru" || savedLang === "uz") currentLang = savedLang;
        const langBtn = document.getElementById("langToggleBtn");
        langBtn.innerHTML = currentLang === "uz" ? "🇷🇺 RU" : "🇺🇿 O'Z";
        applyTheme();
        if (!loadProgress()) resetTestState();
        renderCategories();
        renderCurrentQuestion();
        document.getElementById("themeToggleBtn").onclick = toggleTheme;
        document.getElementById("langToggleBtn").onclick = switchLanguage;
        document.getElementById("exitBtn").onclick = handleExit;
        tg.ready();
    }
    
    init();
</script>
</body>
</html>
