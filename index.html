<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Drive Pro Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-primary: #000000;
            --bg-secondary: #1a1a22;
            --bg-card: #1e1e28;
            --text-primary: #f0ede8;
            --text-secondary: #9a96a0;
            --accent: #ffffff;
            --accent-dark: #e0e0e0;
            --accent-glow: rgba(255,255,255,0.18);
            --border-light: #2e2e3e;
            --border-accent: rgba(255,255,255,0.35);
            --card-shadow: 0 24px 48px -12px rgba(0,0,0,0.6);
            --progress-bg: #2a2a36;
            --correct-bg: #0d2e1a;
            --correct-border: #2ecc71;
            --wrong-bg: #2e0d0d;
            --wrong-border: #e74c3c;
            --logo-color: #e8b84b;
            --logo-filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.85));
            --logo-glow: rgba(232,184,75,0.4);
            --stripe: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px);
        }
        body.light {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #1a1510;
            --text-secondary: #7a6e5e;
            --accent: #000000;
            --accent-dark: #333333;
            --accent-glow: rgba(0,0,0,0.12);
            --border-light: #e0e0e0;
            --border-accent: rgba(0,0,0,0.4);
            --card-shadow: 0 24px 48px -12px rgba(0,0,0,0.12);
            --progress-bg: #e0e0e0;
            --correct-bg: #eafbf0;
            --correct-border: #27ae60;
            --wrong-bg: #fdeaea;
            --wrong-border: #e74c3c;
            --logo-color: #c49830;
            --logo-filter: none;
            --logo-glow: rgba(196,152,48,0.4);
            --stripe: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.04) 10px, rgba(0,0,0,0.04) 20px);
        }
        body {
            font-family: 'Source Sans 3', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            transition: background 0.3s, color 0.3s;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--stripe);
            pointer-events: none;
            z-index: 0;
        }
        .main-container { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }

        /* HEADER */
        .brand-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 var(--accent-glow);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 36px; }
        .logo-icon img { filter: var(--logo-filter); transition: filter 0.3s; }
        .logo-text {
            font-family: 'Oswald', sans-serif;
            font-weight: 700; font-size: 1.8rem;
            color: var(--logo-color);
            letter-spacing: 1px;
            text-shadow: 0 0 20px var(--logo-glow);
            transition: color 0.3s;
        }
        .logo-sub { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; }
        .control-panel { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .icon-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 8px; padding: 7px 12px;
            font-size: 0.78rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            color: var(--text-primary);
            transition: all 0.2s;
            font-family: inherit;
        }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
        .icon-btn:active { transform: scale(0.96); }
        .exit-btn { border-color: var(--wrong-border); color: var(--wrong-border); }
        .exit-btn:hover { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-border); }

        /* CATEGORY TABS */
        .category-tabs {
            display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap;
            justify-content: flex-start;
            max-height: 160px; overflow-y: auto; padding: 6px 2px;
        }
        .category-tabs::-webkit-scrollbar { width: 4px; height: 4px; }
        .category-tabs::-webkit-scrollbar-track { background: transparent; }
        .category-tabs::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 4px; }
        .cat-btn {
            background: var(--bg-card); border: 1px solid var(--border-light);
            border-radius: 8px; padding: 6px 12px;
            font-size: 0.72rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; color: var(--text-secondary);
            white-space: nowrap; font-family: inherit;
        }
        .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
        .cat-btn.active {
            background: var(--accent); border-color: var(--accent);
            color: var(--bg-primary); box-shadow: 0 0 16px var(--accent-glow);
        }

        /* QUIZ CARD */
        .quiz-card {
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            padding: 26px 22px;
            border: 1px solid var(--border-light);
            transition: all 0.3s;
        }

        /* PROGRESS */
        .progress-area { margin-bottom: 22px; }
        .progress-stats {
            display: flex; justify-content: space-between;
            font-size: 0.8rem; font-weight: 600;
            margin-bottom: 8px; color: var(--text-secondary);
            font-family: 'Oswald', sans-serif; letter-spacing: 0.5px;
        }
        .progress-bar-bg { background: var(--progress-bg); border-radius: 4px; height: 6px; overflow: hidden; }
        .progress-fill {
            background: linear-gradient(90deg, var(--accent-dark), var(--accent));
            width: 0%; height: 100%; border-radius: 4px;
            transition: width 0.4s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* QUESTION */
        .question-number {
            font-family: 'Oswald', sans-serif;
            font-size: 0.75rem; font-weight: 400;
            color: var(--accent); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .question-text {
            font-size: 1.2rem; font-weight: 600;
            line-height: 1.5; margin-bottom: 20px;
            color: var(--text-primary);
        }

        /* IMAGES */
        .images-gallery {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; margin-bottom: 20px;
            background: var(--bg-secondary);
            border-radius: 14px; padding: 10px;
            border: 1px solid var(--border-light);
        }
        .gallery-img {
            max-width: calc(50% - 10px);
            flex: 1 1 auto;
            min-width: 120px;
            max-height: 180px;
            object-fit: contain;
            width: 100%;
            height: auto;
            border-radius: 10px;
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }
        .gallery-img:hover {
            transform: scale(1.02);
        }
        /* IMAGE MODAL */
        .img-modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .img-modal.show { display: flex; animation: fadeIn 0.2s; }
        .img-modal-content {
            max-width: 95%; max-height: 90%;
            border-radius: 8px; object-fit: contain;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
            animation: zoomIn 0.2s;
        }
        .img-modal-close {
            position: absolute; top: 20px; right: 25px;
            color: #fff; font-size: 35px; font-weight: bold;
            cursor: pointer; z-index: 10001; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        @keyframes zoomIn { from {transform:scale(0.95); opacity:0;} to {transform:scale(1); opacity:1;} }
        @media (max-width: 500px) {
            .gallery-img { max-width: 100%; max-height: 150px; }
            .images-gallery { flex-direction: column; align-items: center; }
        }

        /* ANSWERS */
        .answers-grid { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
        .answer-btn {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border-light);
            border-radius: 12px; padding: 13px 16px;
            font-size: 0.95rem; font-weight: 500;
            text-align: left; color: var(--text-primary);
            cursor: pointer; transition: all 0.18s;
            display: flex; align-items: flex-start; gap: 12px;
            font-family: inherit;
        }
        .answer-btn:hover:not(.correct-answer):not(.wrong-answer) {
            border-color: var(--accent);
            background: var(--accent-glow);
            color: var(--accent);
            transform: translateX(3px);
        }
        .answer-btn.correct-answer {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-border);
        }
        .answer-btn.wrong-answer {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: var(--wrong-border);
        }
        .answer-marker {
            width: 26px; height: 26px; min-width: 26px;
            background: var(--progress-bg); border-radius: 6px;
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'Oswald', sans-serif;
        }
        .correct-answer .answer-marker { background: var(--correct-border); color: #fff; }
        .wrong-answer .answer-marker { background: var(--wrong-border); color: #fff; }

        /* NEXT BUTTON */
        .next-btn {
            width: 100%;
            background: linear-gradient(90deg, var(--accent-dark), var(--accent));
            border: none; border-radius: 12px;
            padding: 15px; font-weight: 700;
            font-size: 0.95rem; color: var(--bg-primary);
            cursor: pointer; transition: 0.2s;
            margin-top: 8px; display: flex;
            align-items: center; justify-content: center; gap: 8px;
            font-family: 'Oswald', sans-serif; letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .next-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .next-btn:active { transform: scale(0.98) translateY(0); }
        .restart-btn {
            background: transparent; color: var(--text-primary);
            border: 1.5px solid var(--border-light);
            box-shadow: none;
        }
        .restart-btn:hover { border-color: var(--accent); color: var(--accent); filter: none; }

        /* RESULTS */
        .result-card { text-align: center; }
        .score-wrap {
            position: relative; margin: 20px auto 16px;
            width: 140px; height: 140px;
        }
        .score-circle {
            width: 140px; height: 140px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; flex-direction: column;
            border: 3px solid var(--accent);
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .score-number {
            font-family: 'Oswald', sans-serif;
            font-size: 2.8rem; font-weight: 700; color: var(--accent);
        }
        .score-label { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 1px; }
        .result-msg {
            font-family: 'Oswald', sans-serif;
            font-size: 1.3rem; font-weight: 600;
            color: var(--text-primary); margin-bottom: 16px;
        }
        .result-detail {
            margin: 12px 0; padding: 14px 16px;
            background: var(--bg-secondary); border-radius: 12px;
            border: 1px solid var(--border-light);
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
        }
        .result-stat { text-align: center; }
        .result-stat-val { font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .result-stat-lbl { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .mistakes-list {
            text-align: left; max-height: 320px; overflow-y: auto;
            margin-top: 14px; background: var(--bg-secondary);
            border-radius: 12px; padding: 14px;
            border: 1px solid var(--border-light);
        }
        .mistakes-list::-webkit-scrollbar { width: 4px; }
        .mistakes-list::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 4px; }
        .mistake-item {
            background: var(--bg-card); border-radius: 10px;
            padding: 11px 13px; margin-bottom: 9px;
            border-left: 4px solid var(--wrong-border);
            font-size: 0.88rem;
        }
        .mistake-q { font-weight: 600; margin-bottom: 5px; color: var(--text-primary); }
        .mistake-a { margin-top: 3px; color: var(--text-secondary); }
        .mistake-correct { color: var(--correct-border); font-weight: 600; }
        .result-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 18px; }
        .result-btns .next-btn { flex: 1; min-width: 140px; }

        /* SAVED BADGE */
        .saved-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--accent-glow); border: 1px solid var(--border-accent);
            border-radius: 6px; padding: 4px 10px;
            font-size: 0.72rem; color: var(--accent);
            font-family: 'Oswald', sans-serif; letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* TOAST */
        .toast-msg {
            position: fixed; bottom: 28px; left: 16px; right: 16px;
            background: var(--accent); color: var(--bg-primary);
            padding: 13px 18px; border-radius: 10px;
            text-align: center; font-weight: 700;
            z-index: 1000; font-family: 'Oswald', sans-serif;
            letter-spacing: 0.5px;
            animation: fadeOut 2.2s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity:1; transform:translateY(0); }
            70% { opacity:1; }
            100% { opacity:0; transform:translateY(16px); visibility:hidden; }
        }

        /* LOADING */
        .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:16px; }
        .spinner { width:44px; height:44px; border:3px solid var(--border-light); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        footer { text-align:center; margin-top:18px; font-size:0.68rem; color:var(--text-secondary); letter-spacing:1px; }
    </style>
</head>
<body>
<div id="appRoot"><div class="loading-screen"><div class="spinner"></div><p style="color:var(--text-secondary);font-family:'Oswald',sans-serif;letter-spacing:2px;">YUKLANMOQDA...</p></div></div>
<script>
(function(){
    const tg = window.Telegram?.WebApp || {
        expand:()=>{}, ready:()=>{}, initDataUnsafe:{},
        sendData:()=>{}, showPopup:(o,cb)=>{ alert(o.message); if(cb) cb('ok'); },
        close:()=>{ window.close(); }
    };
    tg.expand();

    const translations = {
        uz: {
            next_btn:"➡ KEYINGI SAVOL", finish_btn:"✅ TESTNI TUGATISH", select_answer:"Iltimos, javobni tanlang!",
            correct_count:"✅ To'g'ri", wrong_count:"❌ Xato", percent_text:"📊 Foiz",
            send_btn:"📨 Natijani yuborish", restart_btn:"🔄 Qayta boshlash",
            exit_confirm:"Chiqmoqchimisiz?", exit_title:"Chiqish", continue_text:"Davom etish", exit_text:"Chiqish",
            saved_progress:"💾 Saqlandi!", perfect:"🏆 MUTLAQ LIDER!", great:"🚗 Ajoyib natija!",
            good:"📘 Yaxshi, takrorlang", bad:"⚠️ Qayta o'qish tavsiya",
            question_word:"SAVOL", footer:"Drive Pro · Intellektual test markazi",
            mistakes_title:"📋 Xatolar ro'yxati", no_mistakes:"🎉 Barcha javoblar to'g'ri!",
            your_answer:"Sizning javobingiz", correct_answer:"To'g'ri javob",
            progress_saved:"📌 Davom ettirilmoqda", progress_fresh:"Yangi boshlandi"
        },
        ru: {
            next_btn:"➡ СЛЕДУЮЩИЙ", finish_btn:"✅ ЗАВЕРШИТЬ", select_answer:"Выберите ответ!",
            correct_count:"✅ Правильных", wrong_count:"❌ Неправильных", percent_text:"📊 Процент",
            send_btn:"📨 Отправить результат", restart_btn:"🔄 Начать заново",
            exit_confirm:"Выйти из теста?", exit_title:"Выход", continue_text:"Продолжить", exit_text:"Выйти",
            saved_progress:"💾 Сохранено!", perfect:"🏆 АБСОЛЮТНЫЙ ЛИДЕР!", great:"🚗 Отлично!",
            good:"📘 Хорошо, повторите", bad:"⚠️ Нужна подготовка",
            question_word:"ВОПРОС", footer:"Drive Pro · 1500+ вопросов · Test markazi",
            mistakes_title:"📋 Список ошибок", no_mistakes:"🎉 Все ответы верны!",
            your_answer:"Ваш ответ", correct_answer:"Правильный ответ",
            progress_saved:"📌 Продолжение", progress_fresh:"Начато заново"
        }
    };
    const params = new URLSearchParams(window.location.search);
    const urlLang = params.get("lang");

    // URL parametri har doim localStorage dan USTUN — til o'zgartirish ishlashi uchun
    if (urlLang === "uz" || urlLang === "ru") {
        localStorage.setItem("avto_lang", urlLang);
    }
    // Telegram WebApp hash (#) orqali ham lang kelishi mumkin
    const hashParams = new URLSearchParams(window.location.hash.replace("#", ""));
    const hashLang = hashParams.get("lang");
    if (hashLang === "uz" || hashLang === "ru") {
        localStorage.setItem("avto_lang", hashLang);
    }
    // Telegram tgWebAppData dan lang olishga urinish
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            const startParam = tg.initDataUnsafe && tg.initDataUnsafe.start_param;
            if (startParam === "lang_ru") {
                localStorage.setItem("avto_lang", "ru");
            } else if (startParam === "lang_uz") {
                localStorage.setItem("avto_lang", "uz");
            }
        }
    } catch(e) {}
let currentLang = localStorage.getItem("avto_lang") || "uz";
    function t(k){ return translations[currentLang][k] || k; }

    // ─── SAVOL YARATUVCHI ───
    function q(uzQ, uzA, ruQ, ruA, correct, cat, images=null){
        // Bo'sh savollarni o'tkazib yuborish
        if(!uzQ || !uzQ.trim() || !ruQ || !ruQ.trim()) return null;
        // Kategoriya noto'g'ri berilgan bo'lsa, ogohlantir
        if(typeof cat !== 'string' || !cat.trim()){
            console.error('Noto\'g\'ri kategoriya:', cat, 'Savol:', uzQ.substring(0,50));
            return null;
        }
        let imgArray = null;
        if(images){
            // Agar images massiv emas, balki string yoki boshqa narsa bo'lsa
            if(Array.isArray(images)){
                imgArray = images.filter(i => typeof i === 'string' && i.trim());
            } else if(typeof images === 'string' && images.trim()){
                imgArray = [images];
            }
        }
        return { q_uz:uzQ, a_uz:uzA, q_ru:ruQ, a_ru:ruA, correct, category:cat, images:imgArray };
    }

    // ─── BARCHA SAVOLLAR ───
    
  const allQuestionsRaw = [
// 1. TERMINLAR (50)
q("“Quyidagi izoh qaysi atamaga tegishli? Texnik nuqson, tashilayotgan yuk, haydovchi va yo‘lovchining holati, yo‘ldagi biror to‘siq tufayli xavf yuzaga kelganda yoxud ob-havo sharoitiga bog‘liq holda transport vositasi harakatini to‘xtatish.", ["“Yo‘l transport hodisasi.","Majburiy to‘xtash.","Yo‘l harakati xavfsizligini ta’minlash."], "К какому термину относится следующее определение? Прекращение движения транспортного средства из-за его технической неисправности или опасности, создаваемой перевозимым грузом, состоянием водителя (пассажира) или появлением препятствия на дороге, а также погодными условиями.", ["Дорожно-транспортное происшествие.","Вынужденная остановка.","Обеспечение безопасности дорожного движения."],1,"terms"),
q("Aholi punkti” atamasi nimani bildiradi?", ["Aholi yashaydigan hududni.","Shahar, qishloq joylari hududini.","Kirish va chiqish yo‘llari 5.22 — 5.25 belgilari bilan belgilangan hududni."], "Что означает термин «Населенный пункт»?", ["Территория, на которой проживает население.","Территория городов и сельских поселений.","Территория, въезды на которую и выезды с которой обозначены знаками 5.22 — 5.25."],2,"terms"),
q("Harakatlanish tasmasi:", ["Yo‘lning relssiz transport vositalari harakati uchun mo‘ljallangan qismi.","Avtomobillarning bir qator bo‘lib harakatlanishi uchun yetarlicha keng bo‘lgan, yo‘l chiziqlari bilan belgilangan yoki belgilanmagan yo‘l qatnov qismining har qanday bo‘ylama bo‘lagi.","Yo‘lning yonma-yon joylashgan qatnov qismlarini ajratuvchi, transport vositalari harakatlanishi yoki to‘xtashi uchun mo‘ljallanmagan, yo‘l sathidan baland va (yoki) 1.1 yotiq chizig‘i bilan belgilangan qismi."], "Полоса движения:", ["Элемент дороги, предназначенный для движения безрельсовых транспортных средств.","Любая из продольных полос проезжей части, обозначенная или не обозначенная разметкой и имеющая ширину, достаточную для движения автомобилей в один ряд.","Элемент дороги, выделенный конструктивно и (или) с помощью разметки 1.1, разделяющий смежные проезжие части и не предназначенный для движения и остановки транспортных средств.","Элемент дороги, выделенный конструктивно и (или) с помощью разметки 1.1, разделяющий смежные проезжие части и не предназначенный для движения и остановки транспортных средств."],1,"terms"),
q("Asosiy yoʻl:", ["Tuproqli yoʻlga nisbatan qattiq qoplamali (asfalt va sement-betonli, tosh va shunga oʻxshashlar yotqizilgan) yoʻl.","Toshli y   oʻlga nisbatan asfalt qoplamali yoʻl.","Ikki boʻlakli yoʻlga nisbatan uch yoki undan koʻp boʻlakli yoʻl.","Barcha javoblar toʻgʻri."], "Главная дорога:", ["Дорога с твердым покрытием (асфальто- и цементобетон, каменные материалы и тому подобное) по отношению к грунтовой дороге.","Дорога с асфальтовым покрытием по отношению к дороге, вымощенной камнем.","Дорога с тремя или более полосами движения по отношению к двухполосной дороге.","Все ответы верны."],0,"terms"),
q("Kimlar 'yo‘l harakati qatnashchisi' deb hisoblanadi?", ["Yo‘l harakati jarayonida transport vositasi haydovchisi, yo‘lovchi yoki piyoda tariqasida bevosita ishtirok etayotgan shaxs.","Yo‘lda bo‘lgan va unda ish bajarmayotgan har qanday shaxs.","Biror bir transport vositasini boshqarayotgan shaxs."], "Кто считается «участником дорожного движения»?", ["Лицо, принимающее непосредственное участие в процессе дорожного движения в качестве водителя транспортного средства, пассажира или пешехода.","Любое лицо, находящееся на дороге и не выполняющее на ней работу.","ицо, управляющее каким-либо транспортным средством."],0,"terms"),
q("Quyidagi javoblardan qaysi birida “Yo‘lovchi” atamasining to‘g‘ri ta’rifi ko‘rsatilgan?", ["Transport vositasidagi barcha shaxslar.","Transport vositasidagi (haydovchidan tashqari) shaxs, shuningdek transport vositasiga kirayotgan (unga chiqib o‘tirayotgan) yoki transport vositasidan chiqayotgan (undan tushayotgan) shaxs.","Har ikkala ta’rif to‘g‘ri."], "В каком из следующих ответов дано верное определение термина «Пассажир»?", ["Все лица, находящиеся в транспортном средстве.","Лицо, находящееся в транспортном средстве (кроме водителя), а также лицо, которое входит в транспортное средство (садится в него) или выходит из транспортного средства (высаживается из него).","Оба определения верны."],1,"terms"),
q("“Quvib o‘tish” atamasi nimani bildiradi?", ["Bir va bir necha transport vositalaridan o‘zib ketish.","Egallab turgan bo‘lakdan qarama-qarshi harakat bo‘lagiga chiqib, bir yoki bir necha transport vositalaridan o‘zib ketish va dastlab egallab turgan bo‘lagiga qaytish.","Egallagan harakatlanish bo‘lagidan chiqib, oldinda harakatlanayotgan transport vositasidan o‘zib ketish."], "Что означает термин «Обгон»?", ["Опережение одного или нескольких транспортных средств.","Опережение одного или нескольких транспортных средств, связанное с выездом из занимаемой полосы на полосу встречного движения и последующим возвращением на ранее занимаемую полосу.","Опережение движущегося впереди транспортного средства с выездом из занимаемой полосы движения."],1,"terms"),
q("Velosipedchilar uchun tasma bu ..?", ["— 'Alohida yo‘l yoki konstruktiv jihatdan qatnov qismi va trotuardan ajratilgan yo‘lning tarkibiy qismi bo‘lib, tegishli yo‘l belgisi bilan belgilanadi'.","— 'Yo‘lning qatnov qismiga u bilan bir sathda bevosita tutashgan, qoplama turi bilan farq qiladigan yoki 1.1 yo‘l chizig‘i yordamida ajratilgan, ushbu Qoidalarga muvofiq harakatlanish, to‘xtash va to‘xtab turish uchun mo‘ljallangan bo‘lagi'.","— Yo‘lning boshqa qismlaridan yo‘l chizig‘i bilan ajratilgan, tegishli yo‘l belgilari bilan belgilangan yo‘l qismi bo‘lib, faqat velosiped va individual harakatlanish vositalari harakatlanishi uchun mo‘ljallangan"], "Полоса для велосипедистов — это ...?", ["— «Отдельная дорога или конструктивно отделенный элемент дороги, предназначенный для движения велосипедистов и обозначенный соответствующим знаком».","— «Элемент дороги, примыкающий непосредственно к проезжей части на одном уровне с ней, отличающийся типом покрытия или выделенный разметкой 1.1, предназначенный для движения, остановки и стоянки в соответствии с Правилами».","— «Полоса движения, отделенная от остальной проезжей части дорожной разметкой и обозначенная соответствующими дорожными знаками, предназначенная для движения только велосипедов и средств индивидуальной мобильности»."],2,"terms"),
q("Hayvonlarni yo‘lda haydab borishga qoidaga ko‘ra ruxsat etiladi:", ["Kunning yorug‘ vaqtida","Kunning qorong‘u vaqtida.","Istalgan vaqtda."], "Перегон скота по дорогам, как правило, разрешается:", ["В светлое время суток.","В темное время суток.","В любое время."],0,"terms"),
q("Qaysi transport vositalari yo‘nalishli transport vositalari hisoblanadi?", ["Avtobuslar.","Belgilangan yo‘nalishi va bekatlari bo‘lgan, yo‘lovchi tashish uchun mo‘ljallangan umumfoydalanishdagi transport vositalari (trolleybus, tramvay, avtobus, yo‘nalishli taksi).","Yo‘lovchilarni tashuvchi istalgan transport vositalari."], "Какие транспортные средства считаются маршрутными транспортными средствами?", ["Автобусы.","Транспортные средства общего пользования (троллейбус, трамвай, автобус, маршрутное такси), предназначенные для перевозки пассажиров и имеющие установленный маршрут с обозначенными местами остановок.","Любые транспортные средства, перевозящие пассажиров."],1,"terms"),
q("O‘zib ketish deb nimaga aytiladi?", ["Transport vositasining bir yo‘nalishda transport vositasi tezligidan ortiq tezlikda harakatlanishi.","Qarama-qarshi yo‘nalishda harakatlanish uchun mo‘ljallangan tasmaga chiqib, so‘ngra ilgari egallagan qatoriga qaytib o‘tish bilan bog‘liq bo‘lgan harakat.","Kam tezlik bilan qo‘shni qatorda harakatlanayotgan bir yoki bir necha transport vositasidan o‘zib ketish."], "Что называется опережением?", ["Движение транспортного средства со скоростью, большей, чем скорость попутного транспортного средства.","Движение, связанное с выездом на полосу встречного движения и последующим возвращением на ранее занимаемую полосу.","Опережение одного или нескольких транспортных средств, движущихся по соседней полосе с меньшей скоростью."],0,"terms"),
q("Qaysi holatda siz majburiy to‘xtashni amalga oshirasiz?", ["Piyodalar o‘tish joyi oldida piyodalarga yo‘l berish uchun to‘xtab.","Texnik nosozlik tufayli yo‘lning qatnov qismida to‘xtab.","Har ikki sabab o‘tilgan hollarda."], "В каком случае вы совершаете вынужденную остановку?", ["Остановка перед пешеходным переходом, чтобы уступить дорогу пешеходам.","Остановка на проезжей части дороги из-за технической неисправности.","В обоих перечисленных случаях."],1,"terms"),
q("Ushbu ko‘rsatilgan yo‘llar nechtadan qatnov qismiga ega?", ["Bittadan.","Ikkitadan","To‘rttadan."], "Сколько проезжих частей имеют данные дороги?", ["По одной.","По две.","По четыре."],1,"terms",["https://pic.conadrogach.pl/zdjecia/galeria-zdjec/6766/a2-autostrada-obwodnica-minska-mazowieckiego0.jpg","https://th.bing.com/th/id/R.8854f99ca4c719a7643650900268abbb?rik=MPoxquyqZxblTQ&riu=http%3a%2f%2fwww.infoz.se%2fpictures%2fmotorvag_linkoping.jpg&ehk=XM%2b9r8WhCDWBifMWqRWrtj4u6V4%2btzsErK4x8qZlqWc%3d&risl=&pid=ImgRaw&r=0"]),
q("Avtomobillarning bir qator bo‘lib harakatlanishi uchun yetarlicha keng bo‘lgan, yo‘l chiziqlari bilan belgilangan yoki belgilanmagan yo‘l qatnov qismining har qanday bo‘ylama tasmasi” - ushbu izoh qaysi atamaga tegishli?", ["Yo‘l yoqasi.","Qatnov qismi.","Harakatlanish tasmasi."], "«Любая из продольных полос проезжей части, обозначенная или не обозначенная разметкой и имеющая ширину, достаточную для движения автомобилей в один ряд» — к какому термину относится данное пояснение?", ["Обочина.","Проезжая часть.","Полоса движения."],2,"terms"),
q("Qaysi transport vositalari yo'nalishli transport vositalari hisoblanadi?", ["Avtobuslar.","Belgilangan yo'nalishi va bekatlari bo'lgan, yo'lovchi tashish uchun mo'ljallangan umumfoydalanishdagi transport vositalari (trolleybus, tramvay, avtobus, yo'nalishli taksi)","Yo'lovchilarni tashuvchi istalgan transport vositalari."], "Какие транспортные средства считаются маршрутными транспортными средствами?", ["Автобусы.","Транспортные средства общего пользования (троллейбус, трамвай, автобус, маршрутное такси), имеющие установленный маршрут и остановки, предназначенные для перевозки пассажиров.","Любые транспортные средства, перевозящие пассажиров."],1,"terms"),
q("Chorraha — bu...", ["Bevosita yo‘lga tutashgan va transport vositalari o‘tib ketishi uchun mo‘ljallanmagan hudud (hovlilar, turar joy dahalari, avtomobil to‘xtab turish joylari, yonilg‘i quyish shoxobchalari, korxona va shunga o‘xshashlar).","Yo‘llarning o‘zaro bir sathda kesishadigan, tutashadigan va ayriladigan joyi.","Yo‘lning relssiz transport vositalari harakati uchun mo‘ljallangan qismi."], "Перекресток — это...", ["Территория, непосредственно прилегающая к дороге и не предназначенная для сквозного движения транспортных средств (дворы, жилые массивы, автостоянки, автозаправочные станции, предприятия и тому подобное).","Место пересечения, примыкания или разветвления дорог на одном уровне.","Часть дороги, предназначенная для движения безрельсовых транспортных средств."],1,"terms"),
q("Qaysi rasmdagi yo‘l ajratuvchi mintaqaga ega?", ["Har ikkisida.","O‘ng tarafdagisida.","Chap tarafdagisida."], "На каком рисунке дорога имеет разделительную полосу?", ["На обоих.","На правом.","На левом."],0,"terms",["https://pic.conadrogach.pl/zdjecia/galeria-zdjec/6766/a2-autostrada-obwodnica-minska-mazowieckiego0.jpg","https://th.bing.com/th/id/R.8854f99ca4c719a7643650900268abbb?rik=MPoxquyqZxblTQ&riu=http%3a%2f%2fwww.infoz.se%2fpictures%2fmotorvag_linkoping.jpg&ehk=XM%2b9r8WhCDWBifMWqRWrtj4u6V4%2btzsErK4x8qZlqWc%3d&risl=&pid=ImgRaw&r=0"]),
q("Yo‘lning qatnov qismi:", ["Yo    ‘lning relssiz transport vositalari harakati uchun mo‘ljallangan qismi.","Yo‘lning avtomobillar harakati uchun mo‘ljallangan qismi.","Yo‘lning transport vositalari harakati uchun mo‘ljallangan qismi."], "Проезжая часть дороги:", ["Элемент дороги, предназначенный для движения безрельсовых транспортных средств.","Часть дороги, предназначенная для движения автомобилей.","Часть дороги, предназначенная для движения транспортных средств."],0,"terms"),
q("Qayta tizilish deb nimaga aytiladi?", ["Dastlabki harakat yo‘nalishini saqlagan holda o‘z harakatlanish tasmasidan boshqa harakatlanish qatoriga o‘tish.","Qatnov qismining maxsus ajratilgan..","Xavf tug‘ilganda yo‘ldagi boshqa harakat qatnashchilarining harakatlanishiga to‘sqinlik qilmaslik uchun haydovchilar tomonidan bajariladigan harakat."], "Что называется перестроением?", ["Выезд из занимаемой полосы или занимаемого ряда с сохранением первоначального направления движения.","Выезд на полосу с реверсивным регулированием...","Маневр, выполняемый водителем для предотвращения помех другим участникам движения при возникновении опасности."],0,"terms"),
q("Quyidagi izoh qaysi atamaga tegishli: 'Dvigatelining ish hajmi 25 sm³ va undan ortiq, lekin 50 sm³ dan oshmaydigan, konstruktiv tezligi soatiga 25 kilometr va undan ortiq, 50 kilometrdan oshmaydigan ikki yoki uch (to‘rt) g‘ildirakli transport vositasi'?", ["Samokat.","Velosiped.","Moped.","Skuter.","Elektromototsikl."], "К какому термину относится следующее определение: 'Двух- или трехколесное (четырехколесное) транспортное средство, объем двигателя которого составляет 25 см³ и более, но не превышает 50 см³, а конструктивная скорость составляет 25 км/ч и более, но не более 50 км/ч'?", ["Самокат.","Велосипед.","Мопед.","Скутер.","Электромотоцикл."],2,"terms"),
q("Aholi punktlariga tegishli yo‘l harakati qoidalari qaerdan boshlanadi?", ["Aholi punkti nomini ko‘rsatuvchi oq rangli 5.22 yo‘l belgisidan boshlab. ","Aholi punkti nomini ko‘rsatuvchi oq 5.22 yoki 5.24 havorang rangli belgidan boshlab.","Yo‘l yuzidagi qurilma va inshootlardan boshlab."], "С какого места начинают действовать требования Правил, относящиеся к населенным пунктам?", ["С дорожного знака 5.22 на белом фоне, указывающего название населенного пункта.","С дорожного знака 5.22 на белом или 5.24 на синем фоне.","Начиная с построек и сооружений на дороге."],0,"terms"),
q("“Imtiyoz” atamasiga tegishli ta’rifni ko‘rsating.", ["Yo‘l harakati qatnashchilariga nisbatan imtiyozi bo‘lgan boshqa yo‘l harakati qatnashchisining harakat yo‘nalishi yoki tezligini o‘zgartirishga majbur etishi mumkin bo‘lgan hollarda harakatni davom ettirmasligini...","Mo‘ljallangan yo‘nalishda boshqa yo‘l harakati qatnashchilariga nisbatan oldin harakatlanish huquqi."], "Укажите определение, соответствующее термину «Приоритет».", ["Требование, означающее, что участник дорожного движения не должен начинать, возобновлять или продолжать движение...","Право на первоочередное движение в намеченном направлении по отношению к другим участникам дорожного движения."],1,"terms"),
q("Qaysi rasmda ajratuvchi mintaqa ko'rsatilgan", ["birinchi rasimda","ikkinchi rasmda","Hamma rasmda ko'rsatilgan"], "На каком рисунке изображена разделительная полоса?", ["На первом рисунке","На втором рисунке","На оба рисунках"],0,"terms",["https://pic.conadrogach.pl/zdjecia/galeria-zdjec/6766/a2-autostrada-obwodnica-minska-mazowieckiego0.jpg","https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiLprWS-igJ6ShisEdtxj-ksD39YDDAZaIJdFwcQ3Kh3-oKdRsf9HgELnBx0iVJLe-i7kofWHNB5qpYt_TWLGSrFWJIH6ViITgaQQqHOhF-At7Bmk5-Y_vXY0yt7qexu1SEvjt2NEI3Q7sl/s1600/16.jpg"]),
q("Velosiped yo‘lkasi bu .............?", ["— 'Alohida yo‘l yoki konstruktiv jihatdan qatnov qismi va trotuardan ajratilgan yo‘lning tarkibiy qismi bo‘lib, tegishli yo‘l belgisi bilan belgilanadi'.","— 'Yo‘lning boshqa qismlaridan yo‘l chizig‘i bilan ajratilgan, tegishli yo‘l belgilari bilan belgilangan yo‘l qismi bo‘lib, faqat velosiped va individual harakatlanish vositalari harakatlanishi uchun mo‘ljallangan'.","— 'Yo‘lning qatnov qismiga u bilan bir sathda bevosita tutashgan, qoplama turi bilan farq qiladigan yoki 1.1 yo‘l chizig‘i yordamida ajratilgan, ushbu Qoidalarga muvofiq harakatlanish, to‘xtash va to‘xtab turish uchun mo‘ljallangan bo‘lagi'."], "Велосипедная дорожка — это ...............?", ["— 'Отдельная дорога или конструктивно отделенный от проезжей части и тротуара элемент дороги, обозначенный соответствующим дорожным знаком'.","— 'Полоса движения, отделенная от остальной проезжей части линией дорожной разметки, предназначенная для движения только велосипедов и средств индивидуальной мобильности'.","— 'Элемент дороги, примыкающий непосредственно к проезжей части на одном уровне с ней, отличающийся типом покрытия или выделенный разметкой 1.1, предназначенный для движения, остановки и стоянки в соответствии с Правилами'."],0,"terms"),
q("Ajratuvchi mintaqa bu...?", ["Yo‘lning relssiz transport vositalari harakati uchun mo‘ljallangan qismi.","yo‘lning yonma-yon joylashgan qatnov qismlarini ajratuvchi, transport vositalari harakatlanishi yoki to‘xtashi uchun mo‘ljallanmagan, yo‘l sathidan ko‘tarilgan yoki maysazor, ariq, maxsus to‘siqlar bilan ajratilgan baland qismi."," Transport vositalari va piyodalar harakatlanishi uchun qurilgan yoki moslashtirilgan va foydalaniladigan yer chizigʻi yoxud sunʼiy qurilma yuzasi. Yoʻl qatnov qismlari, tramvay izlari, trotuarlar, yoʻl yoqalari va ajratuvchi mintaqalarni oʻz ichiga oladi."], "Разделительная полоса это...", ["Элемент дороги, предназначенный для движения безрельсовых транспортных средств.","Элемент дороги, разделяющий смежные проезжие части и не предназначенный для движения или остановки транспортных средств, возвышающийся над уровнем дороги или отделенный газоном, арыком либо специальными ограждениями.","Любая из продольных полос проезжей части дорог, обозначенная или не обозначенная дорожной разметкой и имеющая ширину, достаточную для движения автомобилей в один ряд.",],1,"terms"),
q("'Ruxsat etilgan to‘la vazn' — bu...", ["Transport vositasining yuki, haydovchi va yo‘lovchilari bilan birgalikdagi vazni.","Aslahalangan transport vositasining ishlab chiqargan korxona tomonidan belgilangan, yuksiz, haydovchisiz va yo‘lovchilarsiz eng yuqori vazni.","Aslahalangan transport vositasining ishlab chiqargan korxona tomonidan belgilangan, yuk, haydovchi va yo‘lovchilari bilan birgalikdagi eng yuqori vazni."], "'Разрешенная максимальная масса' — это...", ["Фактическая масса транспортного средства с грузом, водителем и пассажирами.","Максимальная масса снаряженного транспортного средства, установленная предприятием-изготовителем без груза, водителя и пассажиров.","Масса снаряженного транспортного средства с грузом, водителем и пассажирами, установленная предприятием-изготовителем в качестве максимально допустимой."],2,"terms"),
q("Ushbu yo‘l nechta qatnov qismiga ega?", ["1 ta.","2 ta "," 3 ta"], "Сколько частей движения имеет эта дорога?", ["одна","две","три"],0,"terms",["https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiLprWS-igJ6ShisEdtxj-ksD39YDDAZaIJdFwcQ3Kh3-oKdRsf9HgELnBx0iVJLe-i7kofWHNB5qpYt_TWLGSrFWJIH6ViITgaQQqHOhF-At7Bmk5-Y_vXY0yt7qexu1SEvjt2NEI3Q7sl/s1600/16.jpg"]),
q("Xavfsiz oraliq masofani ko‘rsating.", ["a-в","б","в"], "Укажите безопасную дистанцию.", ["а-в","б","в"],1,"terms",["https://avatars.mds.yandex.net/i?id=94f4a42c3ae6013cca4b76f2d9b6d4047bab4e55-10401675-images-thumbs&n=13"]),
q("Piyodalar yo‘lkasi — bu...", ["Yo‘l qatnov qismining piyodalar kesib o‘tishi uchun mo‘ljallangan, 5.16.1, 5.16.2 yo‘l belgilari va 1.14.1-1.14.3 yo‘l chiziqlari bilan ajratilgan bo‘lagi.","Yo‘lning piyodalar harakatlanishi uchun mo‘ljallangan va transport vositalari harakati taqiqlangan qismi.","Qatnov qismiga tutashgan yoki undan maysazor, ariq, maxsus to‘siqlar bilan ajratilgan va piyodalarning harakatlanishi uchun mo‘ljallangan yo‘l qismi."], "Пешеходная дорожка это...", ["Участок проезжей части дороги, предназначенный для перехода пешеходов, обозначенный дорожными знаками 5.16.1, 5.16.2 и дорожной разметкой 1.14.1-1.14.3.","Часть дороги, предназначенная для движения пешеходов, на которой движение транспортных средств запрещено.","Часть дороги, примыкающая к проезжей части или отделенная от нее газоном, арыком, специальными ограждениями и предназначенная для движения пешеходов."],1,"terms"),
q("Quyidagi izoh qaysi axtamaga tegishli: «Elektrodvigatelining quvvati 4 kVt va undan oshadigan, tezligi 50 km/soat va undan oshadigan...»?", ["Velosiped","Moped","Elektromototsikl","Skuter","Mototsikl","Individual harakatlanish vositalari"], "К какому термину относится: «Мощность электродвигателя 4 кВт и более, скорость 50 км/ч и более...»?", ["Велосипед","Мопед","Электромотоцикл","Скутер","Мотоцикл","Средства индивидуального передвижения"],2,"terms"),
q("Avtomobillarning bir qator bo'lib harakatlanishi uchun yetarli keng bo'lgan yo'l qismining har qanday bo'ylama bo'lagi nima deyiladi?", ["Qatnov qismi","Harakatlanish tasmasi","Yo'l yoqasi","Endosh hudud"], "Как называется любая из продольных полос проезжей части, достаточная для движения автомобилей в один ряд?", ["Проезжая часть","Полоса движения","Обочина","Прилегающая территория"],1,"terms"),
q("Quyidagi izoh qaysi atamaga tegishli: «Elektrodvigatelining quvvati 0,25 kVt dan 4 kVt gacha, tezligi 25 dan 50 km/soat gacha...»?", ["Mototsikl","Moped","Skuter","Velosiped","Elektromototsikl"], "К какому термину относится: «Мощность электродвигателя от 0,25 до 4 кВт, скорость от 25 до 50 км/ч...»?", ["Мотоцикл","Мопед","Скутер","Велосипед","Электромотоцикл"],2,"terms"),
q("To'siq deb nimaga aytiladi?", ["Yo'lning qatnov qismida harakatsiz holda bo'lgan jism","Tirbandlik tufayli to'xtab turgan transport vositasi","Yo'l harakati xavfsizligiga xavf soluvchi har qanday omil"], "Что называется препятствием?", ["Неподвижный объект на проезжей части дороги","Транспортное средство, остановившееся из-за затора","Любой фактор, создающий угрозу безопасности"],0,"terms"),
q("M toifadagi avtotransport vositalari bu:", ["Kamida to'rt g'ildirakka ega bo'lgan va yo'lovchilarni tashish uchun foydalaniladigan mexanik transport vositalari","Yuk tashish uchun mo'ljallangan, vazni 3,5 t. dan oshmaydigan transportlar","Tirkamalar (yarim tirkamalar ham)"], "Автотранспортные средства категории М — это:", ["Механические ТС, имеющие не менее четырех колес и предназначенные для перевозки пассажиров","Транспорт для перевозки грузов массой до 3,5 т","Прицепы (в том числе полуприцепы)"],0,"terms"),
q("Quvib o'tish bu:", ["Egallagan harakatlanish bo'lagidan chiqib, oldindagi transportdan o'zib ketish","Egallab turgan bo'lakdan qarama-qarshi bo'lakka chiqib o'zib ketish va yana qaytib kelish","Kam tezlik bilan qo'shni bo'lakda ketayotgan transportdan o'zib ketish"], "Обгон — это:", ["Опережение движущегося впереди ТС с выездом из занимаемой полосы","Опережение ТС с выездом на полосу встречного движения и последующим возвращением на свою полосу","Опережение ТС, движущихся по соседней полосе с меньшей скоростью"],1,"terms"),
q("Piyodalar o'tish joyi-bu...", ["1. Yo'l qatnov qismining piyodalar kesib o'tishi uchun mo'ljallangan, 5.16.1, 5.16.2 yo'l belgilari va 1.14.1-1.14.3 yo'l chiziqlari bilan ajratilgan bo'lagi.", "2. Yo'lning piyodalar harakatlanishi uchun mo'ljallangan va transport vositalari harakati taqiqlangan qismi.", "3. Qatnov qismiga tutashgan yoki undan maysazor, ariq, maxsus to'siqlar bilan ajratilgan va piyodalarning harakatlanishi uchun mo'ljallangan yo'l qismi."], "Пешеходный переход - это...", ["Участок проезжей части, предназначенный для движения пешеходов через дорогу, выделенный дорожными знаками 5.16.1, 5.16.2 и дорожной разметкой 1.14.1-1.14.3.", " Часть дороги, предназначенная для движения пешеходов, движение транспортных средств по которой запрещено.", " Часть дороги, примыкающая к проезжей части или отделенная от нее газоном, арыком, специальными ограждениями и предназначенная для движения пешеходов."], 0, "terms"),
q("Quyidagi izoh qaysi atamaga tegishli? Texnik nuqson, tashilayotgan yuk, haydovchi va yo'lovchining holati, yo'ldagi biror to'siq tufayli xavf yuzaga kelganda yoxud ob-havo sharoitiga bog'liq holda transport vositasi harakatini to'xtatish.", ["1. Yo'l transport hodisasi.", "2. Yo'l harakati xavfsizligini ta'minlash.", "3. Majburiy to'xtash."], "К какому термину относится следующее определение? Прекращение движения транспортного средства из-за технической неисправности, опасности, создаваемой перевозимым грузом, состоянием водителя и пассажира, препятствием на дороге либо в зависимости от погодных условий.", ["Дорожно-транспортное происшествие.", " Обеспечение безопасности дорожного движения.", " Вынужденная остановка."], 2, "terms"),
q("Quyidagi izoh qaysi atamaga tegishli: — \"Mulk huquqi asosida yoki boshqa qonuniy asoslarda transport vositasiga egalik qiladigan, qonunchilikka muvofiq yo'lovchilarni hamda ularning mol-mulkini tijorat asosida tashish bo'yicha xizmatlar ko'rsatadigan va buning uchun tegishli litsenziyaga ega bo'lgan yoxud ruxsat etish xususiyatiga ega hujjati bo'lgan yuridik shaxs yoki yakka tartibdagi tadbirkor\".", [" Velosipedchi.", "Yo'lovchi.", " Tashuvchi.", " Haydovchi."], "К какому термину относится следующее определение: — \"Юридическое лицо или индивидуальный предприниматель  владеющее транспортным средством на праве собственности или иных законных основаниях, оказывающее в соответствии с законодательством услуги по перевозке пассажиров и их имущества на коммерческой основе и имеющее для этого соответствующую лицензию либо документ разрешительного характера\".", [" Велосипедист.", " Пассажир.", " Перевозчик.", " Водитель."], 2, "terms"),
q("Belgilangan yo'nalishdagi transport vositalariga kiradi:", [" Avtobuslar va yo'nalishli taksilar.", " Tramvaylar va trolleybuslar.", " Belgilangan yo'nalish bo'yicha harakatlanadigan avtobuslar, trolleybuslar, tramvaylar va yo'nalishli taksilar."], "К маршрутным транспортным средствам относятся:", [" Автобусы и маршрутные такси.", " Трамваи и троллейбусы.", " Автобусы, троллейбусы, трамваи и маршрутные такси, движущиеся по установленному маршруту."], 2, "terms"),
q("Yondosh hudud bu — ...?", [" Bevosita yo'lga tutashgan va transport vositalari o'tib ketishi uchun mo'ljallanmagan hudud (hovlilar, turar joy daxalari, avtomobil to'xtab turish joylari, yonilg'i quyish shoxobchalari, korxona va shunga o'xshashlar).", " Yo'llarning o'zaro bir sathda kesishadigan, tutashadigan va ayriladigan joyi.", " Yo'lning relssiz transport vositalari harakati uchun mo'ljallangan qismi."], "Прилегающая территория это — ...?", [" Территория, непосредственно прилегающая к дороге и не предназначенная для сквозного движения транспортных средств (дворы, жилые массивы, автостоянки, АЗС, предприятия и тому подобное).", "Место пересечения, примыкания или разветвления дорог на одном уровне.", " Часть дороги, предназначенная для движения безрельсовых транспортных средств."], 0, "terms"),
q("Mexanik transport vositasi — bu...", ["Odamlarni, yuklarni tashishga yoki maxsus ishlarni bajarishga mo‘ljallangan qurilma","Mexanik transport vositasi tarkibida harakatlanishga mo‘ljallangan, dvigatel bilan jihozlanmagan transport vositasi. Bu atama yarim tirkama va uzaytiriladigan tirkamalarga ham taalluqlidir.","Dvigatel bilan harakatga keltiriladigan transport vositasi. Bu atama barcha traktor va o‘ziyurar moslamalarga ham taalluqlidir."], "Механическое транспортное средство — это...", ["Устройство, предназначенное для перевозки людей, грузов или выполнения специальных работ.","Транспортное средство, не оборудованное двигателем и предназначенное для движения в составе с механическим транспортным средством. Этот термин также распространяется на полуприцепы и прицепы-роспуски.","Транспортное средство, приводимое в движение двигателем. Этот термин также распространяется на любые тракторы и самоходные механизмы."],2,"terms"),
q("Qaysi yo'l asosiy yo'l hisoblanadi?", ["Tuproqli yo‘lga nisbatan qoplamali yo‘l yoki tegishli belgilar bilan belgilangan yo‘l.","Uch tomonlama chorrahada tutashib kelgan yo‘lga nisbatan har ikki tomonga davom etuvchi yo‘l.","Har bir yo‘nalishda harakatlanish uchun bir bo‘lakli yo‘lga nisbatan ko‘p bo‘lakli qatnov qismi bo‘lgan yo‘l."], "Какая дорога считается главной?", ["Дорога с покрытием по отношению к грунтовой или дорога, обозначенная соответствующими знаками.","Дорога, продолжающаяся в обе стороны, по отношению к примыкающей дороге на трехстороннем перекрестке.","Дорога с проезжей частью, имеющей больше полос для движения, чем дорога с одной полосой в каждом направлении."],0,"terms"),
q("“Avtomobillarning bir qator bo‘lib harakatlanishi uchun yetarli keng bo‘lgan, yo‘l chiziqlari bilan belgilangan yoki belgilanmagan yo‘l qatnov qismining har qanday bo‘ylama tasmasi” - ushbu izoh qaysi atamaga tegishli?", ["Yo‘l yoqasi.","Qatnov qismi.","Harakatlanish tasmasi."], "«Любая из продольных полос проезжей части дороги, обозначенная или не обозначенная разметкой и имеющая ширину, достаточную для движения автомобилей в один ряд» — к какому термину относится данное описание?", ["Обочина.","Проезжая часть.","Полоса движения."],2,"terms"),
q("“Dvigatelining ish hajmi 50 cm^3 va undan oshadigan, konstruktiv tezligi soatiga 50 kilometr va undan oshadigan, yon tirkamasiz yoki yon tirkamali (kajavali) ikki yoxud uch (to‘rt) g‘ildirakli transport vositasi”.", ["Skuter.","Velosiped.","Moped.","Elektromototsikl.","Mototsikl."], "«Двух- или трехколесное (четырехколесное) транспортное средство с боковым прицепом или без него, имеющее двигатель с рабочим объемом 50 см^3 и более и конструктивную скорость 50 км/ч и более» — к какому термину относится данное описание?", ["Skuter.","Velosiped.","Moped.","Elektromototsikl.","Mototsikl."],4,"terms"),
q("Yo‘l harakati xavfsizligini ta’minlash:",["Yo‘l-transport hodisalarining kelib chiqish sabablarini oldini olishga, ularning og‘ir oqibatlarini kamaytirishga qaratilgan faoliyat.","Yo‘llarda harakatni boshqarish bo‘yicha huquqiy, tashkiliy-texnikaviy tadbirlar va boshqaruv harakatlari majmui.","Обеспечение безопасности дорожного движения:","Деятельность, направленная на предупреждение причин возникновения дорожно-транспортных происшествий, снижение тяжести их последствий.","Совокупность правовых, организационно-технических мероприятий и распорядительных действий по управлению движением на дорогах.",],0,"terms"),
q("Yo‘l-transport hodisasi — ....", ["Transport vositasining yo‘lda harakatlanishi jarayonida ro‘y bergan, fuqarolarning halok bo‘lishiga yoki sog‘lig‘iga zarar yetishiga, transport vositalari, inshootlar, yuklarning shikastlanishi yoxud boshqa moddiy zarar yetishiga sabab bo‘lgan hodisa.","Yo‘l harakati qatnashchilarining yo‘l-transport hodisalari va ularning oqibatlaridan himoyalanganlik darajasini aks ettiruvchi yo‘l harakati holati.",], "Дорожно-транспортное происшествие — ....", ["Событие, возникшее в процессе движения по дороге транспортного средства и с его участием, при котором погибли или ранены люди, повреждены транспортные средства, сооружения, грузы либо причинен иной материальный ущерб.","Состояние дорожного движения, отражающее степень защищенности участников дорожного движения от дорожно-транспортных происшествий и их последствий.",],0,"terms"),
q("Quyidagi izoh qaysi atamaga tegishli:'Dvigatel (dvigatellar) (elektrosamokat, elektr skeytbordlar, segveylar, unitsikllar, monog‘ildirak va boshqa shunga o‘xshash vositalar) yordamida odamning individual harakatlanishi uchun mo‘ljallangan bir yoki bir necha g‘ildiraklari (roliklari) bo‘lgan transport vositasi'.", ["Individual harakatlanish vositalari.", "Velosiped.", "Skuter.","Moped."], "К какому термину относится следующее определение: 'Транспортное средство, имеющее одно или несколько колес (роликов), предназначенное для индивидуального передвижения человека с помощью двигателя (двигателей) (электросамокаты, электроскейтборды, гироскутеры, сигвеи, моноколеса и иные аналогичные средства)'.", ["Средства индивидуальной мобильности.", "Велосипед.", "Скутер.","Мопед."],0,"terms"),
q("Quyidagi javoblardan qaysi birida “Xavf” atamasining toʻgʻri taʼrifi koʻrsatilgan?", ["Yoʻl harakati xavfsizligiga xavf soluvchi har qanday omil.","Yoʻl harakati qatnashchilarining yoʻnalishini oʻzgartirishga majbur qiladigan har qanday toʻsiq.","Yoʻl harakati jarayonidan oʻsha yoʻnalishda va oʻsha tezlikda harakatlanishni davom ettirish yoʻl transport hodisasi sodir boʻlishiga tahdid soladigan omil."], "В каком из следующих ответов дано правильное определение термина «Опасность»?", ["Любой фактор, представляющий угрозу безопасности дорожного движения.","Любое препятствие, вынуждающее участников дорожного движения изменить направление.","Фактор в процессе дорожного движения, при котором продолжение движения в том же направлении и с той же скоростью создает угрозу возникновения"],0,"terms"),
q("Quyidagi izoh qaysi atamaga tegishli: — 'Transport vositasiga mulk huquqi yoki boshqa ashyoviy huquqlar asosida egalik qiluvchi yuridik yoki jismoniy shaxs'.", ["Tashuvchi.", "Haydovchi.", "Transport vositasining egasi.","Yo‘l harakati ishtirokchisi."], "К какому термину относится следующее пояснение: — «Юридическое или физическое лицо, владеющее транспортным средством на праве собственности или иных вещных правах».", ["Перевозчик.", "Водитель.", "Владелец транспортного средства.","Участник дорожного движения."],2,"terms"),

q("Haydovchi yoʻl-transport hodisasida shikastlangan transport vositasini shatakka olish uchun yuk avtomobilini militsiya xodimi ixtiyoriga qanday holda berishi kerak?", ["Faqat shu holdaki, agar shatakka olish yoʻl-yoʻlakay yoʻnalishda amalga oshirilsa.","Har qanday holda berishi kerak.","Haydovchining istagi boʻyicha."], "В каком случае водитель должен предоставить грузовой автомобиль сотруднику милиции для буксировки транспортного средства, поврежденного при дорожно-транспортном происшествии?", ["Только в том случае, если буксировка осуществляется в попутном направлении.","Должен предоставить в любом случае.","По желанию водителя."],1,"duties"),
q("Haydovchiga transport vositasini boshqarish vaqtida telefondan foydalanishga ruxsat etiladimi?", ["Ruxsat etiladi.", "Qo'lni ishlatmasdan texnik vositalardan foydalanib gaplashishga ruxsat etiladi.", "20 km/soat tezlikda harakatlanayotganda ruxsat etiladi.", "Taqiqlanadi."], "Разрешается ли водителю пользоваться телефоном во время управления транспортным средством?", ["Разрешается.", "Разрешается пользоваться, используя технические устройства, позволяющие вести переговоры без использования рук.", "Разрешается при движении со скоростью 20 км/ч.", "Запрещается."], 1, "duties"),
q("Trotuar va piyodalar yo‘lkasi bo‘lmaganda bolalar guruhini yo‘lda qanday tartibda olib yurish mumkin?", ["Qatnov qismi chetidan katta yoshdagilar kuzatuvida olib yurishga ruxsat etiladi.", "Yo‘l yoqasidan faqat kunduzi va katta yoshdagilar kuzatuvida olib yurishga ruxsat etiladi."], "В каком порядке разрешается водить группы детей по дороге при отсутствии тротуаров и пешеходных дорожек?", ["Разрешается водить по краю проезжей части в сопровождении взрослых.", "Разрешается водить только по обочинам дорог только в светлое время суток и только в сопровождении взрослых."], 1, "duties"),
q("Jihozlangan bekatlari bo‘lmagan tramvay to‘xtash joylarida unga chiqish uchun qachon qatnov qismiga chiqishga ruxsat etiladi?", ["Tramvay yaqinlashib kelganda.", "Tramvay to‘la to‘xtagandan so‘ng.", "Har qanday holda.", "Agar qatnov qismida transport vositalari yo‘q bo‘lsa, tramvay yaqinlashib kelganda."], "В местах остановок трамвая, не имеющих приподнятых посадочных площадок, когда разрешается выходить на проезжую часть для посадки в него?", ["При приближении трамвая.", "Только после полной остановки трамвая.", "В любом случае.", "При приближении трамвая, если на проезжей части нет транспортных средств."], 1, "duties"),
q("Yuk avtomobili haydovchisi rasmda ko‘rsatilgan holatda maxsus tovush ishorasini eshitib yoki miltillovchi ishorani ko‘rib nima qilishi kerak?",["Qatnov qismidagi o‘z bo‘lagi bo‘ylab harakatni davom ettirish.","Haydovchi maxsus tovushli ishoralarini yoqqan holda yaqinlashib kelayotgan transport vositalariga yo‘l berishlari, zarur bo‘lgan hollarda ularning to‘siqsiz o‘tib ketishlari uchun o‘zlarini yo‘lning o‘ng tomoniga olib to‘xtatishlari shart."], "Что должен сделать водитель грузового автомобиля в ситуации, показанной на рисунке, услышав специальный звуковой сигнал или увидев проблесковый маячок?", ["Продолжить движение по своей полосе проезжей части.","Водители обязаны уступить дорогу приближающимся транспортным средствам с включенными специальными сигналами, а в случае необходимости остановиться у правого края дороги для обеспечения их беспрепятственного проезда."],1,"duties",["https://raw.githubusercontent.com/Cyborg-lab/all-my-images/refs/heads/main/rasm.ww1.png"]),
q("Reaksiya va diqqatni pasaytiruvchi dori-darmonlar ta’sirida bo‘lgan haydovchiga transport vositalarini boshqarishga ruxsat etiladimi?", ["Taqiqlanadi.", "Ruxsat etiladi.", "Agar haydovchining ishlagan davri 2 yildan ortiq bo‘lsa, ruxsat etiladi."], "Разрешается ли управлять транспортным средством водителю, находящемуся под воздействием лекарственных препаратов, ухудшающих реакцию и внимание?", ["Запрещается.", "Разрешается.", "Разрешается, если стаж водителя более 2 лет."], 0, "duties"),
q("Trotuar yoki yo‘l yoqasi bo‘lmaganda qatnov qismidagi piyodalar qanday harakatlanishi kerak?", ["Yo‘l yoqasida yoki qatnov qismi chetida harakatlanayotgan piyodalar transport vositalarining harakatlanishiga qarama-qarshi yo‘nalishda yurishlari kerak.", "Har qanday yo‘nalishda.", "Qatnov qismi chetida harakatlanayotgan piyodalar transport vositalarining harakatlanishiga qarama-qarshi yo‘nalishda  bir qator  bolib yurishlari kerak.", "Yo‘l yoqasidan yoki qatnov qismining chetidan transport vositalarining harakati bo‘ylab."], "Как должны двигаться пешеходы по проезжей части при отсутствии тротуаров или обочин?", ["При движении по обочине или краю проезжей части пешеходы должны идти навстречу движению транспортных средств.", "В любом направлении.", "Пешеходы, движущиеся по краю проезжей части, должны идти навстречу движению транспортных средств.", "По обочине или по краю проезжей части по ходу движения транспортных средств."], 2, "duties"),
q("Yo‘l-transport hodisasiga daxldor bo‘lgan haydovchilar birinchi navbatda nima qilishi kerak?", ["Hodisa sodir bo‘lgan joyda to‘xtash, guvohlarning ismu sharifini yozib olish, militsiyaga xabar berish, tibbiy yordam ko‘rsatish.", "Darhol to‘xtash va hodisa sodir bo‘lgan joyda qolish, falokat sababli to‘xtash chirog‘ini yoqish va falokat sababli to‘xtash belgisini o‘rnatish.", "To‘xtash va hodisaga tegishli izlarni saqlash, atroini o‘rab, aylanib o‘tishni tashkil etish, militsiyaga xabar berish, tibbiy yordam berish."], "Что должны сделать в первую очередь водители, причастные к дорожно-транспортному происшествию?", ["Остановиться на месте происшествия, записать фамилии очевидцев, сообщить в милицию, оказать медицинскую помощь.", "Немедленно остановиться и оставаться на месте происшествия, включить аварийную световую сигнализацию и выставить знак аварийной остановки.", "Остановиться и сохранить следы происшествия, оградить их, организовать объезд, сообщить в милицию, оказать медицинскую помощь."], 1, "duties"),
q("Mototsiklning orqa o‘rindig‘ida bolalarni tashishga ruxsat etiladimi?", ["12 yoshga to‘lmagan bolalarga katta yoshdagi yo‘lovchi kuzatuvida ruxsat etiladi.", "12 yoshga to‘lgan va undan katta bolalarga ruxsat etiladi.", "Har ikki holatda taqiqlanadi."], "Разрешается ли перевозка детей на заднем сиденье мотоцикла?", ["Разрешается детям до 12 лет в сопровождении взрослого пассажира.", "Разрешается детям, достигшим 12 лет и старше.", "Запрещается в обоих случаях."], 1, "duties"),
q("Moped haydovchilariga ruxsat beriladi:", ["Faqat yo‘lning chetki o‘ng bo‘lagida o‘ng tomonidan bir qator bo‘lib harakatlanishiga.", "Faqat yo‘lning yoqasidan harakatlanishga, agar piyodalarga xalaqit bermasa.", "Barcha sanab o‘tilgan holatlarda."], "Водителям мопедов разрешается:", ["Двигаться только по крайней правой полосе в один ряд возможно правее.", "Двигаться по обочине, если это не создает помех пешеходам.", "Во всех перечисленных случаях."], 2, "duties"),
q("Qatnov qismi tomonidan yo‘lovchilarning tushishi va chiqishiga qaysi hollarda ruxsat etiladi?", ["Transport vositasi majburiy to‘xtaganda.", "Haydovchining xohishiga ko‘ra shu shart bilanki, bu xavf-xatardan xoli bo‘lsa.", "Trotuar tomonidan iloji bo‘lmasa, shu shart bilanki bu xavf-xatarsiz bo‘lsa va boshqa harakat qatnashchilariga xalaqit bermasa."], "В каких случаях разрешается посадка и высадка пассажиров со стороны проезжей части?", ["При вынужденной остановке транспортного средства.", "По желанию водителя при условии, что это будет безопасно.", "Если это невозможно со стороны тротуара, при условии, что это будет безопасно и не создаст помех другим участникам движения."], 2, "duties"),
q("Yo‘lovchilarga taqiqlanadi:", ["Transport vositasi harakatlanayotgan vaqtda haydovchini boshqarishdan chalg‘itish va unga xalaqit berish.", "Harakatlanayotgan bortli yuk avtomobillarida tik turish, bortlarda yoki undan yuqoridagi yuk ustida o‘tirish.", "Transport vositasi harakatlanayotgan vaqtda uning eshiklarini ochish.", "Barcha ko‘rsatilgan javoblar to‘g‘ri."], "Пассажирам запрещается:", ["Отвлекать водителя от управления транспортным средством во время его движения.", "Стоять в кузове движущегося бортового грузового автомобиля, сидеть на бортах или выше бортов на грузе", "Открывать двери транспортного средства во время его движения.", "Все перечисленные ответы верны."], 3, "duties"),
q("Transport vositalari ixtiyoriga berilgan vakolatnomasi bo‘lgan shaxs o‘zining ishtirokida transport vositasini boshqa shaxsga boshqarishni topshirishi mumkinmi?", ["Mumkin.", "Mumkin emas.", "Bu shaxsda mazkur toifali transport vositasini boshqarishga haydovchilik guvohnomasi bo‘lgan taqdirda, transport vositalari egalarining fuqarolik javobgarligini majburiy sug‘urta qilish bo‘yicha sug‘urta polisida ism-sharifi ko‘rsatilgan bo‘lsa, mumkin."], "Может ли лицо, имеющее доверенность на право распоряжения транспортным средством, в своем присутствии передать управление транспортным средством другому лицу?", ["Может.", "Не может.", "Может, при наличии у этого лица водительского удостоверения соответствующей категории и если его фамилия указана в страховом полисе обязательного страхования гражданской ответственности владельцев транспортных средств"], 2, "duties"),
q("Velosipedlarda trotuarda harakatlanishga ruxsat etiladimi?", ["Ruxsat etiladi.", "Piyodalar bo‘lmaganda ruxsat etiladi.", "Taqiqlanadi."], "Разрешается ли движение на велосипедах по тротуарам?", ["Разрешается.", "Разрешается при отсутствии пешеходов.", "Запрещается."], 2, "duties"),
q("Belgilangan yo‘nalish bo‘yicha harakat qilayotgan transport vositalarining haydovchilari piyodalar o‘tish joyidan tashqarida oq hassa bilan ishora berayotgan piyodalarni o‘tkazib yuborishlari kerakmi?", ["Hamma hollarda o‘tkazib yuborishlari kerak.", "O‘tkazib yuborishlari kerak emas."], "Должны ли водители маршрутных транспортных средств пропускать пешеходов, подающих сигнал белой тростью вне пешеходных переходов?", ["Должны пропускать во всех случаях.", "Не должны пропускать."], 0, "duties"),
q("Boshqarishni o‘rgatishdagi transport vositasi qanday jihozlangan bo‘lishi kerak?", ["Ushbu qoidalarning talablariga muvofiq taniqlik belgilari bilan.", "Ulagich va qo‘shimcha tormoz tepkilari bilan.", "O‘rgatuvchi uchun orqani ko‘rsatuvchi ko‘zgu bilan.", "Sanab o‘tilgan barcha jihozlar va belgilar bilan."], "Как должно быть оборудовано транспортное средство, на котором проводится обучение вождению?", ["Опознавательными знаками в соответствии с требованиями настоящих Правил.", "Дополнительными педалями привода сцепления и тормоза.", "Зеркалом заднего вида для обучающего.", "Всеми перечисленными устройствами и знаками."], 3, "duties"),
q("Piyodalarga yo‘lni piyodalar o‘tish joyidan tashqarida kesib o‘tishga ruxsat etiladimi?", ["Ruxsat etiladi.", "Yo‘lni qatnov qismi chetiga to‘g‘ri burchak ostida, uning ikkala tomoni yaxshi ko‘rinib turadigan joyda ruxsat etiladi.", "Taqiqlanadi."], "Разрешается ли пешеходам переходить дорогу вне пешеходных переходов?", ["Разрешается.", "Разрешается под прямым углом к краю проезжей части на участках, где она хорошо просматривается в обе стороны.", "Запрещается."], 1, "duties"),
q("Piyodalarning tashkiliy jamlanmasiga yo‘lning qatnov qismida bir qatorda nechta kishidan ortiq bo‘lmasdan harakatlanishga ruxsat etiladi?", ["Ikki kishidan ortiq bo‘lmasdan.", "Ikki kishidan kam bo‘lmasdan.", "To‘rt kishidan ortiq bo‘lmasdan.", "To‘rt kishidan kam bo‘lmasdan."], "В каком количестве человек в одном ряду разрешается движение организованной пешей колонны по проезжей части дороги?", ["Не более двух человек.", "Не менее двух человек.", "Не более четырех человек.", "Не менее четырех человек."],2, "duties"),
q("Haydovchi o‘z joyidan ketishi yoki transport vositasini qoldirishi mumkin, agar:", ["U yurgizgichni o‘chirgan va avtomobilning to‘xtab turish tormoz tizimini ulagan bo‘lsa.", "U yurgizgichni o‘chirgan va orqaga siljib ketishga qarshi xavfsizlik buferini o‘rnatgan bo‘lsa.", "U transport vositasining o‘z-o‘zidan harakatlanishi yoki undan haydovchi yo‘q vaqtda foydalanishga yo‘l qo‘ymaydigan zaruriy choralarni ko‘rgan bo‘lsa."], "Водитель может покидать свое место или оставлять транспортное средство, если:", ["Он выключил двигатель и задействовал стояночную тормозную систему автомобиля.", "Он выключил двигатель и установил противооткатные упоры.", "Им приняты необходимые меры, исключающие самопроизвольное движение транспортного средства или использование его в отсутствие водителя."], 2, "duties"),
q("Piyodalar o‘tish joyi bo‘lmaganda piyodalarga yo‘l qatnov qismining qaysi joyidan kesib o‘tishga ruxsat etiladi?", [" Chorrahalarda trotuarlar yoki yo‘l yoqasi chiziqlari bo‘ylab.", " Qatnov qismining chekkasidan to‘g‘ri burchak bo‘ylab, har ikki tomon yaxshi ko‘rinadigan joylardan.", " Barcha sanab o‘tilgan joylardan."], "Где пешеходам разрешается переходить проезжую часть при отсутствии пешеходного перехода?", [" На перекрестках по линиям тротуаров или обочин.", " На участках без разделительной полосы и ограждений там, где дорога хорошо просматривается в обе стороны, под прямым углом к краю проезжей части.", " Во всех перечисленных местах."],  0, "duties"),
q("Siz oldida transport vositasi to‘xtab turgan tartibga solinmaydigan piyodalar o‘tish joyiga yaqinlashib kelyapsiz. Siz bajarishingiz kerak:", [" Harakatni davom ettirish, lekin to‘xtab turgan transport vositasi oldida piyodalar yo‘qligiga ishonch hosil qilgan holda.", " Piyodalar o‘tish joyidan to‘xtamasdan o‘tish, lekin alohida ehtiyotkorlik bilan.", " Piyodalar o‘tish joyidan to‘xtamasdan o‘tish.", " Albatta to‘xtash. Piyodalar paydo bo‘lsa, ularni o‘tkazib yuborish."], "Вы приближаетесь к нерегулируемому пешеходному переходу, перед которым остановилось транспортное средство. Вы должны:", [" Продолжить движение, только убедившись, что перед остановившимся транспортным средством нет пешеходов.", " Проехать пешеходный переход без остановки, но с особой осторожностью.", " Проехать пешеходный переход без остановки.", " Обязательно остановиться и пропустить пешеходов, если они появятся"], 0, "duties"),
q("Avtomobilda tibbiyot qutichasini qayerda saqlash lozim?", [" Avtomobilning kuzovida ko‘rinadigan joyda.", " Tayyorlovchi-korxona tomonidan belgilangan joylarda berk holatda.", " Engil avtomobilning yukxonasida."], "Где в автомобиле должна храниться медицинская аптечка?", [" В кузове автомобиля на видном месте.", " В местах, установленных предприятием-изготовителем, в закрытом состоянии.", " В багажнике легкового автомобиля."], 0, "duties"),
q("Qoida bo‘yicha necha yoshdan boshlab engil avtomobilni boshqarishga ruxsat beriladi?", [" 18 yoshdan.", " 14 yoshdan.", " 16 yoshdan."], "С какого возраста по правилам разрешается управление легковым автомобилем?", [" С 18 лет.", " С 14 лет.", " С 16 лет."], 0, "duties"),
q("Piyodalar o‘tish joyidan tashqarida yo‘lning qatnov qismidan ajratuvchi bo‘lak bo‘lganda piyodalarning o‘tishlariga ruxsat etiladimi?", ["Taqiqlanadi.", " Faqat aholi yashaydigan joylardan tashqarida ruxsat etiladi.", " Faqat aholi yashaydigan joylarda ruxsat etiladi.", " Yo‘lning har ikki tomoni ko‘rinadigan joylarda ruxsat etiladi."], "Разрешается ли пешеходам переходить проезжую часть вне пешеходного перехода при наличии разделительной полосы?", [" Запрещается.", " Разрешается только вне населенных пунктов.", " Разрешается только в населенных пунктах.", "Разрешается в местах, где дорога хорошо просматривается в обе стороны."], 0, "duties"),
q("Sanab o‘tilgan hollarning qaysi birida haydovchi o‘zining transport vositasini militsiya xodimi ixtiyoriga berishi shart?", [" Kechiktirib bo‘lmaydigan xizmat vazifalarini bajarish zarurati tug‘ilgan hollarda.", " Hamma holatda.", " Ish joyiga borish uchun."], "В каком из перечисленных случаев водитель обязан предоставить свое транспортное средство в распоряжение сотрудника милиции?", ["В случаях, когда возникла необходимость выполнения неотложных служебных заданий.", " Во всех случаях.", " Для проезда к месту работы."], 0, "duties"),

q("Agar qatnov qismining kengligi chetki chap bo'lakdan qayrilish uchun yetarli bo'lmasa, qoidalar qayrilishni qatnov qismining o'ng chekkasi yoki yo'lning o'ng yoqasidan amalga oshirishga yo'l qo'yadimi?", ["Qatnov qismining faqat o'ng chekkasidan yo'l qo'yiladi. Yo'lning o'ng yoqasidan yo'l qo'yilmaydi.", "Yo'l qo'yiladi. Bunda qayrilayotgan haydovchi yo'lakay va qarama-qarshi yo'nalishdan kelayotgan transport vositalarini o'tkazib yuborishi kerak.", "Yo'l qo'yilmaydi."], "Если ширина проезжей части недостаточна для разворота из крайнего левого положения, допускают ли правила производить разворот от правого края проезжей части или с правой обочины дороги?", ["Допускается только от правого края проезжей части. С правой обочины не допускается.", "Допускается. При этом разворачивающийся водитель должен пропустить попутные и встречные транспортные средства.", "Не допускается."], 2, 'start_direction'),

q("Aholi yashaydigan joylarda relssiz transport vositalariga, agar bir yo'nalishda uchta va undan ortiq harakatlanish bo'lagi bo'lganda, qaysi bo'lakdan harakatlanishga ruxsat etiladi? Ruxsat etilgan to'la vazni 3.5 t. dan ortiq bo'lgan yuk avtomobillari hisobga kirmaydi.", ["Har qanday bo'lak bo'yicha.", "Iloji boricha qatnov qismining o'ng chekkasiga yaqin bo'lak bo'yicha.", "Chapki chekkadan tashqari har qanday bo'lak bo'yicha. Unga faqat boshqa bo'laklarda harakat serqatnov bo'lganda, shuningdek, chapga burilish, orqaga qayrilish va bir tomonlama harakatli yo'lda to'xtash uchun o'tishga ruxsat etiladi."], "По какой полосе разрешается движение бесрельсовых транспортных средств в населенных пунктах, если в одном направлении имеется три и более полосы? Грузовые автомобили с разрешенной максимальной массой более 3,5 т не учитываются.", ["По любой полосе.", "По возможности ближе к правому краю проезжей части.", "По любой полосе, кроме крайней левой. Занимать ее разрешается только при интенсивном движении, а также для поворота налево, разворота и остановки на дорогах с односторонним движением."], 3, 'positioning'),

q("Svetoforning taqiqlovchi ishorasida va shlagbaum ochiq bo'lganda haydovchi nima qilishi kerak?", ["Yaqinlashib kelayotgan poezd yo'qligiga ishonch hosil qilishi va kesishmadan o'tishi kerak.", "Shlagbaumning holatiga asoslangan holda kesishmadan o'tishi kerak.", "Shlagbaumdan 10 metrdan yaqin bo'lmagan masofada to'xtash.", "To'xtash chizig'i oldida, \"To'xtamasdan harakatlanish taqiqlangan\" belgisi oldida, agar ular yo'q bo'lsa shlagbaumgacha 5 metrdan yaqin bo'lmagan masofada to'xtash."], "Что должен сделать водитель при запрещающем сигнале светофора и открытом шлагбауме?", ["Убедиться в отсутствии приближающегося поезда и проехать переезд.", "Проехать переезд, руководствуясь положением шлагбаума.", "Остановиться не ближе 10 метров от шлагбаума.", "Остановиться перед стоп-линией, знаком \"Движение без остановки запрещено\", а если их нет — не ближе 5 метров от шлагбаума."], 3, "railway", [""]),

q("Temir yo'l kesishmasi oldida to'xtagandan keyin harakatni boshlashdan oldin haydovchi:", ["Harakat xavfsizligini ta'minlovchi tezlik bilan kesishma orqali harakatni boshlashi kerak.", "Birinchi uzatmada kesishmadan o'tishi kerak.", "Yaqinlashib kelayotgan poezdning yo'qligiga ishonch hosil qilishi kerak."], "Что должен сделать водитель перед началом движения после остановки перед железнодорожным переездом?", ["Начать движение через переезд со скоростью, обеспечивающей безопасность движения.", "Проехать переезд на первой передаче.", "Убедиться в отсутствии приближающегося поезда."], 2, "railway", [""]),

q("Agar g'ildiraklardagi tortish kuchi yo'l bilan tishlashish kuchidan ortiq bo'lsa:", ["Yurgizgich o'chib qoladi.", "Ulagich detallarining yemirilishi ortadi.", "Yetakchi g'ildiraklar o'rnidan jilmay aylanadi."], "Если тяговое усилие на колесах превышает силу сцепления с дорогой:", ["Двигатель заглохнет.", "Увеличится износ деталей сцепления.", "Ведущие колеса будут пробуксовывать."], 2, "safety", [""]),
q("Agar avtomobilning o'ng g'ildiraklari nam qoplamali yo'l yoqasiga chiqib qolsa, tavsiya etiladi:", ["Avtomobilni tormozlash va to'liq to'xtatish.", "Avtomobilni tormozlab, yo'lning qatnov qismiga ohista ravon burish.", "Avtomobilni tormozlamasdan yo'lning qatnov qismiga ohista ravon burish."], "Если правые колеса автомобиля съехали на влажную обочину, рекомендуется:", ["Затормозить автомобиль и полностью остановиться.", "Притормаживая, плавно повернуть на проезжую часть дороги.", "Не притормаживая, плавно повернуть на проезжую часть дороги."], 2, "safety", [""]),
q("Yengil avtomobil tirkamasi burilishda qanday trayektoriya bo'yicha harakatlanadi?", ["Burilish markaziga nisbatan avtomobil trayektoriyasidan tashqarida.", "Avtomobil burilish trayektoriyasi bo'yicha.", "Burilish markaziga nisbatan avtomobil trayektoriyasidan ichkarida."], "По какой траектории движется прицеп легкового автомобиля на повороте?", ["Дальше от центра поворота, чем траектория автомобиля.", "По траектории автомобиля.", "Ближе к центру поворота, чем траектория автомобиля."], 2, "safety", [""]),
q("Serqatnov harakatda transport vositasini keskin tormozlash:", ["Orqadan harakatlanayotgan transport vositalari urib yuborishini keltirib chiqarishi mumkin.", "Avtomobilning faqat texnik holatida ko'rinadi.", "Serqatnov harakatda boshqarishning odatdagi usuli hisoblanadi."], "Резкое торможение транспортного средства при плотном движении:", ["Может привести к наезду сзади движущимися транспортными средствами.", "Отражается только на техническом состоянии автомобиля.", "Является обычным способом управления в плотном потоке."], 0, "safety", [""]),
q("Harakat tezligi ikki marta oshganda, tormozlanish yo'li necha marta ortadi?", ["Tormoz yo'li harakat tezligiga bog'liq emas.", "Uch marta.", "To'rt marta.", "Ikki marta."], "Во сколько раз увеличится тормозной путь при увеличении скорости движения в два раза?", ["Тормозной путь не зависит от скорости движения.", "В три раза.", "В четыре раза.", "В два раза."], 2, "safety", [""]),
q("Sanab o'tilgan qaysi hollarda haydovchi orqadagi vaziyatni e'tiborga olishi kerak?", ["Faqat keskin tormoz berishda.", "Faqat nam qoplama yoki yaxmalakli yo'llarda tormoz berganda.", "Har qanday tormozlashda."], "В каких из перечисленных случаев водитель должен оценивать обстановку сзади?", ["Только при резком торможении.", "Только при торможении на мокром или скользком покрытии.", "При любом торможении."], 2, "safety", [""]),
q("Ishqalanish koeffitsientiga shinalarni siyqalanib ketgan protektori qanday ta'sir qiladi?", ["Ulagich koeffitsienti oshadi.", "Ulagich koeffitsienti o'zgarmaydi.", "Ulagich koeffitsienti kamayadi."], "Как влияет изношенный протектор шин на коэффициент сцепления?", ["Коэффициент сцепления увеличивается.", "Коэффициент сцепления не изменяется.", "Коэффициент сцепления уменьшается."], 2, "safety", [""]),
q("Ishchi tormozi to'satdan ishlamay qolganda avtomobilni qanday to'xtatish kerak?", ["Eng past uzatmaga o'tish, to'xtab turish tormozi bilan tormozlash. Zarur bo'lganda biron-bir to'siqdan foydalanish.", "Ulagichni ajratish va to'xtab turish tormozi bilan keskin tormozlash."], "Как следует останавливать автомобиль при внезапном отказе рабочего тормоза?", ["Перейти на низшую передачу, тормозить стояночным тормозом. При необходимости использовать какое-либо препятствие.", "Выключить сцепление и резко затормозить стояночным тормозом."], 0, "safety", ["https://raw.githubusercontent.com/Cyborg-lab/all-my-images/refs/heads/main/rasm.w12.png"]),
q("Agar avtomobil antiblokirovkasi (ABS) tormoz tizimi bilan jihozlangan bo'lsa, keskin tormoz berishni qanday amalga oshirishi kerak?", ["Tormoz tizimini uzib-uzib bosish yo'li bilan.", "Tormoz tizimini oxirigacha bosish va avtomobilni to'liq to'xtaguncha tepkini qo'yib yubormaslik.", "To'xtab turish tormozi tizimini qo'llash bilan."], "Если автомобиль оборудован антиблокировочной тормозной системой (АБС), как следует производить экстренное торможение?", ["Путем прерывистого нажатия на педаль тормоза.", "Нажать на педаль тормоза до упора и не отпускать ее до полной остановки автомобиля.", "С использованием стояночной тормозной системы."], 1, "safety", [""]),
q("Sirpanchiq yo'lda harakatlanayotganda karbyuratorning drossel zaslonkasini birdaniga ochish xavfi nimadan iborat?", ["Yurgizgich o'chib qoladi.", "Yonilg'i sarfi ancha ortadi.", "Avtomobilning yonga sirpanishi vujudga kelishi mumkin.", "Yurgizgich tirsakli val aylanishining yuqori chastotasini oshiradi."], "В чем заключается опасность резкого открытия дроссельной заслонки карбюратора при движении по скользкой дороге?", ["Двигатель заглохнет.", "Значительно увеличится расход топлива.", "Может возникнуть боковой занос автомобиля.", "Увеличится частота вращения коленчатого вала двигателя."], 2, "safety", [""]),
q("Qaysi xolda avtomobilning ag'anab ketishiga qarshi turg'unligi ortadi?", ["Og'irlik markazi o'nga siljiganda.", "Og'irlik markazi balandda joylashganda.", "Og'irlik markazi pastda joylashganda."], "В каком случае повышается устойчивость автомобиля против опрокидывания?", ["При смещении центра тяжести вправо.", "При высоком расположении центра тяжести.", "При низком расположении центра тяжести."], 2, "safety", ["https://raw.githubusercontent.com/Cyborg-lab/all-my-images/refs/heads/main/rasm.w13.png"]),
q("Qanday hollarda yo'lning burilish qismlarida yengil avtomobil ag'darilishga qarshi turg'unroq?", ["Yuksiz va yo'lovchilarsiz.", "Yo'lovchilar bilan yuksiz.", "Yo'lovchilarsiz, yuqori yukxonasida yuki bilan."], "В каких случаях легковой автомобиль более устойчив против опрокидывания на поворотах?", ["Без груза и пассажиров.", "С пассажирами, но без груза.", "Без пассажиров, с грузом на верхнем багажнике."], 0, "safety", [""]),
